<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>宝宝照护查阅</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8835a">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="宝宝照护">
<style>
:root{
 --bg:#fbf8f4;--screen:#fdfbf8;--card:#fff;--ink:#23211e;--sub:#8a847c;--line:#eee7dd;
 --accent:#e8835a;--accent-soft:#fdeee6;--cui:#0f6e56;--cuibg:#e3f4ed;--aap:#1f6fb2;--aapbg:#e7f1fa;
 --warn:#b4502a;--warnbg:#faece5;--shadow:0 6px 22px rgba(80,60,40,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#efe7dc;font:15px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink)}
.phone{max-width:400px;margin:18px auto;background:var(--screen);border-radius:30px;box-shadow:var(--shadow);overflow:hidden;position:relative;height:min(860px,94vh);display:flex;flex-direction:column;border:1px solid #e7ddcf}
.notch{height:26px;display:flex;align-items:center;justify-content:center}
.notch::after{content:"";width:120px;height:6px;border-radius:6px;background:#e3d8c8}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:18px}
.tabbar{display:flex;border-top:1px solid var(--line);background:#fff}
.tabbar button{flex:1;border:0;background:none;padding:8px 0 10px;color:var(--sub);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tabbar button.on{color:var(--accent)}
.tabbar svg{width:22px;height:22px}
.view{display:none;padding:0 16px}
.view.on{display:block}
.h1{font-size:20px;font-weight:800;margin:14px 2px 2px}
.sub{color:var(--sub);font-size:12.5px;margin:0 2px 14px}
/* home */
.babycard{background:linear-gradient(135deg,#fbe7dc,#fdf3ea);border-radius:20px;padding:18px;margin-bottom:14px}
.babycard .age{font-size:26px;font-weight:800}
.babycard .stage{color:var(--warn);font-weight:600;margin-top:2px}
.babycard .days{color:var(--sub);font-size:12.5px;margin-top:2px}
.bigbtn{display:block;width:100%;border:0;background:var(--accent);color:#fff;font-size:16px;font-weight:700;padding:13px;border-radius:14px;margin-top:14px;cursor:pointer}
.setrow{display:flex;gap:8px;align-items:center;margin-top:10px}
.setrow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px;font-size:14px;background:#fff}
.setrow button{border:0;background:var(--accent);color:#fff;border-radius:10px;padding:9px 14px;font-weight:600;cursor:pointer}
.secttl{font-size:14px;font-weight:700;margin:18px 2px 8px;display:flex;align-items:center;gap:6px}
.quick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.quick button{border:1px solid var(--line);background:#fff;border-radius:14px;padding:14px 6px;font-size:12.5px;color:var(--ink);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}
.quick svg{width:24px;height:24px;color:var(--accent)}
.remind{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:13px;color:var(--sub)}
.remind b{color:var(--ink)}
.tag-soon{display:inline-block;background:var(--accent-soft);color:var(--accent);font-size:11px;border-radius:6px;padding:1px 7px;margin-left:6px}
/* timeline */
.tl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.tl button{position:relative;border:1px solid var(--line);background:#fff;border-radius:14px;padding:14px 8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink)}
.tl button.cur{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.tl button .badge{display:block;font-size:10.5px;font-weight:500;margin-top:4px}
.tl button.has .badge{color:var(--cui)}
.tl button.no .badge{color:var(--sub)}
.tl button.cur::after{content:"宝宝在这";position:absolute;top:-8px;right:8px;background:var(--accent);color:#fff;font-size:10px;border-radius:6px;padding:1px 6px}
/* stage */
.stagehd{display:flex;align-items:center;gap:10px;margin:14px 0 4px}
.back{border:1px solid var(--line);background:#fff;border-radius:10px;width:34px;height:34px;font-size:16px;cursor:pointer}
.stagehd .t{font-size:19px;font-weight:800}
.boardtabs{display:flex;gap:6px;overflow-x:auto;padding:10px 0 6px;position:sticky;top:0;background:var(--screen);z-index:2}
.boardtabs button{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:13px;color:var(--sub);cursor:pointer;white-space:nowrap}
.boardtabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.count{color:var(--sub);font-size:12px;margin:2px 2px 8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.card .head{display:flex;align-items:flex-start;gap:8px;padding:13px 14px;cursor:pointer}
.card .ti{flex:1;font-weight:700;font-size:15px}
.card .star{border:0;background:none;font-size:18px;cursor:pointer;color:#d9d2c6;line-height:1;padding:0}
.card .star.on{color:#f1a93b}
.card .chev{color:var(--sub);font-size:13px;transition:transform .2s;margin-top:2px}
.card.open .chev{transform:rotate(90deg)}
.card .body{display:none;padding:0 14px 13px}
.card.open .body{display:block}
.card .txt{font-size:14px;color:#3a372f}
.divbadge{display:inline-block;font-size:11px;color:var(--warn);font-weight:600;margin-left:6px}
.note{background:var(--warnbg);border-radius:10px;padding:8px 11px;font-size:12.5px;color:var(--warn);margin-top:8px}
.srcrow{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{font-size:11px;border-radius:6px;padding:2px 8px}
.chip.cui{background:var(--cuibg);color:var(--cui)}
.chip.aap{background:var(--aapbg);color:var(--aap)}
.tag{font-size:11px;color:var(--sub);background:#f3efe7;border-radius:6px;padding:2px 7px}
.alabel{display:inline-block;font-size:10.5px;color:#7a4a17;background:#fbe7d2;border-radius:6px;padding:1px 7px;margin-left:6px;white-space:nowrap;vertical-align:middle}
.zone{font-size:12px;color:#7a4a17;background:#fdf3e8;border:1px dashed #e7c89c;border-radius:8px;padding:6px 10px;margin:6px 0 10px}
.tp{background:#eef4ef;border:1px solid #cfe3d6;border-radius:10px;padding:10px 12px;margin-top:9px;font-size:13px;color:#274b38}
.tp .tphd{font-weight:700;color:#0f6e56;margin-bottom:4px}
.tp .tpsrc{font-size:11.5px;color:#5b7a66;margin-top:5px}
.tp a{color:#0f6e56}
.empty{text-align:center;color:var(--sub);font-size:13px;padding:50px 20px}
.ph{text-align:center;color:var(--sub);font-size:13.5px;padding:40px 24px;line-height:1.8}
.ph b{color:var(--accent)}
/* search */
.searchbar{position:sticky;top:0;background:var(--screen);padding:12px 0 8px;z-index:2}
.searchbar input{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:15px;background:#fff}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 12px}
.chips button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px;font-size:12.5px;color:var(--sub);cursor:pointer}
.disc{font-size:11px;color:var(--sub);text-align:center;padding:14px 18px 4px;line-height:1.7}
.bk{font-size:11.5px;color:var(--sub)}
</style></head>
<body><div class="phone">
<div class="notch"></div>
<div class="screen">
  <div id="view-home" class="view on"></div>
  <div id="view-timeline" class="view"></div>
  <div id="view-stage" class="view"></div>
  <div id="view-search" class="view"></div>
  <div id="view-fav" class="view"></div>
</div>
<div class="tabbar">
  <button data-v="home" class="on" onclick="go('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>首页</span></button>
  <button data-v="timeline" onclick="go('timeline')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg><span>月龄</span></button>
  <button data-v="search" onclick="go('search')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><span>搜索</span></button>
  <button data-v="fav" onclick="go('fav')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.7 5.7 6.3.9-4.6 4.4 1.1 6.1L12 17l-5.5 3 1.1-6.1L3 9.6l6.3-.9z"/></svg><span>收藏</span></button>
</div>
</div>
<script>
const DATA = {"stages": {"0-1月": {"feeding": [{"id": "0-1月-feeding-001", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "觅食与吮吸反射", "content": "用手拨弄宝宝面颊或嘴唇，他会把头转向你的手，这是觅食反射，帮助他找到乳头；3周左右大时会直接把头和嘴凑向乳头吮吸。把乳头乳晕放进口腔深处，他就会自动开始吮吸。崔玉涛补充：用乳头轻触宝宝嘴时会引起自主吮吸，这类新生儿反射出生后4个月左右逐渐消失。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}, {"book": "崔", "loc": "印刷页46"}], "divergence": false, "divergence_note": null, "tags": ["觅食反射", "吮吸反射", "新生儿反射"], "third_party": null}, {"id": "0-1月-feeding-002", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "吃奶分两步", "content": "吃奶其实分两步：先用嘴唇含住乳晕，使乳头朝向口腔后部软硬腭交界处，舌头和硬腭挤压乳房把乳汁挤出；接着舌头从乳晕向乳头方向移动。整个过程中宝宝把乳房严密含在口中吮吸。协调吮吸、呼吸、吞咽是复杂任务，有些新生儿一开始掌握得不太好，练习后会得心应手。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}], "divergence": false, "divergence_note": null, "tags": ["吃奶机制", "含乳", "吮吸"], "third_party": null}, {"id": "0-1月-feeding-003", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "帮宝宝正确含乳", "content": "妈妈手呈C字形托住乳房，先用乳头轻碰宝宝嘴周刺激觅食反射，等他张大嘴时把乳头和大部分乳晕塞进嘴里。正确含乳的表现是：嘴张得尽量大、上唇含的乳晕比下唇多、舌头呈勺状环住乳晕、两颊鼓起、吸吮慢而有力、能看到或听到吞咽。只含住乳头没含住乳晕容易造成乳头疼痛或皲裂。", "source": [{"book": "崔", "loc": "印刷页72"}], "divergence": false, "divergence_note": null, "tags": ["含乳", "哺乳姿势", "乳头疼痛"], "third_party": null}, {"id": "0-1月-feeding-004", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "常见哺乳姿势", "content": "常见哺乳姿势有摇篮式、交叉摇篮式、橄榄球式和斜躺式。摇篮式最简单常用，能清楚观察宝宝吃奶情况；橄榄球式适合剖宫产妈妈，可避免宝宝压迫刀口，也适合产奶多、乳头凹陷的情况；斜躺式相对轻松，适合剖宫产或有侧切的妈妈。找到适合自己和宝宝的姿势对顺利哺乳很重要。", "source": [{"book": "崔", "loc": "印刷页70"}], "divergence": false, "divergence_note": null, "tags": ["哺乳姿势", "摇篮式", "橄榄球式"], "third_party": null}, {"id": "0-1月-feeding-005", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "初乳是第一口奶", "content": "初乳是妈妈生产后5天内分泌的乳汁，比成熟乳稀薄、颜色偏黄，白细胞和抗体含量高，能预防宝宝感染。越早分泌的初乳抗体越多，尤其产后5小时内的最丰富，因此条件允许时应鼓励产后30分钟内开始哺乳，把初乳作为宝宝出生后的第一口奶。初乳中丰富的低聚糖还能帮助宝宝建立肠道菌群、降低过敏风险。", "source": [{"book": "崔", "loc": "印刷页67"}], "divergence": false, "divergence_note": null, "tags": ["初乳", "第一口奶", "母乳喂养"], "third_party": null}, {"id": "0-1月-feeding-006", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "新生儿体重先降后升", "content": "出生时新生儿体内有过多体液，几天内排出，出生7天内体重大约会减轻10%，从第5天起应稳步增长，约2周大时恢复到出生体重。崔玉涛补充：前5天体重下降还与胎脂分离、胎便和小便排出、初期母乳少且吸吮弱有关；只要下降不超过出生体重的10%、没有明显黄疸加重、每天吃奶8次以上，就说明母乳够，可继续纯母乳喂养。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}, {"book": "崔", "loc": "印刷页50"}], "divergence": false, "divergence_note": null, "tags": ["体重下降", "生理性体重减轻", "纯母乳"], "third_party": null}, {"id": "0-1月-feeding-007", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "如何判断宝宝吃饱", "content": "崔玉涛给出按需喂养的判断标准：每天母乳喂养8～12次，每次单侧乳房能持续吃15～20分钟以上，哺乳后至少一侧乳房排空，吃奶时有节律吮吸并能听到吞咽声，吃完表情满足，每天排尿6次以上且尿清不黄。AAP从排便角度提醒：母乳喂养的新生儿如果每天排便不足4次，可能意味着奶量不足，应请医生测体重。", "source": [{"book": "崔", "loc": "印刷页74"}, {"book": "AAP", "loc": "第6章 第1个月 · 排便"}], "divergence": false, "divergence_note": null, "tags": ["按需喂养", "吃饱判断", "奶量不足"], "third_party": null}, {"id": "0-1月-feeding-008", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "吃奶睡着要不要叫醒", "content": "AAP提醒：母乳喂养的新生儿如果第1个月总是一睡5小时以上、不主动醒来吃奶，要考虑是不是没吃饱，没吃饱也会让宝宝总是昏昏欲睡，可向医生咨询。崔玉涛认为这个问题答案不统一，主要看妈妈判断：如果认为宝宝已经吃饱，就不必叫醒；但如果到了该喂奶的时候，则需要叫醒宝宝。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 嗜睡"}, {"book": "崔", "loc": "印刷页75"}], "divergence": false, "divergence_note": null, "tags": ["吃奶睡着", "嗜睡", "唤醒"], "third_party": null}, {"id": "0-1月-feeding-009", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "补维生素D不补DHA", "content": "崔玉涛指出：如果妈妈营养均衡、宝宝能吸到足够母乳，通常无须额外补钙，但从出生后第15天开始，可以每天补充400国际单位的维生素D。因为维生素D在母乳中含量极少，却对促进肠道吸收钙非常重要。DHA属于脂肪，人体需求有限，母乳中的DHA完全能满足宝宝发育需求，无须额外补充。", "source": [{"book": "崔", "loc": "印刷页75"}], "divergence": false, "divergence_note": null, "tags": ["维生素D", "DHA", "补充剂"], "third_party": null}, {"id": "0-1月-feeding-010", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "夜间哺乳注意事项", "content": "崔玉涛提醒夜奶要注意安全：第一，如非必要不采用侧卧哺乳，因为妈妈躺着哺乳难保持清醒，睡着后可能压到宝宝；第二，不要让宝宝含着乳头睡觉，容易增加乳头破损风险；第三，不要主动叫醒夜里睡着的宝宝。喂奶后也不要马上让宝宝平躺，应保持45度抱姿、拍嗝后再躺下，以减少吐奶和窒息风险。", "source": [{"book": "崔", "loc": "印刷页76"}], "divergence": false, "divergence_note": null, "tags": ["夜奶", "侧卧哺乳", "拍嗝"], "third_party": null}, {"id": "0-1月-feeding-011", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "黄疸靠多喂母乳退", "content": "AAP指出新生儿出生后皮肤变黄通常是黄疸，母乳喂养的宝宝黄疸可能持续2～3周，配方奶喂养的一般2周内消失，若持续3周以上或加重应尽快就医。崔玉涛补充退黄护理：最佳办法是尽量多喂母乳，排便越多排出的胆红素就越多、黄疸退得越快；不建议给宝宝喂葡萄糖水，因为这反而会减少胆红素排出。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 黄疸"}, {"book": "崔", "loc": "印刷页62"}], "divergence": false, "divergence_note": null, "tags": ["黄疸", "退黄", "多喂母乳"], "third_party": null}, {"id": "0-1月-feeding-012", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "母乳性黄疸", "content": "崔玉涛介绍：母乳性黄疸是生理性黄疸的一种，在母乳喂养一段时间后出现、消退慢、持续时间长，有些宝宝3～4个月时还没完全消退。这是因为母乳中有一种酶会影响宝宝体内胆红素代谢。处理上要坚持正常喂养，不要因为着急而停母乳，否则宝宝吃不足、排便减少反而会延长黄疸时间。", "source": [{"book": "崔", "loc": "印刷页63"}], "divergence": false, "divergence_note": null, "tags": ["母乳性黄疸", "生理性黄疸", "坚持母乳"], "third_party": null}, {"id": "0-1月-feeding-013", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "溢奶吐奶很常见", "content": "AAP提醒：吃奶后吐少量奶是正常现象，但出现喷射性呕吐（呕吐物喷射几厘米远）应立即就医排查幽门狭窄，反复呕吐超过8小时或伴脱水发热也要看医生。崔玉涛解释：新生儿胃呈水平位、容量小、食道末端括约肌未发育完善，所以容易溢奶；每次喂奶后让宝宝呈45度心贴心姿势、头高过肩静坐15分钟帮他打嗝，可缓解溢奶。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 呕吐"}, {"book": "崔", "loc": "印刷页87"}], "divergence": false, "divergence_note": null, "tags": ["溢奶", "吐奶", "喷射性呕吐", "拍嗝"], "third_party": null}, {"id": "0-1月-feeding-014", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "呛奶的预防和处理", "content": "崔玉涛指出呛奶在新生儿中常见，多与吃奶姿势不当有关。预防上要注意喂养姿势，让宝宝头部高于身体、避免完全平躺，并控制奶液流速（瓶喂选合适月龄的奶嘴孔），吃完奶要拍嗝排气。呛奶不严重时让宝宝侧躺、轻拍背部上方刺激咳出奶液，千万不要竖着抱起拍背；如果面部发红、呼吸困难则要紧急处理。", "source": [{"book": "崔", "loc": "印刷页134"}], "divergence": false, "divergence_note": null, "tags": ["呛奶", "喂养姿势", "急救"], "third_party": null}, {"id": "0-1月-feeding-015", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "何时需要添加配方粉", "content": "崔玉涛引用《中华母乳喂养指南（2016）》：婴儿配方奶只能作为母乳喂养失败后的补充，或在不能母乳喂养时才考虑。只有在母乳量经评估确实不足、宝宝体重增长仍不理想、有发育迟缓迹象时，才参考添加配方粉以保证正常发育。另外，如果妈妈患结核病等可能传播的严重疾病，也应视具体情况由医疗单位指导决定。", "source": [{"book": "崔", "loc": "印刷页69"}], "divergence": false, "divergence_note": null, "tags": ["配方粉", "母乳喂养指南", "补充喂养"], "third_party": null}, {"id": "0-1月-feeding-016", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "如何选择配方粉", "content": "崔玉涛介绍配方粉按成分分类选择：按蛋白质结构分普通、部分水解、深度水解和氨基酸配方粉，部分/深度水解可降低致敏性用于预防牛奶蛋白过敏，氨基酸配方粉适用于已牛奶蛋白过敏的宝宝；按脂肪种类分长链和中长链，中长链适合有肠道功能问题的宝宝；按碳水化合物分普通、含部分乳糖和无乳糖配方粉，无乳糖适用于乳糖不耐受。早产儿/低体重儿应选专用配方粉。", "source": [{"book": "崔", "loc": "印刷页127"}], "divergence": false, "divergence_note": null, "tags": ["配方粉选择", "水解配方", "乳糖不耐受"], "third_party": null}, {"id": "0-1月-feeding-017", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "正确冲调配方粉", "content": "崔玉涛给出冲调要点：冲调前先洗净双手，用配方粉自带量匙取适量粉，先加水后加粉、顺序不能颠倒，左右轻摇让粉完全溶解，滴在手腕内侧试温到接近体温再喂。一定严格按包装说明的水粉比例冲调，不要自行调浓或调稀。冲调要用纯净水，不要用果汁或米汤，也不要加调味料；冲调2小时后没喝完就不要再给宝宝喝。", "source": [{"book": "崔", "loc": "印刷页129"}], "divergence": false, "divergence_note": null, "tags": ["配方粉冲调", "水粉比例", "奶温"], "third_party": null}, {"id": "0-1月-feeding-018", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "配方粉喂量与喂养时间", "content": "崔玉涛指出：配方粉喂养的宝宝每天喂哺次数通常为6～7次，每次冲调总奶量约90～120毫升，这只是参考平均值。由于每个宝宝消化吸收不同，实际奶量和喂养次数会有差别，应按宝宝实际需求喂养。判断宝宝发育是否正常主要看身高、体重标准，只要体重稳定上升，吃得少一点也没关系。", "source": [{"book": "崔", "loc": "印刷页130"}], "divergence": false, "divergence_note": null, "tags": ["配方粉喂量", "喂养次数", "按需喂养"], "third_party": null}, {"id": "0-1月-feeding-019", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "奶瓶清洁与开封保存", "content": "崔玉涛指出：清洁奶瓶不需要消毒柜、消毒锅等特殊方式，宝宝喝完奶后用流动清水加奶瓶刷、奶嘴刷洗净即可，干燥是最好的清洁方法；不推荐用奶瓶清洁液，残留可能破坏宝宝肠胃菌群。配方粉一旦开封，包装上的保质期就不再适用，应在3～4周内用完；用封口夹封好，放在干燥清洁处，不要放冰箱，不要用潮湿器具取粉。", "source": [{"book": "崔", "loc": "印刷页131"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶清洁", "配方粉保存", "消毒"], "third_party": null}, {"id": "0-1月-feeding-020", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "配方粉宝宝要喝水吗", "content": "崔玉涛纠正传统观念：喝配方粉的宝宝并不一定容易上火，因为冲调配方粉时已加入适量水，所以通常不太需要额外喝水。判断宝宝是否缺水应观察尿液颜色：尿液无色或淡黄说明水分足够，深黄说明可能缺水。如果宝宝哭闹得厉害，也要注意适当补充水分，避免缺水。", "source": [{"book": "崔", "loc": "印刷页132"}], "divergence": false, "divergence_note": null, "tags": ["配方粉", "喝水", "尿液颜色"], "third_party": null}, {"id": "0-1月-feeding-021", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "混合喂养怎么喂", "content": "崔玉涛介绍：混合喂养是母乳不足时用配方粉作补充，宝宝既吃母乳也吃配方粉。原则上建议先喝母乳，如果宝宝量大且妈妈母乳确实不足，再在喂完母乳后补配方奶。配方粉食用量较难计算，可第一次稍微多冲一些，根据宝宝没喝完剩下的量估算需求，下次按这个标准冲调。尽量多让宝宝吸母乳，刺激更多乳汁分泌。", "source": [{"book": "崔", "loc": "印刷页132"}], "divergence": false, "divergence_note": null, "tags": ["混合喂养", "先喝母乳", "奶量估算"], "third_party": null}, {"id": "0-1月-feeding-022", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "牛奶蛋白过敏", "content": "崔玉涛指出牛奶蛋白过敏是婴幼儿最常见的食物过敏，1岁以内发生概率远高于1岁以上，常表现为湿疹荨麻疹等皮肤症状、腹泻呕吐等胃肠道不适，严重的还有呼吸道症状。母乳喂养的宝宝疑似过敏，多因妈妈饮食含牛奶蛋白，妈妈需回避一切牛奶及奶制品；配方奶喂养的可换成氨基酸配方奶判断。AAP也提到肠痉挛偶尔是宝宝对配方奶中牛奶蛋白过敏的表现。", "source": [{"book": "崔", "loc": "印刷页133"}, {"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}], "divergence": false, "divergence_note": null, "tags": ["牛奶蛋白过敏", "氨基酸配方", "母乳回避饮食"], "third_party": null}, {"id": "0-1月-feeding-023", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "肠痉挛与喂养", "content": "AAP指出约1/5的婴儿会发生肠痉挛（肠绞痛），最常见于2～4周大时，哭闹不止、双脚乱蹬、傍晚加剧，一般在3～4个月大时消失。与喂养相关的改善方法：不要喂得过饱，前后两次喂奶间隔2～2.5小时；母乳喂养且乳汁充足时可只用一侧乳房喂以减少胀气；哺乳期妈妈可尝试停食乳制品等刺激性食物（一次只禁一种）；配方奶喂养可请医生推荐水解蛋白配方奶。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}], "divergence": false, "divergence_note": null, "tags": ["肠痉挛", "肠绞痛", "喂养调整"], "third_party": null}, {"id": "0-1月-feeding-024", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "避免过度喂养", "content": "崔玉涛提醒不要过度喂养：宝宝长得越胖不等于越健康，过度喂养会加重还未发育成熟的胃肠负担、影响消化吸收，还可能导致代谢紊乱、引起肥胖，甚至影响大运动和精细运动发育。判断是否过度喂养可参考吃饱标准，此外还可看每次哺乳间隔是否在合理范围、体重生长曲线是否在正常范围内。", "source": [{"book": "崔", "loc": "印刷页134"}], "divergence": false, "divergence_note": null, "tags": ["过度喂养", "肥胖", "生长曲线"], "third_party": null}, {"id": "0-1月-feeding-025", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "安抚奶嘴的使用", "content": "AAP指出安抚奶嘴满足宝宝不吃奶时的吮吸需求，不能代替或延后吃奶，只在喂完奶或两次喂奶之间、确定不饿时给；母乳喂养的宝宝要等喂养模式确立（约1个月大）再用，睡前用还能降低猝死综合征风险。崔玉涛补充：通常出生至少3周后再用以避免乳头混淆；每次用后清水冲净、干燥保存即可，出现裂纹要更换，多数宝宝6～9个月会主动放弃。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 安抚奶嘴"}, {"book": "崔", "loc": "印刷页149"}], "divergence": false, "divergence_note": null, "tags": ["安抚奶嘴", "乳头混淆", "吮吸需求"], "third_party": null}, {"id": "0-1月-feeding-026", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "母乳不足怎么办", "content": "崔玉涛给出母乳不足的应对建议：第一坚定母乳喂养信心，相信通过科学追奶可恢复；第二保持心情愉快，焦虑会影响泌乳；第三争取家人支持；第四保证充分休息和均衡饮食；第五充分吮吸，初期尽量每天哺乳10～12次、每次至少15分钟，宝宝吮吸是推进泌乳最有效的方法；第六确实不足时合理搭配配方粉，但避免一次母乳一次配方粉的交叉喂养。", "source": [{"book": "崔", "loc": "印刷页84"}], "divergence": false, "divergence_note": null, "tags": ["母乳不足", "追奶", "充分吮吸"], "third_party": null}, {"id": "0-1月-feeding-027", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "如何吸出和储存母乳", "content": "崔玉涛指出妈妈不能哺乳时应及时把乳汁吸出喂养宝宝，电动吸奶器更便捷，挑选时要能模拟宝宝吸吮、吸力适中、易拆洗。储存母乳：4小时内饮用可室温避光保存（20～30℃），冷藏室4℃左右可存约48小时但建议不超过24小时，长期不饮用应冷冻（-15～-5℃可存3～6个月）。加热时把瓶子放40℃左右温水中，不要用微波炉，以免破坏营养。", "source": [{"book": "崔", "loc": "印刷页81"}], "divergence": false, "divergence_note": null, "tags": ["吸奶器", "母乳储存", "母乳加热"], "third_party": null}, {"id": "0-1月-feeding-028", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "哺乳期用药安全", "content": "崔玉涛指出哺乳期用药不能简单判为能吃或不能吃，要看病情、药物成分和使用方式。目前认可度较高的是美国教授黑尔（Thomas W. Hale）的分级，L1、L2级药物对哺乳影响很小，可查询LactMed数据库。一般原则：优先选单一成分、避免复合制剂，外用优于口服、口服优于静脉给药，可把服药时间安排在哺乳后，妈妈务必咨询医生而非自行用药。", "source": [{"book": "崔", "loc": "印刷页78"}], "divergence": false, "divergence_note": null, "tags": ["哺乳期用药", "用药安全", "LactMed"], "third_party": null}, {"id": "0-1月-feeding-029", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "乳头疼痛与乳腺炎", "content": "崔玉涛指出乳头疼痛常因含乳方式不正确（如乳头扁平内陷导致宝宝只含乳头未含乳晕）。软性扁平乳头可每次哺乳前用手牵出再让宝宝含乳，较严重的可用乳头矫形器软化。产后1个月内是乳腺炎高发期：未形成脓肿时以红肿热痛伴发热为主，要尽量让宝宝吸吮、刺激排空乳房，发热超过38.5℃需就诊；已形成脓肿则必须就医，可能需切开引流。", "source": [{"book": "崔", "loc": "印刷页77"}], "divergence": false, "divergence_note": null, "tags": ["乳头疼痛", "扁平乳头", "乳腺炎"], "third_party": null}, {"id": "0-1月-feeding-030", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "feeding", "title": "哺乳前无须消毒乳房", "content": "崔玉涛纠正误区：很多妈妈喂奶前习惯用消毒巾擦拭乳房乳头，其实没有必要。妈妈乳头上和乳腺管内的益生菌对宝宝有益，能帮助宝宝建立肠道正常菌群、促进母乳消化吸收和免疫系统成熟。反复擦拭反而会去除大量益菌，还容易造成妈妈乳头疼痛或皲裂。", "source": [{"book": "崔", "loc": "印刷页74"}], "divergence": false, "divergence_note": null, "tags": ["哺乳准备", "乳房消毒", "益生菌"], "third_party": null}], "development": [{"id": "0-1月-development-001", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "第1个月整体能力", "content": "出生后第1个月，宝宝清醒时间逐渐变长，对外界反应增多，身体动作越来越自如协调，最擅长把手送到嘴边。你说话时他会聆听，被抱着时会盯着你看，偶尔扭动身体回应你。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 生长发育"}], "divergence": false, "divergence_note": null, "tags": ["整体发育", "互动"], "third_party": null}, {"id": "0-1月-development-002", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "1～2周会做的动作", "content": "1～2周时宝宝应该会做出对称的动作（出生后就掌握）。可能会对声音（如妈妈的声音）有反应、视线跟随人或物追到正前方中线位置、注意到人脸。也许会慢慢抬抬头、发出哭声之外的哼哼唧唧声。", "source": [{"book": "崔", "loc": "印刷页43"}, {"book": "崔", "loc": "印刷页44"}], "divergence": false, "divergence_note": null, "tags": ["里程碑", "对称动作"], "third_party": null}, {"id": "0-1月-development-003", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "里程碑只是参考范围", "content": "按月龄列出的会做什么仅代表一个范围，不是硬指标。\"应该会\"约90%宝宝能做到，\"也许会\"约75%~90%，\"可能会\"约50%~75%，\"甚至会\"约25%~50%。家长可通过观察来个体化判断，不必焦虑某一项暂时没做到。", "source": [{"book": "崔", "loc": "印刷页44"}], "divergence": false, "divergence_note": null, "tags": ["里程碑", "个体差异"], "third_party": null}, {"id": "0-1月-development-004", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "反射是本能不是刻意", "content": "前几周宝宝大部分动作都是反射行为，凭本能而非刻意。手指放进嘴里他会条件反射吮吸，亮光照眼会紧闭双眼。有些反射保持几个月，有些几周就消失，反射在一定程度上反映神经发育水平，发现异常应就医检查。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}, {"book": "崔", "loc": "印刷页46"}], "divergence": false, "divergence_note": null, "tags": ["新生儿反射", "神经发育"], "third_party": null}, {"id": "0-1月-development-005", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "觅食反射", "content": "用手拨弄宝宝面颊或嘴唇，他会把头转向你的手，帮助吃奶时找到乳头。起初向左右两边寻找并略微转头，约3周大时能直接把头和嘴凑向乳头吮吸。崔书称为觅食反射，持续到出生后2～4个月。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}, {"book": "崔", "loc": "印刷页46"}], "divergence": false, "divergence_note": null, "tags": ["觅食反射", "吃奶"], "third_party": null}, {"id": "0-1月-development-006", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "吮吸反射", "content": "吮吸是本能反应，胎儿出生前就具备。把乳头和乳晕放进口腔深处他就会自动吮吸。协调吮吸、呼吸、吞咽对新生儿是复杂任务，有的宝宝刚出生掌握得不太好，练习后会越来越熟练。崔书记其持续到出生后约4个月。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}, {"book": "崔", "loc": "印刷页46"}], "divergence": false, "divergence_note": null, "tags": ["吮吸反射", "吃奶"], "third_party": null}, {"id": "0-1月-development-007", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "惊跳（莫罗）反射", "content": "宝宝头部突然变换姿势、后仰，或受到巨大突然声响惊吓时，会伸展手臂、腿和脖子，再迅速把手臂收回抱在身前，可能大哭，看上去像在拥抱什么。这是与生俱来的本能，满月前最常见，约2个月后消失。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}, {"book": "崔", "loc": "印刷页46"}], "divergence": false, "divergence_note": null, "tags": ["惊跳反射", "莫罗反射"], "third_party": null}, {"id": "0-1月-development-008", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "强直性颈部反射", "content": "宝宝头转向一侧时，同侧手臂伸直、另一侧弯曲，看起来像在击剑。这是不太显眼的动作，被干扰或哭泣时可能不表现。崔书称为防御反射。AAP记其约5～7个月消失，崔书记持续到出生后5～7个月。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}, {"book": "崔", "loc": "印刷页47"}], "divergence": false, "divergence_note": null, "tags": ["强直性颈部反射", "防御反射"], "third_party": null}, {"id": "0-1月-development-009", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "两侧反射应对称", "content": "惊跳反射和强直性颈部反射在身体两侧的表现应该一样。如果注意到宝宝一侧的反射和另一侧不一样，或一侧明显比另一侧好，应向儿科医生咨询。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}], "divergence": false, "divergence_note": null, "tags": ["反射对称", "就医信号"], "third_party": null}, {"id": "0-1月-development-010", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "抓握反射", "content": "轻轻抚弄宝宝手掌，他会迅速握住你的手指；搔脚底脚趾会紧紧蜷起。头几天抓握很有力，似乎能吊起整个身体，但他无法控制、随时可能松手，千万不要尝试吊。崔书记握持反射持续到出生后5～6个月。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}, {"book": "崔", "loc": "印刷页47"}], "divergence": false, "divergence_note": null, "tags": ["抓握反射", "安全"], "third_party": null}, {"id": "0-1月-development-011", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "踏步反射", "content": "用双手从腋下托住宝宝并扶住头，让脚掌落在平面上，他会抬起一只脚放到另一只脚前面，像在走路。这有助于新生儿爬到乳房旁吃奶，约2个月大消失，快1岁时作为自主学步行为重新出现。注意别误以为是想走路而让他练走。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}, {"book": "崔", "loc": "印刷页47"}], "divergence": false, "divergence_note": null, "tags": ["踏步反射", "行走反射"], "third_party": null}, {"id": "0-1月-development-012", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "自卫性反射", "content": "宝宝并非完全没有自我保护能力，也有自卫性反射。他会扭头、蠕动身体试图躲避向他飞来的物体；而如果物体只是擦身而过不会打到他，他反而会冷静看着它飞过、身体纹丝不动。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}], "divergence": false, "divergence_note": null, "tags": ["自卫反射", "新生儿能力"], "third_party": null}, {"id": "0-1月-development-013", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "第一次笑", "content": "第1个月最重要的变化之一是宝宝会笑。第一次笑都发生在熟睡时，原因至今未知，可能是感受外界刺激或内心冲动的反应。快满月时他会在清醒时对你展露笑颜，这些笑容会让你们更加亲密。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 第一次笑"}], "divergence": false, "divergence_note": null, "tags": ["微笑", "情感联结"], "third_party": null}, {"id": "0-1月-development-014", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "动作从颤抖到流畅", "content": "出生头1～2周宝宝动作很不平稳，下巴可能发抖、手会颤动，易受惊吓。满月后随神经系统成熟，肌肉控制增强，发抖颤动消失，四肢活动更流畅，像在骑自行车；趴着时腿会做爬行动作，还可能稍微撑起手臂。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["运动发育", "肌肉控制"], "third_party": null}, {"id": "0-1月-development-015", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "颈部力量与抱姿", "content": "新生儿颈部肌肉飞速发育，趴着时能稍微抬头、左右转动，但3个月前还无法自己竖头，所以抱他时一定要扶住头部。崔书也强调抱起、放下宝宝时最需注意保护头颈。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 运动发育"}, {"book": "崔", "loc": "印刷页91"}], "divergence": false, "divergence_note": null, "tags": ["抬头", "护头颈"], "third_party": null}, {"id": "0-1月-development-016", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "趴卧是大运动基础", "content": "宝宝刚出生颈部肌肉弱，俯卧无法自行抬头，趴卧是锻炼抬头最有效的方式，也是翻身、坐、爬、站、走等一切大运动和精细运动发展的基础。趴时双手会松开小拳头，为日后抓握做准备。", "source": [{"book": "崔", "loc": "印刷页117"}, {"book": "崔", "loc": "印刷页118"}], "divergence": false, "divergence_note": null, "tags": ["趴卧", "抬头"], "third_party": null}, {"id": "0-1月-development-017", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "趴卧练习要点", "content": "趴卧练习应在宝宝清醒、精力充沛时进行，避开喂奶前后。练习时大人务必全程在旁看护确保安全，可在一侧放玩具吸引宝宝抬头。可放在仰卧时也可逐渐过渡，配合鼓励让宝宝逐步学会撑起抬头。", "source": [{"book": "崔", "loc": "印刷页118"}], "divergence": false, "divergence_note": null, "tags": ["趴卧", "早教", "安全看护"], "third_party": null}, {"id": "0-1月-development-018", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "看自己的手", "content": "第1个月宝宝应该能看到自己的手了。手指动作有限，大部分时间双手紧握拳，但已能屈起手臂、把手送进嘴里或举到眼前。虽不能准确控制双手，但只要手出现在视线内，他就会盯着仔细研究。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["手部发育", "视觉"], "third_party": null}, {"id": "0-1月-development-019", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "看近物，喜欢看脸", "content": "宝宝出生时边缘视觉好于中心视觉，眼睛在逐渐形成聚焦能力。喜欢注视距离20～30厘米的物体，满月时最远能看到约90厘米。崔书也说约20厘米内能看清，正是吃奶时看妈妈脸的距离；新生儿一般为生理性远视。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 视觉发育"}, {"book": "崔", "loc": "印刷页53"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "看脸"], "third_party": null}, {"id": "0-1月-development-020", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "追视游戏", "content": "宝宝会逐渐学会用视线跟随移动物体。可面对面抱着他、慢慢左右转头，或拿有图案的物体在他面前缓慢移动（不超出视力范围）来锻炼。一开始只能跟上有限范围内缓慢移动的较大物体，很快能跟上更快更小的。满月时崔书也说能较协调地注视物体。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 视觉发育"}, {"book": "崔", "loc": "印刷页53"}], "divergence": false, "divergence_note": null, "tags": ["追视", "早教互动"], "third_party": null}, {"id": "0-1月-development-021", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "喜欢高对比图案", "content": "图案对比越强烈越能吸引新生儿，所以他喜欢看黑白图案或形状对比强烈的条纹、同心圆、棋盘格，以及非常简单的人脸图案。崔书也提到除黑白外宝宝较早能看到红色，对妈妈乳头乳晕之间的颜色较早有识别。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 视觉发育"}, {"book": "崔", "loc": "印刷页53"}], "divergence": false, "divergence_note": null, "tags": ["黑白对比", "视觉刺激"], "third_party": null}, {"id": "0-1月-development-022", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "色觉4个月后才成熟", "content": "给新生儿看蓝、黄、红三个同款玩具，他看红色那个最久，原因未知。色彩识别能力（色觉）要到4个月大以后才完全成熟，所以两个相近的颜色（如绿色和青绿色）他应该看不出区别。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 视觉发育"}], "divergence": false, "divergence_note": null, "tags": ["色觉", "视觉发育"], "third_party": null}, {"id": "0-1月-development-023", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "出院前做听力筛查", "content": "AAP建议所有新生儿出院前都完成听力筛查，父母应主动询问筛查结果。崔书也强调宝宝早期视力、听力等的发育检查，建议家长按时带宝宝做相应的健康与感官检查。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 听觉发育"}, {"book": "崔", "loc": "印刷页53"}], "divergence": false, "divergence_note": null, "tags": ["听力筛查", "检查"], "third_party": null}, {"id": "0-1月-development-024", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "关注人声", "content": "听力正常的新生儿第1个月会非常关注人的声音，尤其是音调较高的儿语。你跟他说话时他会扭头寻找你、仔细听不同音节字词，甚至胳膊和腿会随说话声微微动作。崔书也说宝宝在子宫里就熟悉妈妈的声音，出生后听到会安静下来。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 听觉发育"}, {"book": "崔", "loc": "印刷页54"}], "divergence": false, "divergence_note": null, "tags": ["听觉发育", "人声"], "third_party": null}, {"id": "0-1月-development-025", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "对噪声敏感", "content": "新生儿对不同级别噪声很敏感。耳边发出很响的声音或处在嘈杂房间，他可能被吓呆一动不动，或非常敏感甚至突然大哭、扭动身体远离噪声。但听到轻轻的摇铃或安静音乐，他会机灵起来、转头寻找声音来源。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 听觉发育"}], "divergence": false, "divergence_note": null, "tags": ["听觉发育", "噪声"], "third_party": null}, {"id": "0-1月-development-026", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "能记住声音", "content": "新生儿不仅听力好，还会记住一些声音。研究发现孕晚期反复读过的故事，孩子出生后再听似乎能辨认出来，变得更安静、更投入。可在他清醒专注时连续几天读同一童话，隔一两天再读，看他能否辨认。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 听觉发育"}], "divergence": false, "divergence_note": null, "tags": ["听觉记忆", "早教"], "third_party": null}, {"id": "0-1月-development-027", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "嗅觉偏好", "content": "新生儿对味道气味有偏好：闻到奶、香草、香蕉或糖会深深吸气，闻到酒精或醋会皱鼻。接近1周大时母乳喂养的宝宝会把头转向自己母亲的乳房，对其他哺乳期女性没什么反应，这套雷达系统帮他找到食物来源、远离危险。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 嗅觉和触觉发育"}, {"book": "崔", "loc": "印刷页54"}], "divergence": false, "divergence_note": null, "tags": ["嗅觉发育", "认妈妈"], "third_party": null}, {"id": "0-1月-development-028", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "触觉与被对待方式", "content": "新生儿对接触物体的质地和被对待方式很敏感：会贴近柔软绒布、推开粗糙麻布。用手掌轻轻抚摸他会放松安静，粗鲁抱起会反抗大哭，慢慢摇动会安静专注。不开心或昏昏欲睡时，抱起、抚摸、轻摇、拥抱都能传递父母爱意、让他平静或清醒。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 嗅觉和触觉发育"}], "divergence": false, "divergence_note": null, "tags": ["触觉发育", "安抚"], "third_party": null}, {"id": "0-1月-development-029", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "抚触促进发育", "content": "研究发现抚摸宝宝身体能有效刺激大脑中枢神经系统，促进智力和生长发育，增进安全感、密切亲子关系、减少哭闹、改善睡眠。抚触前室温保持26℃左右、环境安静，用无刺激非芳香按摩油，修剪指甲、摘下饰品，把油在手心温热后再涂。", "source": [{"book": "崔", "loc": "印刷页106"}], "divergence": false, "divergence_note": null, "tags": ["抚触", "早教", "亲子"], "third_party": null}, {"id": "0-1月-development-030", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "抚触手法与时长", "content": "抚触可按面部、胸腹部、腹部、胳膊双手、腿部臀部、背部的顺序进行，但不必一成不变，可按宝宝喜好调整。动作要柔缓，不强行抚摸，通过轻触把体温和爱意传给宝宝。每次5～10分钟、每天1～3次，综合考虑宝宝的接受度与周围环境。", "source": [{"book": "崔", "loc": "印刷页106"}, {"book": "崔", "loc": "印刷页109"}], "divergence": false, "divergence_note": null, "tags": ["抚触", "手法", "时长"], "third_party": null}, {"id": "0-1月-development-031", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "被动操要在医生指导下", "content": "被动操不同于抚触，带一定治疗作用，适合神经系统、运动功能有障碍的宝宝，但需医生评估具体情况、制定方案并阶段性复查调整。家长不具备相关知识时盲目锻炼可能拔苗助长甚至伤害宝宝，不如学习抚触，既有益又能增进亲子互动。", "source": [{"book": "崔", "loc": "印刷页110"}], "divergence": false, "divergence_note": null, "tags": ["被动操", "谨慎", "遵医嘱"], "third_party": null}, {"id": "0-1月-development-032", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "多和宝宝说话", "content": "宝宝眼睛还看不清时就能听清周围一切。多和他说话、叫他的乳名、介绍家人、唱摇篮曲、讲故事，能给他安慰、建立紧密亲子关系、促进语言发展。说话用正确词汇、用爸爸妈妈代替你我，不要故意说吃饭饭、看狗狗这类叠词，以免做错误语言示范。", "source": [{"book": "崔", "loc": "印刷页112"}, {"book": "崔", "loc": "印刷页113"}], "divergence": false, "divergence_note": null, "tags": ["语言发展", "早教", "亲子互动"], "third_party": null}, {"id": "0-1月-development-033", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "留出回应机会", "content": "和宝宝交流时要鼓励他、拉长两句话之间的间隔，给宝宝充分的发言机会，等待他用手脚来回应。宝宝的语言能力不是一朝一夕能提升的，不管他能否回应，家长都要坚持和宝宝谈话。", "source": [{"book": "崔", "loc": "印刷页113"}], "divergence": false, "divergence_note": null, "tags": ["语言发展", "互动节奏"], "third_party": null}, {"id": "0-1月-development-034", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "互动像跳双人舞", "content": "这些可爱的笑容会让你们更亲密，你很快能预测宝宝何时对你笑、看你、发声、何时玩累停下。你们会熟悉彼此的反应模式，玩耍像跳双人舞般轮流领舞。辨别并回应他的微妙信号，会让他知道自己的想法感受很重要，这对自我认同感和幽默感的形成至关重要。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 第一次笑"}], "divergence": false, "divergence_note": null, "tags": ["亲子互动", "自我认同"], "third_party": null}, {"id": "0-1月-development-035", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "性格因人而异", "content": "同一家庭的两个新生儿，一个安静爱自己玩、睡得久吃奶少，一个易烦躁受惊、总在动睡得少，两者都绝对健康正常，没有谁更好。宝宝早早显露独特性格特质，从入睡到哭闹方式都藏着线索，投入关注越多越能恰当回应、生活越平静。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 性格发育"}], "divergence": false, "divergence_note": null, "tags": ["性格发育", "个体差异"], "third_party": null}, {"id": "0-1月-development-036", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "没有唯一正确的育儿法", "content": "早期性格特质大多源自遗传，早产儿可能显露得迟一些。孩子的性格会影响你对待他的方式，对书本、文章和亲友的建议都要慎重考虑，并没有适合所有孩子的唯一育儿方式。应根据孩子独特性格、自己的信念和家庭环境确立原则，尊重孩子的个性和长处。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 性格发育"}], "divergence": false, "divergence_note": null, "tags": ["育儿理念", "尊重个性"], "third_party": null}, {"id": "0-1月-development-037", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "development", "title": "双眼运动不协调是正常", "content": "新生儿眼睑肌肉和神经尚未完全控制，视觉未发育完全，双眼运动可能不协调，出现斗鸡眼或内斜视，家长看到不必过于担忧，属发育期正常现象，约3个月左右会正常。但若3个月后仍持续单眼或双眼向外斜、或仍内斜视，应找眼科医生就诊以防弱视。", "source": [{"book": "崔", "loc": "印刷页124"}, {"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["斜视", "视觉发育", "就医信号"], "third_party": null}], "care": [{"id": "0-1月-care-001", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "新生儿睡眠时间长", "content": "新生儿几乎整天都在睡，大多数每天睡约14小时，有的安静的宝宝睡得久、吃奶频率低，有的容易烦躁、只睡10小时且一有动静就醒。只要宝宝状态正常、进食和生长有保证，睡得多是正常现象，不必紧张。", "source": [{"book": "崔", "loc": "印刷页125"}, {"book": "AAP", "loc": "第6章 第1个月 · 性格发育"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "新生儿", "作息"], "third_party": null}, {"id": "0-1月-care-002", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "务必仰卧睡", "content": "一定要让宝宝仰卧睡觉，不要俯卧，也不要躺在柔软的被子和枕头上，要在硬实平坦的平面上睡。趴睡时口鼻易被枕头、毛毯堵住，存在婴儿猝死综合征(SIDS)风险。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 预防窒息"}, {"book": "崔", "loc": "印刷页112"}], "divergence": false, "divergence_note": null, "tags": ["睡姿", "安全", "仰卧"], "third_party": null}, {"id": "0-1月-care-003", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "睡眠环境要安全", "content": "婴儿床上不要放松软物品，床垫要平坦紧实，只用大小合适的床单。不要用宽松的毯子或被子盖宝宝，以免缠住或窒息，可用可穿式毯子或睡袋。不要让宝宝睡在大人身边，应睡在自己的婴儿床或床边的摇篮里。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 预防窒息"}], "divergence": false, "divergence_note": null, "tags": ["睡眠环境", "安全", "婴儿床"], "third_party": null}, {"id": "0-1月-care-004", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "睡眠时呼吸可能不规律", "content": "新生儿睡着时呼吸频率波动较大，间隔时间长，偶尔出现短暂呼吸暂停(短于10秒)后恢复正常节律，这叫周期性呼吸，是正常现象。但若呼吸暂停同时心率加快、鼻翼扇动、嘴唇或脸色发青发紫、胸腔肌肉凹陷，应立即就医。", "source": [{"book": "崔", "loc": "印刷页125"}, {"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["呼吸", "睡眠", "异常信号"], "third_party": null}, {"id": "0-1月-care-005", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "抱宝宝要护住头颈", "content": "新生儿无法自己控制头部，抱起、放下或交给别人抱时都要避免头部前后左右晃动。平躺抱时用手轻托头部，竖抱时托住头部和颈部。崔玉涛建议抱起卧躺宝宝时一手托头颈、一手托屁股，动作要稳。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 如何抱新生儿？"}, {"book": "崔", "loc": "印刷页91"}], "divergence": false, "divergence_note": null, "tags": ["抱姿", "头颈支撑", "护理"], "third_party": null}, {"id": "0-1月-care-006", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "勤换纸尿裤防红屁股", "content": "月子里每隔2小时甚至更短就要换一次纸尿裤，这是预防尿布疹最有效的方法。可看纸尿裤尿量线变色判断是否需更换；睡眠中不必刻意叫醒换，除非已胀满或排了大便。换好后松紧以能伸入两根手指为宜。", "source": [{"book": "崔", "loc": "印刷页94"}], "divergence": false, "divergence_note": null, "tags": ["纸尿裤", "护理", "尿布疹"], "third_party": null}, {"id": "0-1月-care-007", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "脐带残端护理", "content": "脐带残端一般在出生后10天到3周左右干燥脱落。脱落前每天早晚各消毒一次，用棉签蘸75%酒精或碘伏，提起根部擦拭，并尽量保持清洁干燥；穿纸尿裤时把前缘向下折到脐带以下避免摩擦浸泡。脱落后再坚持消毒约3天。", "source": [{"book": "崔", "loc": "印刷页104"}, {"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}], "divergence": false, "divergence_note": null, "tags": ["脐带护理", "消毒", "新生儿"], "third_party": null}, {"id": "0-1月-care-008", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "脐带渗液结痂多为正常", "content": "脐带残端脱落后偶尔会渗出少量血样或淡黄色清亮分泌物，只要保持清洁干燥一般会自愈。若脐周发红肿胀、有大量分泌物或脓性分泌物、伴发热，或3周后仍未愈合，应及时就医。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 皮疹和感染"}, {"book": "崔", "loc": "印刷页105"}], "divergence": false, "divergence_note": null, "tags": ["脐带护理", "异常信号", "感染"], "third_party": null}, {"id": "0-1月-care-009", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "给宝宝穿脱衣服的技巧", "content": "新生儿身体柔软、不会配合，穿脱衣服时不要硬来。穿开身连体衣时把袖口叠成圆环，从袖口伸手帮宝宝把手引出；穿套头衫时一手护住宝宝的脸、一手将衣领套过头。无论穿脱都要用手护住头部，尽量不用衣服遮住脸。", "source": [{"book": "崔", "loc": "印刷页96"}], "divergence": false, "divergence_note": null, "tags": ["穿衣", "护理", "新生儿"], "third_party": null}, {"id": "0-1月-care-010", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "给宝宝洗澡的要点", "content": "崔玉涛建议洗澡时室温约28℃、水温38-40℃、水深5-8厘米，并先准备好用品。一只手托住头部和背部让宝宝半躺，水不要没过肩膀，按从上到下、从前到后清洗，褶皱处重点清洗。AAP提醒最好用单独婴儿浴盆，放好水并检查水温后再放宝宝，全程托住腋下，绝不可让水中的宝宝离开看护一分钟。", "source": [{"book": "崔", "loc": "印刷页99"}, {"book": "AAP", "loc": "第6章 第1个月 · 洗澡"}], "divergence": false, "divergence_note": null, "tags": ["洗澡", "护理", "安全"], "third_party": null}, {"id": "0-1月-care-011", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "男女宝宝私处护理", "content": "男宝宝私处只需用清水冲洗，不要上翻阴茎包皮去清洁褶皱，以免刺激发炎。女宝宝清洁要遵守从前向后擦拭或冲洗的原则，避免过度清洁，否则可能破坏保护性菌群甚至造成阴唇粘连。", "source": [{"book": "崔", "loc": "印刷页100"}], "divergence": false, "divergence_note": null, "tags": ["私处护理", "清洁", "护理"], "third_party": null}, {"id": "0-1月-care-012", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "耳朵和鼻腔护理别乱掏", "content": "耳朵有自我清洁功能，少量耳屎会自动排出，用棉签掏反而会把耳屎推入更深处，护理时只需用温热毛巾清洁耳郭。鼻腔分泌物较稀时可用湿润棉棒轻擦；较干硬可让宝宝在充满水蒸气的浴室待约15分钟软化后再清理。", "source": [{"book": "崔", "loc": "印刷页103"}], "divergence": false, "divergence_note": null, "tags": ["耳朵护理", "鼻腔护理", "清洁"], "third_party": null}, {"id": "0-1月-care-013", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "给宝宝做抚触", "content": "抚触能刺激宝宝大脑神经系统、促进发育，增进亲子安全感，还能在一定程度上减少哭闹、改善睡眠。崔玉涛建议室温约26℃、环境安静，用无刺激的非芳香按摩油先在掌心温热，按面部、胸腹、四肢、背部顺序轻柔进行，每次5-10分钟、每天1-3次。", "source": [{"book": "崔", "loc": "印刷页106"}], "divergence": false, "divergence_note": null, "tags": ["抚触", "睡眠", "亲子互动"], "third_party": null}, {"id": "0-1月-care-014", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "学会分辨宝宝的哭声", "content": "宝宝用哭表达饥饿、排泄、不适、疲倦、无聊等需求。崔玉涛建议先排查饥饿、过热过冷、需换尿裤、衣物或皮肤异常等原因。AAP指出2周大左右开始爱哭闹，这个阶段不会被宠坏，应尽可能满足需要，抱起、抚摸、轻摇、拥抱都能让他平静下来。", "source": [{"book": "崔", "loc": "印刷页110"}, {"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}], "divergence": false, "divergence_note": null, "tags": ["哭声", "安抚", "护理"], "third_party": null}, {"id": "0-1月-care-015", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "肠绞痛(肠痉挛)的缓解", "content": "约1/5婴儿会发生肠绞痛，最常见于2-4周大时，表现为无休止哭闹、尖叫、双脚乱蹬、放屁，傍晚加剧，一般3-4个月时消失。缓解方法包括：顺时针按摩腹部、俯卧或飞机抱给腹部施压、吮吸安抚、减少声光气味等外界刺激、用背带背着走动。AAP提醒先请医生排除疾病。", "source": [{"book": "崔", "loc": "印刷页141"}, {"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}], "divergence": false, "divergence_note": null, "tags": ["肠绞痛", "安抚", "哭闹"], "third_party": null}, {"id": "0-1月-care-016", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "千万不可大力摇晃宝宝", "content": "不管多不耐烦、多生气，都绝对不可以大力摇晃孩子，大力摇晃会造成婴儿失明、脑损伤甚至死亡(摇晃婴儿综合征)。情绪难以应对时，可把宝宝仰卧放在婴儿床等安全处，离开房间几分钟，或请人帮忙照看。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}], "divergence": false, "divergence_note": null, "tags": ["安全", "摇晃婴儿综合征", "哭闹"], "third_party": null}, {"id": "0-1月-care-017", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "安抚奶嘴的使用", "content": "安抚奶嘴满足宝宝吃奶之外的吮吸需求，睡前使用还能降低婴儿猝死综合征风险，但不能代替或延后吃奶，只在确定不饿时给。两书一致建议母乳喂养的宝宝要等喂养模式确立、约出生3周到1个月后再用，以免乳头混淆；宝宝不想用或奶嘴常掉出就不要强迫。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 安抚奶嘴"}, {"book": "崔", "loc": "印刷页149"}], "divergence": false, "divergence_note": null, "tags": ["安抚奶嘴", "吮吸", "睡眠"], "third_party": null}, {"id": "0-1月-care-018", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "安抚奶嘴的选购与清洁", "content": "挑选合乎宝宝年龄、奶头柔软、没有可拆卸部件的整体式奶嘴(零件可能堵塞呼吸道)，绝不能用奶瓶上的奶嘴代替，也不要用绳子系在宝宝身上以防勒住。要经常用沸水消毒或洗碗机清洗。崔玉涛补充：奶嘴出现裂纹小孔要及时报废，建议每2-3个月更换一次。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 安抚奶嘴"}, {"book": "崔", "loc": "印刷页150"}], "divergence": false, "divergence_note": null, "tags": ["安抚奶嘴", "安全", "清洁"], "third_party": null}, {"id": "0-1月-care-019", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "判断宝宝穿多少", "content": "摸手脚判断冷热不准确，因为新生儿心脏小、四肢末梢血液少，手脚偏凉是正常的。正确做法是摸后脖颈，温热说明穿得合适，闷热或出汗说明穿多了。AAP建议按比身边大人多穿一层的原则，不要包得密不透风。", "source": [{"book": "崔", "loc": "印刷页148"}, {"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}], "divergence": false, "divergence_note": null, "tags": ["穿衣", "体温", "护理"], "third_party": null}, {"id": "0-1月-care-020", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "注意新生儿的体温调节", "content": "新生儿出生时体温调节中枢还不能正常工作，加上脂肪含量不足，温度突变时身体无法保温，所以穿衣要随冷热调整。AAP提醒：若宝宝手脚和胸部摸起来都不暖，应带到暖和的屋子，解开衣物、喂奶或用体温温暖他，注意先恢复体温再加衣，否则只是把冷空气裹在里面。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}], "divergence": false, "divergence_note": null, "tags": ["体温", "保暖", "护理"], "third_party": null}, {"id": "0-1月-care-021", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "适宜的室内温湿度", "content": "崔玉涛建议保持适宜室内温湿度：判断温度可摸宝宝后背，温热即合适；用空调时出风口不要对着宝宝、温度约26℃，并定期清洗滤网。湿度控制在45%-65%、约50%为宜，用加湿器要定期清洗、不要在水中加精油或花草。", "source": [{"book": "崔", "loc": "印刷页113"}], "divergence": false, "divergence_note": null, "tags": ["室内温湿度", "睡眠环境", "护理"], "third_party": null}, {"id": "0-1月-care-022", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "给宝宝剪指甲", "content": "新生儿指甲薄、容易划伤自己，要及时修剪。可用婴儿专用指甲刀，最好趁宝宝熟睡时操作并保证光线充足。正确做法是把指甲剪成长方形、剪角处修成圆弧、不要剪得过短，以免新长出的指甲长入肉里形成嵌甲。", "source": [{"book": "崔", "loc": "印刷页147"}], "divergence": false, "divergence_note": null, "tags": ["剪指甲", "护理", "安全"], "third_party": null}, {"id": "0-1月-care-023", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "清洗宝宝的衣物", "content": "宝宝衣物上常有奶渍、尿渍、粪迹，应先用清水清洗，可用婴儿专用洗衣液并用大量清水漂洗干净，避免残留化学成分刺激皮肤。要与家人衣物分开洗，并尽量避免使用含荧光增白剂的洗衣液。", "source": [{"book": "崔", "loc": "印刷页113"}], "divergence": false, "divergence_note": null, "tags": ["衣物清洗", "护理", "清洁"], "third_party": null}, {"id": "0-1月-care-024", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "多和宝宝说话", "content": "在宝宝还看不清事物时已能听到周围一切，父母的声音和触摸能给他稳定的安慰、建立亲密的亲子关系，也促进语言发展。崔玉涛提醒：交流时不要故意说叠词，要用正确词汇、轻柔语气，并在两句话之间留间隔给宝宝回应机会。", "source": [{"book": "崔", "loc": "印刷页112"}], "divergence": false, "divergence_note": null, "tags": ["亲子互动", "语言", "护理"], "third_party": null}, {"id": "0-1月-care-025", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "乘车必须坐安全座椅", "content": "新生儿每次乘车都要坐在经认证、正确安装的后向式汽车安全座椅上并系好安全带，且要坐在汽车后排，千万不可坐前排(气囊可能致命)。不要把安全座椅当作在家睡觉的床。乘飞机也最好让宝宝坐在自己的安全座椅上，而非抱在腿上。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 汽车安全座椅"}, {"book": "AAP", "loc": "第6章 第1个月 · 带着婴儿旅行"}], "divergence": false, "divergence_note": null, "tags": ["乘车安全", "安全座椅", "出行"], "third_party": null}, {"id": "0-1月-care-026", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "防摔落、防烫伤等日常安全", "content": "绝不要把宝宝单独留在尿布台、床、沙发等高于地面的台面上，手要时刻扶着，离开就放进婴儿床。抱着宝宝时不要拿咖啡、茶等热液体，也不要靠近热源。家中应安装并定期检查烟雾和一氧化碳探测器。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 预防摔落"}, {"book": "AAP", "loc": "第6章 第1个月 · 防火和预防烫伤"}], "divergence": false, "divergence_note": null, "tags": ["安全", "防摔", "防烫伤"], "third_party": null}, {"id": "0-1月-care-027", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "不要给宝宝戴项链系绳子", "content": "不要让窗帘绳等细绳在婴儿床上方或附近晃动，婴儿床要远离窗户和窗帘绳。不要把安抚奶嘴、饰品用绳子系在床上或宝宝身上，不要给宝宝戴项链等挂脖饰品，也不要穿有带子的衣服，以免缠绕、勒住造成危险。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 项链和细绳"}], "divergence": false, "divergence_note": null, "tags": ["安全", "细绳", "窒息预防"], "third_party": null}, {"id": "0-1月-care-028", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "带宝宝外出与晒太阳防护", "content": "天气好时可带宝宝出门散步，但6个月前皮肤对阳光相当敏感，要避免阳光直射，穿浅色衣服、戴遮阳帽，待在阴凉处。炎热季节不要把安全座椅、手推车长时间放在太阳下以免塑料金属晒烫伤宝宝，使用前先摸表面温度。寒冷或雨天尽量待在室内。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外出"}], "divergence": false, "divergence_note": null, "tags": ["外出", "防晒", "护理"], "third_party": null}, {"id": "0-1月-care-029", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "拍照不要用闪光灯", "content": "两书一致提醒给新生儿拍照不要用闪光灯，强烈白光会对宝宝眼睛和视网膜造成伤害甚至影响视力发育，应尽量在自然光或柔和光线下拍。崔玉涛还提醒不要为拍摄效果强迫宝宝保持某种姿势。", "source": [{"book": "崔", "loc": "印刷页115"}, {"book": "崔", "loc": "印刷页152"}], "divergence": false, "divergence_note": null, "tags": ["拍照", "视力保护", "安全"], "third_party": null}, {"id": "0-1月-care-030", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "新生儿排便模式差异大", "content": "新生儿无论每次吃完奶都排便还是好几天排一次，只要饮食正常一般都不必担心。AAP提醒两个例外：大便坚硬如石头要让医生检查；母乳喂养宝宝每天排便不足4次可能是奶量不足，需测体重。需警惕的大便颜色是白色(肝胆问题)和红色或黑褐色(可能出血)。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 排便"}], "divergence": false, "divergence_note": null, "tags": ["排便", "作息", "异常信号"], "third_party": null}, {"id": "0-1月-care-031", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "care", "title": "嗜睡需警惕", "content": "AAP提醒：如果宝宝突然比平时睡得多，可能提示受到感染，需咨询医生。母乳喂养的新生儿若在第1个月总是一睡5小时以上、不主动醒来吃奶，要考虑是不是没吃饱；配方奶喂养同理。看起来过度肢体无力或瘫软也要立即就医。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["嗜睡", "睡眠", "异常信号"], "third_party": null}], "health": [{"id": "0-1月-health-001", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "出生后体重先降后升", "content": "新生儿出生后体内多余体液会在几天内排出，出生7天内体重大约减轻10%。崔玉涛也指出出生后前5天体重减轻是正常的，只要下降不超过出生体重的10%。两书都强调从出生第5天起体重应稳步回升，约2周大时恢复到出生体重水平。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}, {"book": "崔", "loc": "印刷页50"}], "divergence": false, "divergence_note": null, "tags": ["体重", "生长", "新生儿"], "third_party": null}, {"id": "0-1月-health-002", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "满月生长参考值", "content": "AAP给出第1个月生长参考：体重平均每天增加20～30克，满月可达约4.5千克，身高增加4.5～5厘米，头围从约35厘米长到约38厘米。崔玉涛补充正常足月儿平均出生体重约3.3千克，出生第一个月体重增长1～1.7千克。这些只是平均值，个体差异较大。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}, {"book": "崔", "loc": "印刷页49"}], "divergence": false, "divergence_note": null, "tags": ["生长曲线", "体重", "头围"], "third_party": null}, {"id": "0-1月-health-003", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "用生长曲线连续监测", "content": "崔玉涛强调单次测量结果片面，应从出生起每月定期测量身高、体重和头围，描在WHO生长曲线上连成曲线看趋势；第3至97百分位之间属正常，第50百分位为平均值。AAP也建议把体重记录在生长曲线中跟踪。判断发育是否正常要看连续趋势而非一次数值。", "source": [{"book": "崔", "loc": "印刷页47"}, {"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}], "divergence": false, "divergence_note": null, "tags": ["生长曲线", "头围", "监测"], "third_party": null}, {"id": "0-1月-health-004", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "头围反映大脑发育", "content": "两书都把头围作为间接反映大脑发育的重要指标。AAP指出前4个月是颅骨生长最快阶段，医生会特别关注头部生长。崔玉涛提醒头围过大或突然增长过快可能是脑积水、脑肿瘤等，头围过小可能是发育不良或颅缝闭合过早，出现这些情况都应带宝宝就医。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}, {"book": "崔", "loc": "印刷页52"}], "divergence": false, "divergence_note": null, "tags": ["头围", "大脑发育", "就医信号"], "third_party": null}, {"id": "0-1月-health-005", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "新生儿头形变形会自行恢复", "content": "经过产道挤压，新生儿头部可能呈锥形或变形，即使剖宫产也会有不同程度变形。两书都说明这是暂时的，几天到1～2周内会逐渐变圆、恢复正常，分娩产生的头皮擦伤、眼皮肿胀也会在1～2周内消退。家长不必担心。", "source": [{"book": "崔", "loc": "印刷页44"}, {"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}], "divergence": false, "divergence_note": null, "tags": ["头形", "新生儿外观", "恢复"], "third_party": null}, {"id": "0-1月-health-006", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "手脚发凉发青是正常的", "content": "AAP指出新生儿肤色不均匀，手脚通常比身体其他部位凉、肤色偏青，因为手脚血管对温度更敏感、遇冷会收缩，活动一下四肢很快就会红润。崔玉涛在判断穿衣时也提醒新生儿心脏小、泵到四肢末梢血液少，手脚偏凉是正常的，不要靠摸手脚判断冷热。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}, {"book": "崔", "loc": "印刷页148"}], "divergence": false, "divergence_note": null, "tags": ["手脚发凉", "肤色", "正常现象"], "third_party": null}, {"id": "0-1月-health-007", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "新生儿体温调节弱要注意穿衣", "content": "AAP说明新生儿刚出生时体温调节中枢还不能正常工作、脂肪含量不足，温度突变时难以保温，经验上应比身边大人多穿一层，但不要包得密不透风。崔玉涛建议判断冷热要摸宝宝后脖颈，温热说明合适，摸到出汗反而是穿多了。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}, {"book": "崔", "loc": "印刷页149"}], "divergence": false, "divergence_note": null, "tags": ["体温调节", "穿衣", "保暖"], "third_party": null}, {"id": "0-1月-health-008", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "新生儿反射是正常神经表现", "content": "两书都介绍新生儿期的本能反射，包括觅食、吮吸、握持、踏步、惊跳（莫罗）反射、强直性颈部反射等，它们在一定程度上反映神经发育水平，大多在出生后几周到4～6个月内消失。崔玉涛提醒一旦观察到异常应带宝宝检查；AAP特别指出身体两侧反射应对称，若一侧明显不同应咨询儿科医生。", "source": [{"book": "崔", "loc": "印刷页46"}, {"book": "AAP", "loc": "第6章 第1个月 · 反射行为"}], "divergence": false, "divergence_note": null, "tags": ["新生儿反射", "神经发育", "对称性"], "third_party": null}, {"id": "0-1月-health-009", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "新生儿黄疸及就医信号", "content": "两书都指出新生儿黄疸常见，母乳喂养可能持续2～3周，配方奶喂养一般2周内消退。崔玉涛区分生理性与病理性：出生24小时内或满月后出现、或几小时几天内迅速变黄要怀疑病理性，需就医。AAP提醒若黄疸持续3周以上或皮肤发黄加重，应尽快看儿科医生。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页61"}], "divergence": false, "divergence_note": null, "tags": ["黄疸", "就医信号", "新生儿"], "third_party": null}, {"id": "0-1月-health-010", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "母乳是退黄的关键", "content": "崔玉涛指出应对黄疸最好的办法是尽量多给宝宝喂母乳，排便越多排出的胆红素越多，黄疸退得越快，不建议给宝宝喂葡萄糖水。崔还说明母乳性黄疸是生理性的一种，可能持续较长，不应因此盲目停母乳。", "source": [{"book": "崔", "loc": "印刷页62"}], "divergence": false, "divergence_note": null, "tags": ["黄疸", "母乳喂养", "退黄"], "third_party": null}, {"id": "0-1月-health-011", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "发热是新生儿的危险信号", "content": "两书一致：1个月大的婴儿发热往往提示感染，可能快速引发严重疾病。AAP明确直肠温度达38℃及以上、且未穿过厚衣服，应立即就医。崔玉涛在哭闹判断中也提示宝宝体温异常、超过38度以上必须就医。这个月龄的发热务必尽快看医生。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页111"}], "divergence": false, "divergence_note": null, "tags": ["发热", "就医信号", "感染"], "third_party": null}, {"id": "0-1月-health-012", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "呼吸异常的就医信号", "content": "AAP给出呼吸观察标准：正常每分钟20～40次，可有短暂周期性呼吸；当呼吸超过每分钟60次，或胸部肌肉凹陷、鼻翼扩张、严重咳嗽，必须就医。崔玉涛也列出立即就医的呼吸警示：呼吸暂停伴呼吸频率加快、鼻翼扇动、嘴唇或脸色发紫、吸气时胸腔凹陷。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页125"}], "divergence": false, "divergence_note": null, "tags": ["呼吸", "就医信号", "鼻翼扇动"], "third_party": null}, {"id": "0-1月-health-013", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "喉喘鸣多为喉软骨软化", "content": "两书都讲到新生儿吃奶或哭闹时喉咙发出喘鸣声，最常见病因是先天性喉软骨软化症，仰卧、吃奶、哭泣时可能加剧，多数能正常增重、随发育自行消失（崔说约18个月）。但两书都提示警惕信号：进食困难（咳嗽、被呛、喷射性吐奶）、体重不增、呼吸困难或脸色改变时应立即就医。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页125"}], "divergence": false, "divergence_note": null, "tags": ["喉喘鸣", "喉软骨软化", "就医信号"], "third_party": null}, {"id": "0-1月-health-014", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "正常大便颜色与异常警示", "content": "两书都说明新生儿大便颜色范围很广都属正常（崔：黑绿胎便、深黄绿过渡便、母乳金黄软便等）。共同的危险信号是白色/灰白色大便，可能提示肝脏或胆道问题（崔特别指出先天性胆道闭锁需立即就医）。AAP还提示红色或黑褐色大便可能是消化道出血迹象。", "source": [{"book": "崔", "loc": "印刷页66"}, {"book": "AAP", "loc": "第6章 第1个月 · 排便"}], "divergence": false, "divergence_note": null, "tags": ["大便颜色", "胆道闭锁", "就医信号"], "third_party": null}, {"id": "0-1月-health-015", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "排便次数与喂养是否足够", "content": "AAP指出母乳喂养新生儿接近第5天每天至少排便4次，若次数没增加可能进食不足，应让医生测体重；大便坚硬如石头也要就医。崔玉涛也说排便次数与进食频率相关、次数多说明吃得好，只要不便秘（粪便干硬、排便困难）就不必干预。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 排便"}, {"book": "崔", "loc": "印刷页145"}], "divergence": false, "divergence_note": null, "tags": ["排便", "喂养充足", "便秘"], "third_party": null}, {"id": "0-1月-health-016", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "腹泻与脱水风险", "content": "AAP说明母乳喂养后拉水样便往往正常，但配方奶喂养婴儿每天6～8次或更多稀软水样便就是腹泻，常见病因是病毒感染，危险在于脱水。脱水初期表现为口唇干燥、尿湿尿布锐减，发现大便很稀且次数明显增多应带孩子就医，不要拖到脱水。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["腹泻", "脱水", "就医信号"], "third_party": null}, {"id": "0-1月-health-017", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "溢奶吐奶与喷射性呕吐", "content": "两书都说明新生儿溢奶常见，因胃呈水平位、贲门括约肌发育不完善所致，属生理现象。崔建议喂奶后保持45°抱姿、拍嗝15分钟左右再放下。共同的危险信号是喷射性呕吐：AAP提示喷射几厘米远要立即就医排查幽门狭窄，崔提示喷射状、呕吐物呈绿色或血色、体重下降时及时就医。", "source": [{"book": "崔", "loc": "印刷页88"}, {"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["溢奶", "喷射性呕吐", "幽门狭窄"], "third_party": null}, {"id": "0-1月-health-018", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "嗜睡可能提示问题", "content": "AAP提醒若孩子突然比平时睡得多可能是感染，应咨询儿科医生；母乳或配方奶喂养的新生儿若总是一睡5小时以上不主动醒来吃奶，要考虑是否没吃饱。崔玉涛也提到宝宝吃奶睡着是否唤醒主要靠妈妈判断，到了喂奶时间需要唤醒喂养。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页75"}], "divergence": false, "divergence_note": null, "tags": ["嗜睡", "喂养", "就医信号"], "third_party": null}, {"id": "0-1月-health-019", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "泪道阻塞与眼部分泌物", "content": "两书都讲新生儿鼻泪管窄、易部分或全部阻塞，导致溢泪、眼角黄白色分泌物，但这并不代表眼部感染，多数到9个月至1岁内自行打开。可在医生指导下按摩内眼角和鼻梁两侧帮助疏通。AAP提示若眼睛充血变红、分泌物过多可能是结膜炎需就医。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页56"}], "divergence": false, "divergence_note": null, "tags": ["泪道阻塞", "眼部分泌物", "按摩"], "third_party": null}, {"id": "0-1月-health-020", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "颤抖：正常与异常", "content": "两书都指出新生儿下巴和手颤抖很常见，是神经系统发育不成熟所致，满月后随肌肉控制增强会消失（崔归为动作不平稳）。AAP特别提示警惕信号：如果整个身体都在颤抖，可能是低血糖、低血钙甚至抽风，应告诉儿科医生诊断病因。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页43"}], "divergence": false, "divergence_note": null, "tags": ["颤抖", "低血糖", "就医信号"], "third_party": null}, {"id": "0-1月-health-021", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "肢体过度无力要就医", "content": "AAP说明新生儿肌肉未发育完全、总有某种程度的肢体无力是正常的，但如果看上去过度无力或瘫软，可能提示感染等更严重问题，应立即向儿科医生咨询。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["肢体无力", "就医信号", "感染"], "third_party": null}, {"id": "0-1月-health-022", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "留意听力反应", "content": "AAP建议新生儿出院前应完成听力筛查，家长还应注意观察孩子对声音的反应：突然大响时会不会被吓一跳、说话时会不会安静或转头。若反应不正常，或孩子是超早产儿、出生缺氧、严重感染、家族有儿童期听力损失史，应及早做正规听力检查，以免影响语言发展。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["听力", "听力筛查", "语言发展"], "third_party": null}, {"id": "0-1月-health-023", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "留意视力追视", "content": "AAP建议观察孩子醒着时眼球能否在20～30厘米处跟随你或小物体移动。新生儿偶尔对眼、某只眼外斜或内斜是因眼肌还在发育，但双眼应能协调追踪物体。若做不到，或孩子是超早产、出生需吸氧，应请眼科医生进一步检查。崔玉涛也指出双眼运动不协调多在3个月左右正常，3个月后仍斜视要找眼科就诊。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页123"}], "divergence": false, "divergence_note": null, "tags": ["视力", "追视", "斜视"], "third_party": null}, {"id": "0-1月-health-024", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "鹅口疮的识别与处理", "content": "两书都讲鹅口疮：口腔黏膜或舌头上出现擦不掉的白色片状物，是常见真菌（白色念珠菌）感染。崔玉涛指出较轻可自愈、不要用棉签擦拭以免损伤黏膜，破损影响进食时需在医生指导下用制霉菌素。AAP补充哺乳母亲若发现孩子患鹅口疮应注意自己是否有乳房触痛。", "source": [{"book": "崔", "loc": "印刷页140"}, {"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["鹅口疮", "真菌感染", "口腔"], "third_party": null}, {"id": "0-1月-health-025", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "新生儿痤疮（脓疱病）", "content": "两书都讲新生儿出生后3～4周（AAP说3～5周）脸上出现的粉刺样痘痘。AAP指出现在认为是皮肤对细菌的正常反应，名称改为新生儿脓疱病。崔玉涛说原因尚不明，可能与激素或妈妈皮肤细菌有关，一般不需特别处理、保持皮肤洁净即可，不要挤破以免感染。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}, {"book": "崔", "loc": "印刷页123"}], "divergence": false, "divergence_note": null, "tags": ["新生儿痤疮", "皮肤", "正常现象"], "third_party": null}, {"id": "0-1月-health-026", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "脐带残端护理与感染信号", "content": "两书都讲脐带残端约10天到3周左右干燥脱落。崔玉涛建议每天早晚各消毒一次、用75%酒精或碘伏擦拭根部，穿纸尿裤时前缘向下折避开脐部保持干燥。共同的感染信号：脐带残端附近发红、脓性分泌物、有触痛感，若伴发热应立即就医。少量清亮渗液或结痂、不伴红肿发热属正常。", "source": [{"book": "崔", "loc": "印刷页104"}, {"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["脐带护理", "脐部感染", "就医信号"], "third_party": null}, {"id": "0-1月-health-027", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "指甲沟感染需重视", "content": "AAP指出手指甲或脚指甲被感染表现为甲缘发红并有触痛，热敷有一定疗效，但对新生儿必须足够重视并由儿科医生检查，因为可能需要药物治疗。崔玉涛在剪指甲中提醒甲两侧剪太短易形成嵌甲、甚至化脓感染，应将指甲剪成长方形。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页147"}], "divergence": false, "divergence_note": null, "tags": ["指甲感染", "嵌甲", "就医信号"], "third_party": null}, {"id": "0-1月-health-028", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "头皮乳痂的护理", "content": "两书都讲头皮乳痂：新生儿头皮上粗糙油腻的片状皮疹。AAP建议每天洗头并刷掉乳痂可控制其发展，一般头几个月自动消失，必要时用特殊洗发液。崔玉涛补充保持头皮凉爽干燥，出现黄色油腻硬块时可用含水杨酸的洗发水清洗，加重时停用并咨询医生。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页146"}], "divergence": false, "divergence_note": null, "tags": ["乳痂", "头皮", "护理"], "third_party": null}, {"id": "0-1月-health-029", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "新生儿脱皮是正常的", "content": "崔玉涛说明宝宝出生后几天会脱皮、通常持续2～3周，因离开羊水进入干燥环境、加上角质层发育不完善所致，以四肢、耳后明显，一般不需处理，干燥时可涂婴儿润肤油。若脱皮后出现裂口或伴红肿水泡，应咨询医生护理以防感染。", "source": [{"book": "崔", "loc": "印刷页123"}], "divergence": false, "divergence_note": null, "tags": ["脱皮", "皮肤", "正常现象"], "third_party": null}, {"id": "0-1月-health-030", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "乳房肿胀与假月经", "content": "崔玉涛指出无论男女宝宝，因受妈妈血液中激素影响，乳头乳房都可能出现硬块、肿胀，几周后激素代谢干净便恢复正常。女宝宝出生后数天内可能有少量阴道出血（假月经），通常出生3～7天出现、持续1周左右，是正常现象；但若出血量大、持续较长应就医。", "source": [{"book": "崔", "loc": "印刷页56"}], "divergence": false, "divergence_note": null, "tags": ["乳房肿胀", "假月经", "激素影响"], "third_party": null}, {"id": "0-1月-health-031", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "男宝私处常见问题", "content": "崔玉涛说明男宝宝可能出现睾丸移动（遇凉刺激来回移动，多数时间在阴囊中即可不担心）、鞘膜积液或疝气（阴囊肿胀）、隐睾。鞘膜积液本身无害，多在生长过程中被吸收，但若到1岁左右仍未消退或疝气需关注，应请医生确诊、必要时考虑手术。", "source": [{"book": "崔", "loc": "印刷页58"}], "divergence": false, "divergence_note": null, "tags": ["男宝私处", "鞘膜积液", "隐睾"], "third_party": null}, {"id": "0-1月-health-032", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "女宝私处常见问题", "content": "崔玉涛说明女宝宝可能出现阴唇粘连（多发生在小阴唇，小范围多能自行恢复，超过外阴口一半或排尿困难需就医）和阴道分泌物（受妈妈雌激素影响，几周后随激素消退而消失）。护理原则是从前向后擦拭冲洗，避免过度清洁导致粘连或感染。", "source": [{"book": "崔", "loc": "印刷页59"}], "divergence": false, "divergence_note": null, "tags": ["女宝私处", "阴唇粘连", "分泌物"], "third_party": null}, {"id": "0-1月-health-033", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "肠痉挛（肠绞痛）的识别", "content": "两书都讲肠痉挛/肠绞痛。AAP指出约1/5婴儿发生、最常见于2～4周大，表现为无休止哭闹、尖叫蹬脚放屁、傍晚加剧、怎么哄都哄不好；崔玉涛给出定义：3个月内健康婴儿每天哭闹超3小时、每周至少3天、持续1周以上。两书都说原因尚不明确、与神经系统发育不成熟有关，多在3～4个月（崔：6个月内）缓解。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}, {"book": "崔", "loc": "印刷页141"}], "divergence": false, "divergence_note": null, "tags": ["肠绞痛", "哭闹", "神经发育"], "third_party": null}, {"id": "0-1月-health-034", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "哭闹先排查并安抚", "content": "两书都建议先排查哭闹原因（饥饿、尿布、过冷过热、不适）再安抚。AAP给出方法：背带背着走动、白噪声、安抚奶嘴、趴膝盖按摩背部、襁褓包裹等，并强调这个阶段不会宠坏孩子。崔玉涛也提供按摩腹部、飞机抱、安抚奶嘴、白噪声等缓解肠绞痛的方法。先就医排除疾病再尝试这些方法。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}, {"book": "崔", "loc": "印刷页141"}], "divergence": false, "divergence_note": null, "tags": ["哭闹", "安抚", "排查"], "third_party": null}, {"id": "0-1月-health-035", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "绝对不可大力摇晃孩子", "content": "AAP严正提醒：不管多不耐烦或生气，都绝对不可以大力摇晃孩子，大力摇晃会造成婴儿失明、脑损伤甚至死亡（摇晃婴儿综合征）。在安全检查中也强调禁止猛推或摇晃婴儿，可以轻轻抱住并摇动。情绪难以承受时可把孩子仰卧放在安全处、离开房间几分钟。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}], "divergence": false, "divergence_note": null, "tags": ["摇晃婴儿综合征", "安全", "脑损伤"], "third_party": null}, {"id": "0-1月-health-036", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "睡眠安全：仰卧、硬床、无松软物", "content": "AAP安全检查明确：一定要让婴儿仰卧睡觉、睡在硬实平面上，不要俯卧；婴儿床上不放松软物品，床垫平坦紧实、只用大小合适的床单；不要用宽松毯子被子盖住（可能缠住或窒息），改用可穿式毯子或睡袋；让婴儿睡自己的婴儿床、不要同床睡。睡前给安抚奶嘴可降低婴儿猝死综合征风险。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 预防窒息"}], "divergence": true, "divergence_note": "崔玉涛在「宝宝的睡姿」中列出仰卧、趴卧、侧卧各自优缺点（印刷页111-112），未明确给出统一的仰卧安全睡眠建议，且提到趴睡的一些优点；AAP第6章则明确要求仰卧、不可俯卧。涉及睡姿安全两书取向不同，以AAP的仰卧安全睡眠为准，趴卧仅用于清醒看护下的趴卧练习。", "tags": ["睡眠安全", "仰卧", "婴儿猝死综合征"], "third_party": {"confidence": "有明确权威结论", "conclusion": "对0-3月乃至1岁以内的健康婴儿，国内外权威机构的睡姿建议高度一致：每次睡觉（含白天午睡和夜间）都应让宝宝仰卧（脸朝上、背朝下），这是降低婴儿猝死综合征(SIDS)风险最安全的姿势。中国国家卫健委的卫生行业标准 WS/T 579—2017《0岁～5岁儿童睡眠卫生指南》明确规定：1岁以内婴儿宜采用仰卧位睡眠、不宜俯卧位（趴睡），直至婴儿能自行变换睡姿。美国儿科学会(AAP, 2022)、英国 Lullaby Trust 等国际机构立场更严格：仰卧是唯一推荐的睡眠姿势，俯卧（趴睡）明确禁止、侧卧也不安全不建议——即使是有胃食管反流的宝宝也应仰卧。重要区分：仰卧指的是\"睡觉时\"的姿势；清醒且有大人看护时让宝宝趴着玩(tummy time)是被鼓励的，有助于锻炼颈背肌肉。简言之记住一句话：\"睡觉仰着睡，醒着趴着玩\"(Back to Sleep, Tummy to Play)。需要说明的是，崔玉涛的科普更多是列举仰卧/侧卧/趴卧各自优缺点、并提到白天有人看护时可趴睡，未对\"睡眠场景下的趴睡\"做统一明确的禁止表述；在这一点上，他的表述弱于中国官方标准和国际权威机构，建议家长以卫健委标准和儿科机构的一致建议为准——婴儿独自睡觉时务必仰卧。", "key_sources": [{"name": "国家卫健委卫生行业标准 WS/T 579—2017《0岁～5岁儿童睡眠卫生指南》(明确:1岁以内宜仰卧、不宜俯卧)", "year": "2017", "url": "https://www.nhc.gov.cn/ewebeditor/uploadfile/2017/10/20171026154305316.pdf"}, {"name": "美国儿科学会 (AAP)《Sleep-Related Infant Deaths: Updated 2022》(所有睡眠须仰卧至1岁,禁俯卧、不建议侧卧)", "year": "2022", "url": "https://publications.aap.org/pediatrics/article/150/1/e2022057990/188304/Sleep-Related-Infant-Deaths-Updated-2022"}, {"name": "AAP官方育儿网站 HealthyChildren.org(健康婴儿睡眠始终仰卧;Back to Sleep, Tummy to Play)", "year": "持续更新", "url": "https://www.healthychildren.org/English/ages-stages/baby/sleep/Pages/Where-We-Stand-Back-To-Sleep.aspx"}, {"name": "美国NICHD Safe to Sleep 项目(1岁前所有睡眠须仰卧;偶尔改俯卧/侧卧风险显著升高)", "year": "2022", "url": "https://safetosleep.nichd.nih.gov/reduce-risk/back-sleeping"}, {"name": "英国 The Lullaby Trust(仰卧是每次睡眠最安全姿势,建议执行至12个月)", "year": "2025", "url": "https://www.lullabytrust.org.uk/baby-safety/safer-sleep-information/sleeping-position/"}, {"name": "北京协和医院官方科普(1岁以内睡觉应仰卧,俯卧为SIDS危险因素)", "year": "2020", "url": "https://www.pumch.cn/detail/30505.html"}], "caveat": "适用对象为健康足月婴儿的日常睡眠；早产儿、有特殊心肺/呼吸道/消化道疾病或医生有特别医嘱的宝宝，睡姿须遵主治儿科医生个性化建议。\"仰卧\"针对睡眠场景，清醒且有大人全程看护时的趴玩(tummy time)被鼓励、不在禁止之列。当宝宝月龄增长能自主双向翻身后（多在4-6个月后），其睡眠中自行变换的姿势通常无需刻意干预（仍应坚持把宝宝以仰卧姿势放下入睡）。同时安全睡眠还涉及独立硬质床垫、同室不同床、避免床上松软物品和过热等配套要点。任何疑问或宝宝有反流、呛奶、呼吸异常等情况，请及时咨询儿科医生，以面诊医嘱为准。"}}, {"id": "0-1月-health-037", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "汽车安全座椅必须正确使用", "content": "AAP安全检查强调：每次乘车都要坐在经认证、正确安装的后向式汽车安全座椅上并系好安全带，坐汽车后排，绝不可坐前排（安全气囊可能致命）。不要把安全座椅当作在家睡觉的床；二手座椅要检查是否在有效期内。带婴儿旅行（含出租车、租赁车）同样适用。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 汽车安全座椅"}], "divergence": false, "divergence_note": null, "tags": ["汽车安全座椅", "后向式", "乘车安全"], "third_party": null}, {"id": "0-1月-health-038", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "洗澡安全与防烫伤", "content": "AAP安全检查要求：给新生儿洗澡先放好水并检查水温、托住腋下，永远不让水中的孩子无人看管哪怕一分钟；把热水器最高温调到49℃以防烫伤。崔玉涛建议洗澡水温控制在38～40℃、水深5～8厘米，可用肘部或水温计试温，室温约28℃。两书都把洗澡时不离人、控制水温作为重点。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 洗澡"}, {"book": "崔", "loc": "印刷页99"}], "divergence": false, "divergence_note": null, "tags": ["洗澡安全", "水温", "防烫伤"], "third_party": null}, {"id": "0-1月-health-039", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "防摔落与抱姿护头颈", "content": "两书都强调保护新生儿头颈。AAP安全检查要求绝不把新生儿单独留在高于地面的台面（尿布台、床、沙发等），手要时刻扶着；抱新生儿时平躺要托头部、竖抱要托头颈，避免头部前后左右晃动。崔玉涛也详细说明抱起、放下、交接宝宝时都要护住头颈。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 预防摔落"}, {"book": "崔", "loc": "印刷页94"}], "divergence": false, "divergence_note": null, "tags": ["防摔落", "抱姿", "护头颈"], "third_party": null}, {"id": "0-1月-health-040", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "项链细绳与勒颈窒息风险", "content": "AAP安全检查明确：不要让窗帘绳等细绳在婴儿床上方或附近晃动，婴儿床远离窗户窗帘绳；不要用细绳把安抚奶嘴、饰品系在婴儿床或婴儿身上；不要给婴儿戴项链或挂脖饰品、不要穿有带子的衣服，避免勒颈窒息。安抚奶嘴也不可拴绳防丢。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 项链和细绳"}], "divergence": false, "divergence_note": null, "tags": ["勒颈", "细绳", "安全"], "third_party": null}, {"id": "0-1月-health-041", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "安抚奶嘴的安全选用", "content": "两书都讲安抚奶嘴。AAP提醒母乳喂养要等喂养模式确立（约1个月）再用，挑选要合乎年龄、奶头柔软、无可卸部件（防窒息），不可用奶瓶奶嘴代替、不可拴绳，睡前使用可降低猝死综合征风险。崔玉涛建议出生至少3周后再用以避免乳头混淆，出现裂纹小孔要及时更换。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 安抚奶嘴"}, {"book": "崔", "loc": "印刷页149"}], "divergence": false, "divergence_note": null, "tags": ["安抚奶嘴", "乳头混淆", "安全"], "third_party": null}, {"id": "0-1月-health-042", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "外出防晒与防晒伤", "content": "AAP提醒6个月大之前婴儿皮肤对阳光相当敏感，应尽量避免阳光直射（水、雪、沙、混凝土也会反射造成晒伤）；外出穿浅色衣服、戴遮阳帽、待在阴凉处，没有遮挡时可只在面部和手背少量涂防晒霜、避开眼睛。炎热时不要把汽车座椅、推车长时间放太阳下以防塑料金属烫伤。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外出"}], "divergence": false, "divergence_note": null, "tags": ["防晒", "外出", "晒伤"], "third_party": null}, {"id": "0-1月-health-043", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "控制探视减少传染", "content": "AAP提醒新生儿免疫系统还在发育，最初几周要控制拜访者数量，避免咳嗽、患流感或其他传染病的人接触孩子；拜访前打电话通知、抱孩子前要洗手；如果孩子因过多关注显得心神不定，不要让不亲近的人抱他。这是降低新生儿感染风险的重要措施。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 母亲须知"}], "divergence": false, "divergence_note": null, "tags": ["探视", "传染", "免疫"], "third_party": null}, {"id": "0-1月-health-044", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "出生后24小时未排便要告知医生", "content": "崔玉涛指出胎便规律排出是宝宝肠道健康的良好信号，如果宝宝出生后24小时仍然没有排便，要及时告知医生，尽快通过检查排除是否存在消化道畸形。", "source": [{"book": "崔", "loc": "印刷页64"}], "divergence": false, "divergence_note": null, "tags": ["胎便", "消化道畸形", "就医信号"], "third_party": null}, {"id": "0-1月-health-045", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "出生15天起补充维生素D", "content": "崔玉涛指出维生素D在母乳中含量极少，但对促进肠道钙吸收非常重要，营养均衡、母乳充足的宝宝通常无须额外补钙，但从出生后第15天开始可以每天补充400国际单位的维生素D。崔还说明母乳中的DHA可满足宝宝发育需求，一般无须额外补充。", "source": [{"book": "崔", "loc": "印刷页73"}], "divergence": false, "divergence_note": null, "tags": ["维生素D", "补钙", "营养"], "third_party": null}, {"id": "0-1月-health-046", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "红色尿、马牙等正常现象", "content": "崔玉涛说明几种新生儿正常现象：红色尿（实为粉红色，多因体内水分少、尿酸盐含量高，不需治疗）；马牙（牙龈上黄白色小颗粒，由上皮细胞或腺体分泌物积聚，几个月内自行脱落，不要挑破擦拭以免感染）；外耳廓受压变形（多在出生后几周内自行恢复）。", "source": [{"book": "崔", "loc": "印刷页55"}], "divergence": false, "divergence_note": null, "tags": ["红色尿", "马牙", "正常现象"], "third_party": null}, {"id": "0-1月-health-047", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "不建议给新生儿做微量元素检测", "content": "崔玉涛指出健康宝宝只要饮食均衡就无须额外补充微量元素制剂。早在2013年国家卫生计生委明确规定：非诊断治疗需要，各级医疗机构对儿童不宜做微量元素检测，不宜作为体检普查项目。盲目大量补充某种微量元素（如钙）反而可能影响其他元素吸收。", "source": [{"book": "崔", "loc": "印刷页135"}], "divergence": false, "divergence_note": null, "tags": ["微量元素", "检测", "补充"], "third_party": null}, {"id": "0-1月-health-048", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "耳朵护理：不掏耳道", "content": "崔玉涛提醒耳朵有自我清洁功能，少量耳屎会自动排出，用棉签探入耳道掏耳朵反而会把耳屎推向深处、可能损伤鼓膜，只需用温热毛巾清洁耳郭。若宝宝不停抠耳朵、拒绝枕头、伴低热或哭闹（尤其发烧6～12小时仍持续哭闹），可带去检查耳朵。耳朵进水可倾斜头部轻拍帮助流出。", "source": [{"book": "崔", "loc": "印刷页103"}], "divergence": false, "divergence_note": null, "tags": ["耳朵护理", "耳屎", "就医信号"], "third_party": null}, {"id": "0-1月-health-049", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "枕秃多为正常", "content": "AAP指出婴儿可能因仰卧而在脑后出现暂时性小块枕秃，其他位置头发不受影响，枕秃对健康没有什么影响，过几个月秃发位置就会长出新头发。出生时覆盖的细软胎发开始脱落也是正常发育现象。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 外观和生长情况"}], "divergence": false, "divergence_note": null, "tags": ["枕秃", "头发", "正常现象"], "third_party": null}, {"id": "0-1月-health-050", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "鼻塞护理缓解呼吸", "content": "AAP说明婴儿鼻通道窄、易被鼻涕堵塞影响呼吸，可在房间放冷雾加湿器、用吸鼻器轻柔吸出鼻涕来缓解，少数情况下需滴温和的盐水滴鼻液稀释黏液。崔玉涛也建议鼻腔分泌物较硬时让宝宝在充满水蒸气的浴室待15分钟软化后再用棉签清理、或用雾化缓解，严重鼻塞需就医。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 健康观察"}, {"book": "崔", "loc": "印刷页102"}], "divergence": false, "divergence_note": null, "tags": ["鼻塞", "加湿器", "鼻腔护理"], "third_party": null}, {"id": "0-1月-health-051", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "牛奶蛋白过敏的识别", "content": "崔玉涛指出牛奶蛋白过敏是婴幼儿最常见的食物过敏，1岁以内发生概率远高于1岁以上，可表现为湿疹荨麻疹等皮肤症状、腹泻便血呕吐等胃肠道不适，严重时有呼吸道症状。母乳喂养宝宝疑似过敏可通过妈妈回避牛奶+激发试验判断，确认后妈妈需回避一切牛奶及制品；配方奶喂养可换氨基酸配方奶判断。", "source": [{"book": "崔", "loc": "印刷页133"}], "divergence": false, "divergence_note": null, "tags": ["牛奶蛋白过敏", "湿疹", "食物过敏"], "third_party": null}, {"id": "0-1月-health-052", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "防火与防烫伤环境安全", "content": "AAP安全检查要求：抱着孩子时不要拿咖啡、茶、汤等热液体，也不要抱着孩子靠近煮液体的炉子或桌面热液体，即使溅出的小水滴也可能烫伤孩子；在家中合适位置安装烟雾探测器和一氧化碳探测器并定期检查、确保正常工作。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 防火和预防烫伤"}], "divergence": false, "divergence_note": null, "tags": ["防烫伤", "烟雾探测器", "环境安全"], "third_party": null}, {"id": "0-1月-health-053", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "避免过度喂养", "content": "崔玉涛提醒过度喂养对宝宝健康不利：胃肠功能未发育成熟、进食过多会增加胃肠负担、影响消化吸收，还可能引起代谢紊乱、肥胖。AAP在肠痉挛建议中也提到不要喂得过饱，前后两次喂奶一般间隔2～2.5小时，母乳充足时可只用一侧乳房喂以减少胀气。", "source": [{"book": "崔", "loc": "印刷页134"}, {"book": "AAP", "loc": "第6章 第1个月 · 哭闹和肠痉挛"}], "divergence": false, "divergence_note": null, "tags": ["过度喂养", "喂养间隔", "消化"], "third_party": null}, {"id": "0-1月-health-054", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "呛奶的预防与急救", "content": "崔玉涛说明呛奶在新生儿常见，多与吃奶姿势不当有关：喂奶时头部应高于身体、控制奶液流速、喂后拍嗝排气。呛奶后若不严重让宝宝侧躺、轻拍背部上部刺激咳出；若面部泛红说明奶液可能进入呼吸道需立即急救；出现呼吸困难、痰鸣严重等异常应及时拨打急救电话。", "source": [{"book": "崔", "loc": "印刷页134"}], "divergence": false, "divergence_note": null, "tags": ["呛奶", "急救", "喂养姿势"], "third_party": null}, {"id": "0-1月-health-055", "age_stage": "0-1月", "applies_to": ["0-1月"], "applies_label": null, "board": "health", "title": "看护：不单独留婴儿", "content": "AAP安全检查强调：不要把婴儿单独留在浴盆里、家中、院子里或汽车上；当婴儿无人照看时要把他放进婴儿床或婴儿围栏中。这是防溺水、防意外的基本看护原则。", "source": [{"book": "AAP", "loc": "第6章 第1个月 · 看护"}], "divergence": false, "divergence_note": null, "tags": ["看护", "单独留置", "安全"], "third_party": null}]}, "1-2月": {"feeding": [{"id": "1-2m-feeding-001", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "只喝母乳或配方奶", "content": "原则上在4～6个月大之前，宝宝仍然只需要喝母乳或配方奶。判断宝宝是否吃饱，最好的方法是看他的生长情况，每次体检医生都会测量体重、身高和头围。决定喂多少时，要留意宝宝的「饥饿」和「饱胀」信号，这比喝下多少奶更重要。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["母乳", "配方奶", "饥饿信号"], "third_party": null}, {"id": "1-2m-feeding-002", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "母乳喂养的频率", "content": "大多数母乳喂养的宝宝无论白天黑夜都需要不断吃奶，24小时内要喂8～12次。有些宝宝可能更频繁，比如每90～120分钟就要喂一次，这是他在长身体、需要更多奶的信号。你喂得越频繁，身体分泌的泌乳激素就越多；通常只需2～3天乳汁就会增加，之后宝宝吃奶的频率会降低。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["母乳", "喂养频率", "泌乳"], "third_party": null}, {"id": "1-2m-feeding-003", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "乳汁不足要咨询医生", "content": "如果4～5天后宝宝仍看起来很饿，要向儿科医生咨询并预约体重检查。如果宝宝没有增重，可能是你的乳汁供应下降了，这可能和重新工作却没充分吸奶、压力增大、宝宝睡眠时间变长等有关。医生可帮助找原因，并提供增加泌乳的方法，比如增加喂奶次数、在两次喂奶间隙或喂奶后使用吸奶器。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["乳汁不足", "增重", "吸奶器"], "third_party": null}, {"id": "1-2m-feeding-004", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "吃奶时咳嗽或脸色变化要就医", "content": "宝宝在吃奶时频繁或反复咳嗽是不正常的，应该去看医生。如果宝宝在吃奶过程中频繁停顿或有脸色变化，要把乳房或奶瓶移开让他呼吸，这可能表明他呼吸困难，也应及时就医。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["吃奶", "咳嗽", "就医信号"], "third_party": null}, {"id": "1-2m-feeding-005", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "排便频率会下降", "content": "这个阶段即便没改变饮食，宝宝的排便也可能变化：肠道能容纳更多东西、从乳汁中吸收更多营养，大便会更容易成形，也不会每次吃完奶都排便。2～3个月大时排便频率会明显下降，有的母乳宝宝每隔3～4天甚至每周才排便一次。只要吃奶好、体重增长正常、大便不干硬，就不必过度紧张。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["排便", "大便", "母乳"], "third_party": null}, {"id": "1-2m-feeding-006", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "复工妈妈提前练习吸奶", "content": "如果需要在产后3～6个月重返工作，妈妈应在宝宝1个月大时就偶尔把乳汁吸出来用奶瓶喂，让
