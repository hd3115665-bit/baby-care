自己习惯挤奶，也让宝宝习惯用奶瓶吃奶。复工前1个月可每天在两次喂奶间吸1～2次奶并冷冻保存，供之后看护者喂宝宝。复工后乳汁可能因压力而减少，妈妈需要寻求和接受他人帮助。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["复工", "吸奶", "母乳冷冻"], "third_party": null}, {"id": "1-2m-feeding-007", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "feeding", "title": "外出哺喂的准备", "content": "在公共场所给宝宝喂母乳，妈妈可提前做好准备：穿设计合理、前开口的哺乳服方便宝宝吃奶；提前了解目的地是否有母婴室或私密休息区，公园找偏僻长椅、就餐选包间，实在不行试衣间或私家车也可应急；尽量和家人朋友同行帮忙遮挡；随身带哺乳巾、丝巾或外套作遮挡物。", "source": [{"book": "崔", "loc": "印刷页164"}, {"book": "崔", "loc": "印刷页165"}], "divergence": false, "divergence_note": null, "tags": ["外出", "母乳喂养", "哺乳准备"], "third_party": null}, {"id": "1-2m-feeding-008", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "feeding", "title": "宝宝偏爱一侧乳房", "content": "宝宝长期只吸一侧乳房，会导致这侧乳腺管更通畅、另一侧乳汁逐渐减少、容易堵塞。妈妈应从一开始就坚持两侧轮流喂，这次先吃左侧、下次先吃右侧，最好排空一侧再喂另一侧；乳量少的一侧可先让宝宝吸以促排乳；在安静环境下喂、给足安全感。如果宝宝突然特别抗拒某侧乳房，要主动就医排查是否乳房病变。", "source": [{"book": "崔", "loc": "印刷页165"}, {"book": "崔", "loc": "印刷页166"}], "divergence": false, "divergence_note": null, "tags": ["母乳喂养", "偏爱一侧", "轮流喂"], "third_party": null}, {"id": "1-2m-feeding-009", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "feeding", "title": "别把喂奶当止哭良药", "content": "很多家长误以为宝宝哭闹就是饿了，因而频繁哺乳，甚至一天哺乳12次以上。其实宝宝哭闹不一定是饥饿，可能还有别的需求；不管生理还是心理需求，小月龄宝宝都会通过哭来表达，比如肠绞痛也会频繁哭闹。频繁哺喂虽能暂时平复情绪，却会导致体重过快增长等过度喂养问题，应在了解宝宝各种需求的基础上有针对性地安抚。", "source": [{"book": "崔", "loc": "印刷页184"}], "divergence": false, "divergence_note": null, "tags": ["过度喂养", "哭闹", "哺乳"], "third_party": null}, {"id": "1-2m-feeding-010", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "feeding", "title": "判断便秘看大便不看间隔", "content": "便秘表现为大便干结、排便费力，这才是判断金标准，两次排便的间隔时间不能作为依据。即便连续多天不排便，只要排便不费力、大便不干结，也不算便秘。母乳易吸收、大便残渣少，母乳宝宝排便间隔长是正常的；有些宝宝肠道功能未成熟会「攒肚」，几天排一次但大便不干，也不是便秘。相反，一天排便多次但每次都很干，也算便秘。", "source": [{"book": "崔", "loc": "印刷页175"}, {"book": "崔", "loc": "印刷页176"}], "divergence": false, "divergence_note": null, "tags": ["便秘", "大便", "攒肚"], "third_party": null}, {"id": "1-2m-feeding-011", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "feeding", "title": "便秘的原因与处理", "content": "宝宝便秘不是因为喝水太少或吃配方粉上火，直接原因是肠道吸收了粪便中太多水分使大便干结。粪便中的水分大多来自肠道细菌分解纤维素，母乳含丰富的可溶性纤维素（低聚糖），所以母乳宝宝大便普遍偏稀、不易便秘；配方粉宝宝不易获得纤维素、喂养过程近乎无菌，相对更容易便秘。便秘时可先用开塞露等物理手段帮助排便，根本上则用「益生菌+益生元」联合治疗，并鼓励宝宝多活动。", "source": [{"book": "崔", "loc": "印刷页176"}, {"book": "崔", "loc": "印刷页177"}], "divergence": false, "divergence_note": null, "tags": ["便秘", "纤维素", "配方粉"], "third_party": null}], "development": [{"id": "1-2m-development-001", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "满月宝宝的发育表现", "content": "满月时宝宝应该会对铃声有反应、视线跟随人或物追到正前方中线、注意到人脸。很可能会俯卧抬头，发出哭声以外的咿咿呀呀、哼哼唧唧声。也许会反应性微笑，甚至自发微笑、俯卧抬头45度。孩子之间存在个体差异，这些是参考性的发育指标。", "source": [{"book": "崔", "loc": "印刷页157"}, {"book": "崔", "loc": "印刷页158"}], "divergence": false, "divergence_note": null, "tags": ["发育指标", "满月", "里程碑"], "third_party": null}, {"id": "1-2m-development-002", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "颈部力量与趴着练习", "content": "这几个月最重要的进步之一是颈部力量增强。从出生起就可以每天让宝宝趴着玩耍几次，不到2个月大时他会挣扎着想抬头四处看，即使只能抬起一两秒。这项小练习能增强颈后部肌肉。但1个月大时若轻轻拉着双手让他坐起，头还会无力地向后仰，所以抱孩子时一定要扶住头部。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "抬头", "趴着练习"], "third_party": null}, {"id": "1-2m-development-003", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "双手从握拳到张开", "content": "一开始宝宝双手只会紧紧握成拳、拇指被握在里面，放摇铃在掌心他会本能抓住但不会摇。第1～2个月，宝宝会松开双手、向外展开双臂。偶尔双手进入视线时他会感兴趣地盯着看，但还不能主动把手举到面前，也还无法成功把手塞进嘴里。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["精细动作", "手部发育"], "third_party": null}, {"id": "1-2m-development-004", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "双腿渐渐伸直", "content": "出生后第2个月，宝宝的双腿会从新生儿特有的蜷曲姿势渐渐伸直，双腿变得更有力、更爱活动。目前他还只能靠反射踢腿。因为你无法预测他何时开始翻身，把孩子放在尿布更换台等高于地面的平面上时要特别小心。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "腿部发育", "安全"], "third_party": null}, {"id": "1-2m-development-005", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "踏步反射约6周消失", "content": "托住宝宝腋下、让脚落地时，踏步反射会驱使他做出迈步动作。但这种反射行为会在婴儿约6周大时消失，直到孩子开始学步前都不会再出现。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["原始反射", "踏步反射"], "third_party": null}, {"id": "1-2m-development-006", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "最爱看人脸和眼睛", "content": "1个月大的宝宝只能看清约38厘米以内的东西，但人脸是他最喜欢观察的对象。你抱着他时，他的注意力会立刻集中在你脸上，尤其是眼睛上，有时只要看到你的眼睛就会笑。他还很喜欢跟镜子里的自己玩。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 视觉发育"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "看人脸"], "third_party": null}, {"id": "1-2m-development-007", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "快2个月双眼更协调", "content": "出生后头几周，宝宝的视线很难跟踪面前移动的物体，快速挥舞物品他似乎视而不见。这种情况在他快2个月大时会有很大变化，双眼会更加协调、能一起转动并同时聚焦。很快他的视线就能跟踪在面前0到180度范围内移动的物体。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 视觉发育"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "追视", "双眼协调"], "third_party": null}, {"id": "1-2m-development-008", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "喜欢强对比和黑白图案", "content": "1个月大的宝宝对色彩的亮度或强度很敏感，因此很喜欢看色彩对比强烈或黑白色的图案。他对婴儿房常用的柔和色彩没什么兴趣，因为这时色觉还很有限。崔玉涛也建议用颜色鲜艳、图案简明、没有太多细节的绘本或认知卡片为宝宝提供视觉刺激。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 视觉发育"}, {"book": "崔", "loc": "印刷页189"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "色觉", "早教卡片"], "third_party": null}, {"id": "1-2m-development-009", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "天生偏爱人的声音", "content": "比起其他声音，宝宝更喜欢人类的声音，能辨认听得最多的声音并做出回应，还会把它与温暖、食物和舒适联系起来。婴儿一般喜欢音调较高的声音，大多数成年人会本能地用这种音调跟宝宝说话。快1个月大时，即使你在隔壁房间说话，他也能分辨出你的声音。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 听觉和语言发育"}], "divergence": false, "divergence_note": null, "tags": ["听觉发育", "语言", "声音"], "third_party": null}, {"id": "1-2m-development-010", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "约2个月开始咿呀发声", "content": "大约2个月大时，宝宝可能开始发出咿咿呀呀声，并重复一些元音如啊啊啊、哦哦哦。崔玉涛也指出1个月时会发出咿呀声、2个月时会发出啊哦等元音，这是语言能力发展的重要积累。宝宝发出的每一个音节都值得家长积极回应，从而进一步激发他练习的兴趣。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 听觉和语言发育"}, {"book": "崔", "loc": "印刷页189"}, {"book": "崔", "loc": "印刷页190"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "咿呀发声", "元音"], "third_party": null}, {"id": "1-2m-development-011", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "满月后笑容代表真心愉快", "content": "即使没满月，宝宝有时也会露出反射性笑容或挤弄五官，但直到满月后这些动作才真正代表他开心和友好。见到孩子第一个发自内心的笑容是双方非常重要的转折点：他突然发现只要轻轻牵动嘴唇就能与你交流，笑也成了除哭以外表达需求的方式。崔玉涛称这个阶段大部分宝宝会展现具有社交意义的回应性微笑。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}, {"book": "崔", "loc": "印刷页187"}], "divergence": false, "divergence_note": null, "tags": ["社交发育", "微笑", "情感"], "third_party": null}, {"id": "1-2m-development-012", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "热情回应宝宝的笑与发声", "content": "早期交流对宝宝的社交能力和情感发育非常重要。热情而迅速地回应他的笑容、经常与他对话，能让他知道自己在你心里很重要、可以信任你。当他说话时你要全神贯注分辨暗示，这有助于建立他的自我认同感。崔玉涛同样强调：宝宝创造新音节时家长要及时鼓励，切勿置之不理或显得不耐烦。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}, {"book": "崔", "loc": "印刷页187"}, {"book": "崔", "loc": "印刷页190"}], "divergence": false, "divergence_note": null, "tags": ["亲子互动", "早教", "回应"], "third_party": null}, {"id": "1-2m-development-013", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "早教从日常互动开始", "content": "虽然1到2个月的宝宝还不能与父母太多互动，但已出现社交萌芽。崔玉涛建议抓住每个宝宝醒来的间歇时间，如换尿布、喂奶、洗澡、玩耍时多和宝宝说话，或用歌谣、儿歌沟通，让宝宝习惯听父母说话。AAP也提示应该从婴儿期就开始为他读书，即使你觉得他根本听不懂。", "source": [{"book": "崔", "loc": "印刷页187"}, {"book": "崔", "loc": "印刷页188"}, {"book": "AAP", "loc": "第7章 1～3月龄 · 听觉和语言发育"}], "divergence": false, "divergence_note": null, "tags": ["早教", "亲子沟通", "读书"], "third_party": null}, {"id": "1-2m-development-014", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "用镜子和人脸做早教", "content": "崔玉涛建议利用身边小物件与宝宝互动。很多宝宝喜欢镜子，可拿安全的婴儿镜放在他面前，告诉他这是宝宝、这是妈妈，帮助建立自我意识。小月龄宝宝很喜欢近距离观看人脸，要多花时间与宝宝亲近，让他看看家人的脸或照片，有利于建立人际感情。", "source": [{"book": "崔", "loc": "印刷页188"}, {"book": "崔", "loc": "印刷页189"}], "divergence": false, "divergence_note": null, "tags": ["早教", "镜子", "看人脸"], "third_party": null}, {"id": "1-2m-development-015", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "营造良好的家庭互动氛围", "content": "崔玉涛指出良好的家庭互动氛围对宝宝成长比物质条件更重要。要常向宝宝表达爱、保持耐心给他安全感；多和宝宝沟通；给宝宝独处探索的空间，父母在一旁守候，让他逐渐学会专注；尊重宝宝的小需求；多多鼓励宝宝，帮助培养自信、不胆怯的性格。", "source": [{"book": "崔", "loc": "印刷页187"}, {"book": "崔", "loc": "印刷页188"}], "divergence": false, "divergence_note": null, "tags": ["早教", "家庭氛围", "安全感"], "third_party": null}, {"id": "1-2m-development-016", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "development", "title": "反射逐渐让位于自主动作", "content": "在这一阶段初期，宝宝大多数动作仍是反射性的，比如转头时摆出击剑姿势的强直性颈部反射、受惊时张开双臂的惊跳反射。一部分常见的新生儿反射会在第2到3个月时消失，反射消失后他看起来可能暂时不如以前活泼，但他现在的动作虽轻微却是有自主意识的，并会逐渐熟练。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["原始反射", "自主动作", "运动发育"], "third_party": null}], "care": [{"id": "1-2m-care-001", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "满月后睡眠节律变化", "content": "满月后宝宝白天更机灵、爱与人接触，醒着的时间变多。同时胃容量增大、吃奶次数减少，夜间可能会少吃一次奶。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "作息", "夜奶"], "third_party": null}, {"id": "1-2m-care-002", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "坚持仰卧睡姿", "content": "这个阶段的宝宝应以仰卧的姿势睡觉。即使为了减轻吐奶，也不要让他俯卧睡，除非吐奶特别严重且医生建议这样做，因为俯卧会增加婴儿猝死综合征的风险。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 睡觉"}, {"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["睡姿", "仰卧", "安全睡眠"], "third_party": null}, {"id": "1-2m-care-003", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "帮宝宝建立昼夜规律", "content": "新生宝宝没有明确的昼夜规律，需要家长引导建立。夜间睡眠尽量保证房间安静、黑暗，最好不开灯（必要时用小夜灯）；白天宝宝睡着时家人照常活动、不必刻意拉窗帘、压低声响。用这种明显的环境差异，逐渐帮宝宝分清昼夜。", "source": [{"book": "崔", "loc": "印刷页177"}], "divergence": false, "divergence_note": null, "tags": ["昼夜规律", "睡眠环境", "作息"], "third_party": null}, {"id": "1-2m-care-004", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "营造优质夜间睡眠", "content": "评估夜间睡眠不能只看时长，还要看质量。室温最好控制在24～26℃，床褥不要太软、透气性要好，每天通风换气。睡前1小时内避免大活动量和激烈互动，可放柔和音乐或唱摇篮曲，再逐渐调暗灯光，帮宝宝进入深睡眠。", "source": [{"book": "崔", "loc": "印刷页179"}], "divergence": false, "divergence_note": null, "tags": ["睡眠质量", "睡眠环境", "睡前仪式"], "third_party": null}, {"id": "1-2m-care-005", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "别用多余关心打扰睡眠", "content": "睡眠分浅睡眠和深睡眠，真正有意义的是深睡眠。宝宝夜里偶尔做噩梦呜咽或无意识哼唧时，家长一听到动静就开灯、抱起来哄，反而会把宝宝吵醒。恰当做法是暂时不应答，让宝宝再次自行入睡。", "source": [{"book": "崔", "loc": "印刷页180"}], "divergence": false, "divergence_note": null, "tags": ["睡眠质量", "夜醒", "深睡眠"], "third_party": null}, {"id": "1-2m-care-006", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "睡着不必叫醒喂奶", "content": "睡梦中的宝宝有感知饥饿的能力，饿了会自行醒来要奶，熟睡时不会饿着，所以睡着时不需要叫醒喂奶。崔玉涛和美国儿科学会都指出，这个阶段没有必要在夜里把宝宝叫醒喂奶。", "source": [{"book": "崔", "loc": "印刷页180"}, {"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["夜奶", "睡眠", "按需喂养"], "third_party": null}, {"id": "1-2m-care-007", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "夜间不必刻意换尿裤", "content": "夜间睡觉时，只要宝宝没有排大便、尿液没有溢出来，就不必刻意更换纸尿裤，以免打扰宝宝睡眠。", "source": [{"book": "崔", "loc": "印刷页180"}], "divergence": false, "divergence_note": null, "tags": ["夜间护理", "纸尿裤", "睡眠"], "third_party": null}, {"id": "1-2m-care-008", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "把睡着的宝宝放上床", "content": "为减少落地醒：哄睡后让宝宝在怀里多睡一会儿、轻拍动作慢慢停下，待熟睡再放；放下时让宝宝身体贴着自己、先让背部接触床面再慢慢抽手；放下后保持俯身多陪3～5分钟，轻按或继续轻拍给足安全感再撤手。还可用毯子或睡袋包裹，缓解惊跳反射。", "source": [{"book": "崔", "loc": "印刷页178"}, {"book": "崔", "loc": "印刷页179"}], "divergence": false, "divergence_note": null, "tags": ["落地醒", "哄睡", "睡眠"], "third_party": null}, {"id": "1-2m-care-009", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "宝宝傍晚哭闹", "content": "很多宝宝每天有15分钟到1小时无法解释的哭泣，且常发生在傍晚。可能因傍晚家中人多、环境嘈杂，或宝宝忙碌一天需要哭一哭放松，又或者太累需要哭着哄睡。家长仔细观察、排查原因后调整：太吵就放低音量，疲惫困倦就及时哄睡，都不是就让宝宝释放一下。", "source": [{"book": "崔", "loc": "印刷页177"}, {"book": "崔", "loc": "印刷页178"}], "divergence": false, "divergence_note": null, "tags": ["哭闹", "傍晚", "安抚"], "third_party": null}, {"id": "1-2m-care-010", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "别把喂奶当止哭法宝", "content": "很多家长误以为宝宝哭就是饿了，频繁哺乳甚至一天喂12次以上。其实宝宝哭不一定是饥饿，生理和心理需求都会通过哭表达。频繁哺喂虽能暂时平复情绪，却会导致体重过快增长等过度喂养问题，应在了解各种需求的基础上有针对性地安抚。", "source": [{"book": "崔", "loc": "印刷页178"}], "divergence": false, "divergence_note": null, "tags": ["哭闹", "过度喂养", "安抚"], "third_party": null}, {"id": "1-2m-care-011", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "哭闹崩溃时切勿摇晃", "content": "宝宝哭闹不休、家长感到沮丧愤怒时，最好轻轻把他放回婴儿床，自己稍作休息。最重要的是一定要抗拒任何摇晃或拍打孩子的冲动——摇晃会对孩子造成严重伤害。若哭闹长期困扰，请与儿科医生详细讨论应对技巧。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["哭闹", "摇晃综合征", "安全"], "third_party": null}, {"id": "1-2m-care-012", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "头几个月不会宠坏孩子", "content": "头几个月不用担心宠坏孩子。仔细观察他，在他需要时立刻回应。6个月前你越是迅速而耐心地安抚烦躁的宝宝，他长大后越不用你费心。这么小的时候，他需要不断被安慰才有安全感、才能建立对你的信任。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["安抚", "安全感", "回应"], "third_party": null}, {"id": "1-2m-care-013", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "头部多汗与扁头", "content": "宝宝常头部出汗多、身体其他部位较少，这与汗毛孔发育尚不成熟有关，随着长大会自然缓解。但一旦全身都出汗，多半是穿盖太多太厚或环境温度太高，应及时减少衣被、降低室温。注意出汗多后不要马上进空调间或较凉处，以免着凉感冒。", "source": [{"book": "崔", "loc": "印刷页160"}], "divergence": false, "divergence_note": null, "tags": ["多汗", "穿衣", "日常护理"], "third_party": null}, {"id": "1-2m-care-014", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "枕秃无须干预", "content": "枕秃是宝宝枕部接触枕头处头发稀少或没有头发，呈半圈、片状或环形，在小月龄宝宝中很常见。它是生长发育中的正常现象，因平躺久、转头摩擦造成局部脱发。等宝宝长大、学会坐站走、平躺变少后会慢慢长出，不需要干预和治疗。", "source": [{"book": "崔", "loc": "印刷页160"}, {"book": "崔", "loc": "印刷页161"}], "divergence": false, "divergence_note": null, "tags": ["枕秃", "正常现象", "日常护理"], "third_party": null}, {"id": "1-2m-care-015", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "耳朵不必特意掏耳垢", "content": "产生耳垢是耳部正常健康的表现，耳朵可以自我清洁，许多父母不必为清除耳垢不安。婴儿的耳朵只需用柔软的毛巾快速擦拭就能保持清洁。如果耳朵里出现的不是耳垢而是脓液等异常分泌物，则需带他就医。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["耳部护理", "耳垢", "清洁"], "third_party": null}, {"id": "1-2m-care-016", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "洗澡每周不超过3次", "content": "为防止湿疹复发，给宝宝洗澡和洗衣只用性质温和的沐浴液和洗衣液，给他穿柔软的衣服（不穿羊毛或质地粗糙的）。每周洗澡次数不超过3次，因为频繁洗澡可能让皮肤更干燥。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["洗澡", "皮肤护理", "湿疹预防"], "third_party": null}, {"id": "1-2m-care-017", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "鼻塞影响吃睡可吸鼻", "content": "2～3个月的宝宝还不太会用嘴呼吸，鼻塞会让他难受，常导致睡不好、中途醒来，也会影响吃奶。如果鼻塞影响了正常进食和呼吸，可在喂奶前或鼻塞严重时用干净的吸鼻器吸出鼻涕；先滴几滴医生开的盐水滴鼻液稀释，会更容易吸出（注意力度和频率别过大，以免加重肿胀）。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["鼻塞", "吸鼻器", "睡眠"], "third_party": null}, {"id": "1-2m-care-018", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "尿布台与防摔安全", "content": "无人看护时永远不要把宝宝单独留在床、沙发、尿布更换台或凳子上；坐在婴儿椅里的宝宝不要连人带椅放在桌上等高处。选带5厘米以上护栏的尿布更换台，且不要放在靠近窗户的地方；把宝宝放在任何设备上时都要系安全带。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 预防摔落"}], "divergence": false, "divergence_note": null, "tags": ["安全", "防摔", "尿布台"], "third_party": null}, {"id": "1-2m-care-019", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "防烧烫伤要点", "content": "抱孩子时不要同时吸烟、喝热饮或在炉边做饭。给孩子洗澡前先用手腕或前臂内侧试水温，并先放好水、试好温度再把孩子放进去；把热水器最高温度定在49℃以下。不要用微波炉加热奶或食物，喂前要充分搅拌并试温。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 预防烧伤和烫伤"}], "divergence": false, "divergence_note": null, "tags": ["安全", "防烫伤", "洗澡水温"], "third_party": null}, {"id": "1-2m-care-020", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "婴儿床防窒息", "content": "经常检查玩具上易扯下或损坏的小部件是否完好、有无尖锐边角。不要在婴儿床上悬挂玩具，因为这个阶段的宝宝可能把玩具扯下来或被玩具缠住。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 预防窒息"}], "divergence": false, "divergence_note": null, "tags": ["安全", "防窒息", "婴儿床"], "third_party": null}, {"id": "1-2m-care-021", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "外出务必用安全座椅", "content": "宝宝乘车务必放在有效的安全座椅内、正向固定在汽座上并系好安全带。家长抱着宝宝乘车的做法是错误的，在急刹车或撞击时后果不堪设想。可让宝宝提前在家熟悉安全座椅、用玩具吸引，乘车途中讲故事、唱歌转移注意力，逐渐适应。", "source": [{"book": "崔", "loc": "印刷页184"}, {"book": "崔", "loc": "印刷页185"}], "divergence": false, "divergence_note": null, "tags": ["安全座椅", "外出", "乘车安全"], "third_party": null}, {"id": "1-2m-care-022", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "婴儿背带选横抱式", "content": "对4个月以内的宝宝，建议选择横抱式婴儿背带。因为小月龄宝宝骨骼、肌肉尚未发育完全，尤其颈部力量弱、无法很好支撑头部，长时间竖抱保护不当易影响发育。背带连续使用不要超过2小时，不要在哺乳后30分钟内使用，也不要把背带当哭闹时的安抚工具。", "source": [{"book": "崔", "loc": "印刷页185"}, {"book": "崔", "loc": "印刷页186"}], "divergence": false, "divergence_note": null, "tags": ["婴儿背带", "横抱", "外出"], "third_party": null}, {"id": "1-2m-care-023", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "婴儿车使用注意", "content": "用婴儿车要注意宝宝体感温度，天热时常查看有无出汗、防止长痱子甚至中暑，必要时抱出到通风处休息。不要长时间使用，因为视野和四肢活动受限、易打瞌睡甚至昼夜颠倒；应时常抱起活动。要走平坦路面、系好安全带、停车后立即锁车。", "source": [{"book": "崔", "loc": "印刷页184"}], "divergence": false, "divergence_note": null, "tags": ["婴儿车", "外出", "安全"], "third_party": null}, {"id": "1-2m-care-024", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "care", "title": "带满月宝宝外出", "content": "满月后可带宝宝到户外活动，晒太阳有助于钙的吸收。冬季外出要保暖但别一味捂着，盖毯子注意别捂住口鼻以免窒息；夏季要防蚊、避免暴晒，可用遮阴帽。开车注意车内外温差不宜过大、保持通风。", "source": [{"book": "崔", "loc": "印刷页182"}, {"book": "崔", "loc": "印刷页183"}], "divergence": false, "divergence_note": null, "tags": ["外出", "晒太阳", "保暖防晒"], "third_party": null}], "health": [{"id": "1-2m-health-001", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "42天体检要做什么", "content": "42天体检是宝宝出生后第一次全面健康检查，也是监测生长发育的起点。常规项目包括身长、体重、头围，俯卧抬头/抓握/听音/追物等身体和智力发育评估，心肺听诊，囟门检查，以及包括皮肤、髋关节、外生殖器等的外科检查。提前备好证件，并总结这段时间的喂养、睡眠、排便情况，给宝宝穿容易穿脱的衣服。注意妈妈也要同时做产后体检。", "source": [{"book": "崔", "loc": "印刷页159"}, {"book": "崔", "loc": "印刷页160"}], "divergence": false, "divergence_note": null, "tags": ["体检", "生长发育", "检查项目"], "third_party": null}, {"id": "1-2m-health-002", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "发热满38℃立即就医", "content": "小婴儿病情容易快速发展到很严重。不满3个月的婴儿一旦直肠温度达到38℃以上，就应立刻就医。如果宝宝不满2个月而你怀疑他出现某些健康问题，也应带他看医生。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["发热", "就医信号", "急症"], "third_party": null}, {"id": "1-2m-health-003", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "感冒时这些情况要就医", "content": "很多婴儿在1～3个月大时会患第一场感冒，大多较轻微，只有咳嗽、流鼻涕和轻度发热。但如果出现以下情况要及时就医：持续咳嗽；没胃口、多次拒绝吃奶；不满3个月发热达到38℃及以上（此时要马上就医）；格外烦躁；异常困倦或很难被叫醒。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["感冒", "就医信号", "呼吸道"], "third_party": null}, {"id": "1-2m-health-004", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "鼻塞影响吃奶睡觉怎么办", "content": "2～3个月的婴儿还不太会用嘴呼吸，鼻塞会让他比大孩子更难受，常影响入睡和吃奶。如果鼻塞影响了正常进食和呼吸，可用干净的吸鼻器吸出鼻涕，尤其在喂奶前或鼻塞严重时；先滴几滴医生开的盐水滴鼻液稀释鼻涕会更好吸出。注意吸的力度过大或频率过高都可能引起鼻黏膜肿胀，反而加重鼻塞。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["鼻塞", "护理", "吸鼻器"], "third_party": null}, {"id": "1-2m-health-005", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "预防严重呼吸道感染", "content": "两书都强调要减少宝宝周围的病菌。崔玉涛建议多开窗通风（室内不通风时病菌浓度反而远高于室外），家长外出回家后先换衣服、洗手、漱口再亲近宝宝。AAP针对呼吸道合胞病毒（RSV，2～8个月最高发）建议：要抱宝宝的人先用热水和香皂洗手；避免接触流鼻涕或患病的人；少去人多场所；禁止任何人在宝宝周围吸烟（二手烟会大大增加易感性）。", "source": [{"book": "崔", "loc": "印刷页181"}, {"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["感冒预防", "RSV", "洗手", "通风"], "third_party": null}, {"id": "1-2m-health-006", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "吃奶时反复咳嗽要就医", "content": "宝宝在吃奶时频繁或反复咳嗽是不正常的，应该去看医生。若宝宝在吃奶过程中频繁停顿或脸色变化，要把乳房或奶瓶移开让他呼吸，这可能表明他呼吸困难，也应及时就医。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["吃奶", "就医信号", "呼吸困难"], "third_party": null}, {"id": "1-2m-health-007", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "减轻吐奶/反流", "content": "由于食管括约肌发育不成熟，大多数婴儿都有一定程度的反流，随时间推移多会减轻。要减轻吐奶：喂奶时及喂奶后给宝宝拍嗝，喂奶后半小时内尽量让他保持直立。注意不要为了减轻吐奶让宝宝俯卧睡——最安全的睡姿永远是仰卧。如果宝宝吐奶严重、吐奶影响吃奶，或伴随周期性咳嗽、烦躁、吞咽困难、弓背、体重不足，请向儿科医生咨询。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["吐奶", "反流", "拍嗝", "就医信号"], "third_party": null}, {"id": "1-2m-health-008", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "髋关节发育自查", "content": "宝宝双腿或臀部纹路高低不一或数量不同（腿纹/臀纹不对称），可能提示髋关节发育不良，但很多原因都会引起，不能单凭它判断。可先自查：让宝宝平躺并拢屈膝双脚平踩，看两膝高度是否一致、前后是否对齐；双手握膝同时向外推，看两侧外展角度是否对称；握住脚踝轻轻向外旋转听是否有异常弹响。三步中任一步异常都应及时带宝宝就医诊断。42天体检时医生也会检查髋关节。", "source": [{"book": "崔", "loc": "印刷页166"}, {"book": "崔", "loc": "印刷页167"}, {"book": "崔", "loc": "印刷页168"}], "divergence": false, "divergence_note": null, "tags": ["髋关节", "自查", "就医信号"], "third_party": null}, {"id": "1-2m-health-009", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "2个月要打哪些疫苗", "content": "第一针乙肝疫苗应在宝宝出生后不久、出院前接种，第二针在第一针完成至少4周后接种。宝宝2个月大时应接种以下疫苗，并在4个月大时再次接种：百白破疫苗、脊髓灰质炎灭活疫苗、B型流感嗜血杆菌疫苗、肺炎球菌疫苗、轮状病毒疫苗，以及乙肝疫苗（如果1个月大时没接种的话）。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "乙肝", "百白破"], "third_party": null}, {"id": "1-2m-health-010", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "防摔落安全检查", "content": "永远不要将坐在婴儿椅中的宝宝连人带椅放在桌上、凳子等高于地面的平面上。无人看护时，永远不要把宝宝单独留在床、沙发、尿布更换台或凳子上。尿布更换台要选带5厘米或更高护栏的，且不要放在靠近窗户的地方。把宝宝放在任何设备上时都要使用安全带。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["防摔落", "安全", "尿布台"], "third_party": null}, {"id": "1-2m-health-011", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "防烧伤烫伤", "content": "吸烟、喝热饮或在炉边做饭时不要抱着宝宝，也不要允许别人在宝宝周围吸烟。给宝宝洗澡前先用手腕或前臂内侧试水温，要先放好水试好温度再把宝宝放入；把热水器最高温度定在49℃以下。不要用微波炉加热宝宝的奶或食物，喝前要充分搅拌并试温度。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["烫伤", "洗澡水温", "安全"], "third_party": null}, {"id": "1-2m-health-012", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "防窒息", "content": "经常检查玩具上容易扯下来或损坏的小部件是否完好，检查玩具有没有尖锐的边角。不要在婴儿床上悬挂玩具，因为这个阶段的宝宝可能会把玩具扯下来或被玩具缠住。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["窒息", "玩具安全", "婴儿床"], "third_party": null}, {"id": "1-2m-health-013", "age_stage": "1-2月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "千万不要摇晃宝宝", "content": "当宝宝哭闹不休让你非常沮丧甚至愤怒时，最好的做法是轻轻把他放回婴儿床，自己稍微休息一下。最重要的是一定要抗拒任何摇晃或拍打宝宝的想法——摇晃会对宝宝造成严重伤害，是一种虐待儿童的行为。如果哭闹长期困扰你，请和儿科医生讨论应对技巧，并把这些安抚方法分享给其他看护者。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["摇晃综合征", "安全", "哭闹"], "third_party": null}, {"id": "1-2m-health-014", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "乘车务必用安全座椅", "content": "宝宝外出乘车务必放进有效的安全座椅，并以正向固定在汽车座椅上，系好安全带。家长抱着宝宝乘车是错误且危险的做法，在急刹车或猛烈撞击时后果不堪设想。选购要参照说明书正确安装使用。可以让宝宝提前在家熟悉安全座椅、用玩具吸引、乘车途中讲故事唱歌转移注意力，逐渐适应。", "source": [{"book": "崔", "loc": "印刷页182"}, {"book": "崔", "loc": "印刷页183"}], "divergence": false, "divergence_note": null, "tags": ["安全座椅", "乘车安全", "外出"], "third_party": null}, {"id": "1-2m-health-015", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "安全使用婴儿车", "content": "使用婴儿车要注意宝宝的体感温度，宝宝代谢旺盛易出汗，车内空气不易流通会使体温升高，要常查看有没有出汗、是否需要增减衣物，必要时抱出来在通风处休息。不要长时间使用，应时常抱起宝宝活动。宝宝颈部肌肉尚未发育齐全，经过颠簸路面时头部剧烈抖动可能受伤，要选平坦路面、系好安全带，停车后立即锁车。", "source": [{"book": "崔", "loc": "印刷页184"}], "divergence": false, "divergence_note": null, "tags": ["婴儿车", "安全", "外出"], "third_party": null}, {"id": "1-2m-health-016", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "4个月内用横抱式背带", "content": "对4个月以内的宝宝，建议选择横抱式婴儿背带。因为小月龄宝宝骨骼、肌肉还未发育完全，尤其颈部力量弱，无法很好支撑头部，长时间竖抱保护不当容易影响发育。要购买从0岁就能用、对头颈部和腰背部有承托设计的款式。注意不要把背带当安抚工具，连续使用不超过2小时，不要在哺乳后30分钟内使用，宝宝在背带内要保持面对家长的姿势。", "source": [{"book": "崔", "loc": "印刷页185"}, {"book": "崔", "loc": "印刷页186"}, {"book": "崔", "loc": "印刷页187"}], "divergence": false, "divergence_note": null, "tags": ["婴儿背带", "颈部支撑", "安全"], "third_party": null}, {"id": "1-2m-health-017", "age_stage": "1-2月", "applies_to": ["1-2月"], "applies_label": null, "board": "health", "title": "防晒与晒太阳", "content": "满月后可在阳光充足时带宝宝户外活动，呼吸新鲜空气并促进钙吸收。但6个月以内婴儿皮肤较薄、容易吸收有害物质，建议不要使用防晒霜。夏天要避开紫外线强的10～16点出门，可在树荫下晒太阳，用遮阴帽避免暴晒。冬天注意保暖但不要一味捂着，盖毯子时不要捂住宝宝口鼻以免窒息。", "source": [{"book": "崔", "loc": "印刷页181"}, {"book": "崔", "loc": "印刷页185"}, {"book": "崔", "loc": "印刷页182"}], "divergence": false, "divergence_note": null, "tags": ["防晒", "晒太阳", "户外", "安全"], "third_party": null}]}, "2-3月": {"feeding": [{"id": "2-3月-feeding-001", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "只喝奶 看饥饿饱胀信号", "content": "4～6个月大之前，宝宝仍只需要喝母乳或配方奶。判断宝宝是否吃饱，最好的办法是看他的生长情况，每次体检医生都会测体重、身高和头围。决定喂多少奶时，要留意宝宝的\"饥饿\"和\"饱胀\"信号，这比他实际喝下多少奶更重要。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["母乳", "配方奶", "饥饿信号"], "third_party": null}, {"id": "2-3月-feeding-002", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "奶量与喂奶频率", "content": "用奶瓶喂配方奶或挤出的母乳时，到快4个月大，每次喝的量会从60～120毫升增加到120～180毫升。纯母乳喂养的宝宝24小时要喂8～12次，有的甚至每90～120分钟就要喂一次，这是宝宝在长身体、需要更多奶。喂得越勤，妈妈分泌乳汁的激素就越多；通常2～3天乳汁量就会增加。如果四五天后宝宝仍很饿且没增重，要咨询医生并预约体重检查。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["奶量", "母乳", "配方奶"], "third_party": null}, {"id": "2-3月-feeding-003", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "吃奶时咳嗽要就医", "content": "宝宝吃奶时频繁或反复咳嗽是不正常的，应该去看医生。如果宝宝在吃奶过程中频繁停顿或脸色变化，要把乳房或奶瓶移开让他先呼吸，这可能表明他呼吸困难，也应该及时就医。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["吃奶", "咳嗽", "就医信号"], "third_party": null}, {"id": "2-3月-feeding-004", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "feeding", "title": "排便次数减少别担心", "content": "两书都提到这个阶段宝宝排便频率会明显下降，母乳或配方奶喂养的宝宝都可能如此。AAP指出宝宝肠道能容纳更多东西、能从乳汁吸收更多营养，胃结肠反射减轻，所以不会每次吃完都排便，有的母乳宝宝隔3～4天甚至一周才排便一次。崔玉涛认为只要宝宝排便时无费力状、大便性状正常、生长良好，就不必因排便次数而担忧，排便多少都正常。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}, {"book": "崔", "loc": "印刷页193"}, {"book": "崔", "loc": "印刷页194"}], "divergence": false, "divergence_note": null, "tags": ["排便", "大便", "母乳"], "third_party": null}, {"id": "2-3月-feeding-005", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "feeding", "title": "不必夜里叫醒喂奶", "content": "两书都主张不要刻意打断宝宝睡眠喂夜奶。AAP指出快4个月时一些母乳宝宝夜里能连睡5小时以上，这个阶段没有必要把母乳宝宝叫醒喂奶。崔玉涛建议逐渐减少夜奶次数：可尝试延长两次夜奶的间隔，如果确认宝宝不是饿、只是要安抚，可用安抚奶嘴或让爸爸陪哄，让宝宝逐渐明白\"夜里不是每次醒来都有奶吃\"，为养成睡整觉打基础。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}, {"book": "崔", "loc": "印刷页194"}], "divergence": false, "divergence_note": null, "tags": ["夜奶", "睡眠", "安抚"], "third_party": null}, {"id": "2-3月-feeding-006", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "feeding", "title": "警惕喂养过度长太快", "content": "过度肥胖会危害宝宝健康，婴幼儿期生长过速、过度肥胖百害无一利，家长要养成用生长曲线评估发育的习惯，一旦发现体重增长过速就及时调整。生长过速最主要是过度喂养造成的，控制时首先从减少哺喂量和喂奶次数入手；配方奶喂养的宝宝还要注意奶液浓度，严格按包装比例冲调，千万不要为了让宝宝多吃就擅自多加奶粉。此外可让宝宝多游泳来增加运动量。", "source": [{"book": "崔", "loc": "印刷页192"}, {"book": "崔", "loc": "印刷页193"}], "divergence": false, "divergence_note": null, "tags": ["过度喂养", "肥胖", "生长曲线"], "third_party": null}, {"id": "2-3月-feeding-007", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "feeding", "title": "母乳宝宝不肯喝配方粉", "content": "如果因妈妈泌乳量突然减少或生病，不得已要加配方粉，宝宝却不肯喝，可从两方面入手。第一，不要让妈妈喂配方粉，可在宝宝饥饿时先喂配方粉再喂母乳，并建议由妈妈以外的家人喂，喂奶时身上不要带着熟悉的母乳味道，宝宝会更容易接受。第二，在医生指导下改选产品，比如换成水解配方粉。", "source": [{"book": "崔", "loc": "印刷页194"}, {"book": "崔", "loc": "印刷页195"}], "divergence": false, "divergence_note": null, "tags": ["配方粉", "母乳", "换奶"], "third_party": null}, {"id": "2-3月-feeding-008", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "feeding", "title": "添加配方粉坚持按需多吸", "content": "对刚出生的宝宝应尽量坚持母乳喂养，确实需要添加配方粉时，必须坚持\"按需喂养\"原则，尽可能让宝宝多吸吮，以继续刺激乳汁分泌。混合喂养时不要忘记补充维生素D，每天共400国际单位，注意配方粉中维生素D的含量也要计入并相应口服补充。", "source": [{"book": "崔", "loc": "印刷页195"}, {"book": "崔", "loc": "印刷页196"}], "divergence": false, "divergence_note": null, "tags": ["配方粉", "按需喂养", "维生素D"], "third_party": null}, {"id": "2-3月-feeding-009", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "feeding", "title": "复工妈妈提前吸奶冻奶", "content": "出生后3～6个月有些妈妈要复工。需要复工的妈妈应在宝宝1个月大时就偶尔把乳汁吸出用奶瓶喂，让自己习惯挤奶、也让宝宝习惯奶瓶。复工前1个月，很多妈妈每天在两次喂奶之间吸1～2次奶并冷冻起来，供之后看护者喂哺。复工后乳汁可能因压力而减少，妈妈需要寻求和接受他人的帮助，有的妈妈会决定逐渐从母乳转为配方奶。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["复工", "吸奶", "冻奶"], "third_party": null}], "development": [{"id": "2-3月-development-001", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "宝宝2个月会做什么", "content": "2个月时宝宝应该会俯卧抬头，发出哭声以外的咿咿呀呀、哼哼唧唧声，视线能跟随人或物越过正前方的中线。很可能会出现反应性微笑，也许会俯卧抬头45°、笑出声。这些只是参考，每个宝宝节奏不同。", "source": [{"book": "崔", "loc": "印刷页191"}, {"book": "崔", "loc": "印刷页192"}], "divergence": false, "divergence_note": null, "tags": ["发育里程碑", "2月龄", "抬头"], "third_party": null}, {"id": "2-3月-development-002", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "2个月甚至会做的进阶动作", "content": "部分2个月的宝宝甚至会竖抱时保持头部稳定、发出笑声、抓住引逗给的摇铃等玩具、视线随人或物追到180°范围、把两只手放在一起、自发微笑。这些属于超前表现，没出现也完全正常。", "source": [{"book": "崔", "loc": "印刷页192"}], "divergence": false, "divergence_note": null, "tags": ["发育里程碑", "进阶动作", "抓握"], "third_party": null}, {"id": "2-3月-development-003", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "颈部力量与抬头", "content": "这几个月最重要的进步之一是颈部力量增强。每天可以让宝宝趴着玩几次，不到2个月大时他会挣扎着抬头四处看，即使只抬起一两秒，也能看到不一样的世界，并锻炼颈后肌肉。仰卧时自己抬头发展更慢，需要更长时间。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "抬头", "趴着玩"], "third_party": null}, {"id": "2-3月-development-004", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "反射消失与自主动作", "content": "这一阶段初期宝宝的动作大多仍是反射性的，比如击剑姿势、受惊时张开双臂。第2～3个月时一部分新生儿反射会消失，反射消失后宝宝看起来可能暂时不如以前活泼，但他现在的动作虽轻微却是有自主意识的，会逐渐变熟练。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["运动发育", "新生儿反射", "自主动作"], "third_party": null}, {"id": "2-3月-development-005", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "手和手臂动作进步", "content": "这几个月手部动作快速进步。一开始双手紧握成拳，放摇铃在掌心他会本能抓住但不会摇也不会塞进嘴。第1～2个月会松开双手、向外展开双臂。偶尔双手进入视线时他会感兴趣地盯着看，但还不能主动把手举到面前。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["精细运动", "抓握", "手部发育"], "third_party": null}, {"id": "2-3月-development-006", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "帮宝宝锻炼精细运动", "content": "对2个月的宝宝来说，锻炼精细运动可帮助手部握力发育。新生宝宝的小手处于握拳状态，可利用手指轻抚、让手掌多接触皮肤来引导宝宝慢慢张开手、做拉伸。还有更多方式可帮宝宝练习手部抓握，让他从握拳逐渐过渡到拿取、传递。", "source": [{"book": "崔", "loc": "印刷页201"}], "divergence": false, "divergence_note": null, "tags": ["精细运动", "早教", "抓握"], "third_party": null}, {"id": "2-3月-development-007", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "大运动锻炼不可超前", "content": "很多家长觉得运动发育越超前越好，想让宝宝早坐、早站、早走，这是不可取的。独立坐、站、走是一个发育过程，过早强迫会影响骨骼发育，比如过早坐可能引起脊柱侧弯。家长应了解发育规律，在宝宝有意识自主练习时提供机会和适当帮助，切勿提前开始。", "source": [{"book": "崔", "loc": "印刷页201"}, {"book": "崔", "loc": "印刷页202"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "早教", "脊柱保护"], "third_party": null}, {"id": "2-3月-development-008", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "视线追物与视觉协调", "content": "出生头几周宝宝视线很难跟踪移动的物体，挥得太快他似乎视而不见。快2个月大时这会有很大变化，双眼合作更协调，能同时聚焦，视线可跟踪面前0°～180°范围移动的物体。视觉协调增强还会增强感知深度的能力。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 视觉发育"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "追视", "眼睛协调"], "third_party": null}, {"id": "2-3月-development-009", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "喜欢看人脸与对比强烈的图案", "content": "人脸是宝宝最喜欢观察的对象，抱着他时注意力会集中在你脸上尤其是眼睛上。1个月大的宝宝对色彩亮度敏感，喜欢看对比强烈或黑白的图案，对柔和色彩没什么兴趣。快3个月大时开始对同心圆、螺旋等圆形图案更感兴趣，而人脸上正有很多圆形和曲线。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 视觉发育"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "看人脸", "黑白卡"], "third_party": null}, {"id": "2-3月-development-010", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "咿呀发声与语言启蒙", "content": "通过听大人说话，宝宝很快会发现语言的重要性。大约2个月大时可能开始发出咿咿呀呀声，重复啊啊、哦哦等元音。宝宝天生喜欢人类的声音和较高的音调，你和他说话时他会感到安心愉悦，用笑容和咿呀声回应你，从而学到说话轮换、语气、节奏等沟通规则。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 听觉和语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "咿呀发声", "亲子对话"], "third_party": null}, {"id": "2-3月-development-011", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "第一个发自内心的笑容", "content": "满月后宝宝会给你第一个真正的笑容，这是双方重要的转折点。快3个月大时他将成为笑容交流大师，会用灿烂笑容和咯咯笑声主动吸引你、和你聊天，整个身体都参与进来：张开双手、举起手臂、四肢随你说话的节奏晃动，还会模仿你的表情，特别是吐舌头时。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["社交发育", "微笑", "互动"], "third_party": null}, {"id": "2-3月-development-012", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "已经能分辨身边的人", "content": "宝宝也有更喜欢的人，最喜欢的自然是父母。祖父母或熟悉的保姆会先得到犹豫的笑容，对陌生人则可能只是好奇地盯着看或飞快咧嘴。这种有选择的行为说明这么小的宝宝已开始分辨周围人的身份。到3～4个月大时还会开始对其他孩子产生好奇。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["社交发育", "认人", "情感"], "third_party": null}, {"id": "2-3月-development-013", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "development", "title": "及时回应不会宠坏宝宝", "content": "头几个月不用担心宠坏孩子。仔细观察他、在他需要时立刻回应，让他知道你有多关心绝不会有坏处。在6个月大以前，你越是迅速耐心地安抚烦躁的宝宝，他长大后越不用你费心。现在帮他建立安全感和对你的信任，就是在帮他打下自信和独立的基础。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["安全感", "及时回应", "情感发育"], "third_party": null}, {"id": "2-3月-development-014", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "互动时不要剧烈摇晃宝宝", "content": "和宝宝互动时务必保护好他。不要剧烈摇晃小月龄宝宝，因为颈部肌肉尚未发育完全、无法承受头部重量，摇晃可能伤及颈椎。也不要把宝宝高高抛接，下落时尚未发育成熟的骨骼要承受头部压力，风险很大。要等宝宝颈部肌肉有力、能撑住头部之后才考虑这类动作。", "source": [{"book": "崔", "loc": "印刷页200"}], "divergence": false, "divergence_note": null, "tags": ["互动安全", "摇晃", "早教注意事项"], "third_party": null}, {"id": "2-3月-development-015", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "不要让宝宝过早站立翻跳", "content": "不要举着宝宝在腿上或膝盖上翻跳、站立。过早站立和翻跳不利于下肢发育，容易损伤骨关节、增加O形腿或X形腿以及髋关节发育问题的概率，应避免让2个月龄的宝宝做这类动作。", "source": [{"book": "崔", "loc": "印刷页200"}], "divergence": true, "divergence_note": "崔玉涛认为应避免让2个月龄宝宝在腿上翻跳、过早站立，担心损伤下肢和关节；而AAP在运动发育中指出，竖抱使双脚落地时宝宝会先蹲再挺直双腿、原地弹跳，并称这种弹跳是绝对安全的、运动还会让孩子更健康。两书对'弹跳/翻跳'安全性看法不一致。", "tags": ["互动安全", "站立", "下肢发育"], "third_party": {"confidence": "主流倾向但有条件", "conclusion": "关于\"弓形腿（O型腿）\"这个最让家长担心的后果：可以放心，权威机构基本一致。AAP（美国儿科学会）、AAOS（美国骨科医师学会）、克利夫兰医学中心都明确指出，婴幼儿弓形腿的真正原因是宫内胎位（生理性，2岁前多自行变直）、以及布朗特病、佝偻病等病理因素——三家机构在列举病因时都完全没有把\"过早扶站\"或\"腿上蹦跳\"列进去。国内丁香医生引用中文医学文献也得出\"站立早晚与腿型之间目前没有明确证据支持因果关系\"。所以\"腿上蹦跳会蹦成O型腿\"这一说法，在现有循证证据中找不到支撑。\n\n关于\"安全性\"本身，存在中美侧重差异，建议这样把握：\n1）短暂、轻柔、有大人稳稳托住的竖抱让脚点地、原地轻弹，本身是低风险的。AAP把4-7月龄婴儿被扶着脚落地时蜷脚趾、\"踩踏\"\"上下弹\"描述为正常行为，是为日后爬、站做准备，并未发出安全警告；新生儿\"踏步反射\"演示（托腋下、脚触平面）也被AAP列为正常反射，只强调要托稳头和腋下、婴儿尚不能自行承重。\n2）真正需要警惕的不是大人腿上的轻弹，而是\"弹跳座椅/学步车类设备（jumper/exersaucer）\"。HSS儿科物理治疗师的顾虑集中在这类器械：宝宝容易长期踮脚尖、反复后甩腿导致肌肉发育不对称，且这种反射性蹦跳并不真正锻炼走路肌肉——这与\"大人腿上短暂轻弹\"是两回事。\n3）月龄上要量力而行。国家卫健委两份指南（2022、2025）对1-6月龄只推荐俯卧、抬头、翻身，站立/扶走要到6-12月龄、双脚蹦跳要到12-36月龄才作为引导内容。也就是说，2-4月龄宝宝的颈背肌力和身体控制还很弱，重点应放在俯卧抬头等，而不是刻意训练站立或长时间承重。\n\n如何看待崔玉涛的建议：崔玉涛《育儿百科》确有\"不要让宝宝站在大人腿上蹦跳\"的内容（第207页可查），其担忧主要指向\"不符合自然发育规律、可能伤及关节\"。从发育节奏角度（2-4月龄不宜刻意训练承重）他的方向与卫健委指南一致、值得参考；但\"蹦跳损伤关节/致弓形腿\"这一具体因果，目前没有可公开核查的循证证据支撑。\n\n给家长的实用结论：不必因为偶尔逗宝宝、托稳了让他在你腿上轻弹两下而焦虑——这不会蹦出O型腿，也不等于伤关节。但也不建议在2-4月龄把\"扶站、腿上蹦跳\"当成日常训练项目去做，更不要为了\"练腿\"长时间使用弹跳座椅/学步车。这个阶段最该多做的是俯卧（tummy time）、抬头、翻身。", "key_sources": [{"name": "美国儿科学会(AAP)·HealthyChildren — 弓形腿与膝内翻(病因未含早期站立/蹦跳)", "year": "2022", "url": "https://www.healthychildren.org/English/health-issues/conditions/orthopedic/Pages/Bowlegs-and-Knock-Knees.aspx"}, {"name": "美国儿科学会(AAP)·HealthyChildren — 4-7个月运动里程碑(脚落地弹跳为正常行为)", "year": "2021", "url": "https://www.healthychildren.org/English/ages-stages/baby/Pages/Movement-4-to-7-Months.aspx"}, {"name": "美国儿科学会(AAP)·HealthyChildren — 新生儿反射(踏步反射,未列为危险操作)", "year": "2022", "url": "https://www.healthychildren.org/English/ages-stages/baby/Pages/newborn-reflexes.aspx"}, {"name": "美国骨科医师学会(AAOS)·OrthoInfo — 弓形腿/布朗特病(未提早期站立蹦跳)", "year": "2024", "url": "https://orthoinfo.aaos.org/en/diseases--conditions/bowed-legs-blounts-disease/"}, {"name": "克利夫兰医学中心 — 弓形腿(病因为胎位/布朗特病/佝偻病,未含站立蹦跳)", "year": "2026", "url": "https://my.clevelandclinic.org/health/diseases/22049-bow-legged"}, {"name": "纽约特种外科医院(HSS) 儿科物理治疗师 — 弹跳座椅是否有害(顾虑针对器械非腿上轻弹)", "year": "2023", "url": "https://www.hss.edu/health-library/move-better/are-bouncers-bad-for-babies"}, {"name": "国家卫生健康委 — 3岁以下婴幼儿健康养育照护指南(试行)(1-6月龄重点俯卧抬头翻身)", "year": "2022", "url": "https://www.gov.cn/zhengce/zhengceku/2022-11/29/content_5729421.htm"}, {"name": "国家卫生健康委 — 婴幼儿早期发展服务指南(试行)(站立扶走列在6-12月龄)", "year": "2025", "url": "https://www.nhc.gov.cn/fys/c100078/202502/19c9c6dee0274d23822f313a99ae1779.shtml"}, {"name": "澎湃新闻·丁香医生 — 宝宝站得太早会导致腿变弯吗(引中文文献:无明确证据)", "year": "2020", "url": "https://www.thepaper.cn/newsDetail_forward_5468530"}], "caveat": "适用条件：以上结论针对健康足月、下肢发育正常的2-4月龄婴儿，且指\"大人稳稳托住、短暂轻柔的竖抱点地/原地轻弹\"，不包括把婴儿单独放进弹跳座椅/学步车长时间承重。\"未致弓形腿\"是基于现有循证证据无支撑因果的判断，不等于鼓励刻意训练承重；2-4月龄发育重点仍是俯卧、抬头、翻身。崔玉涛\"不要在腿上蹦跳\"的建议中\"伤关节/致弓形腿\"的具体因果未找到可公开核查的循证原文，本结论未据此下负面断言。若宝宝为早产儿、低体重、有发育迟缓/肌张力异常、髋关节发育不良或任何下肢异常迹象（如双腿明显不对称、持续踮脚、抗拒承重），以及对是否/如何让宝宝承重有疑问，请以面诊的儿科医生或儿童骨科/康复科医生意见为准。"}}, {"id": "2-3月-development-016", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "如何与不同个性的宝宝相处", "content": "每个宝宝都有独特个性，需要家长理解尊重。过于活跃的宝宝可用襁褓包裹、播放经典音乐、洗澡等方式帮他安静下来，且照看时务必小心防坠落。性格内向、容易害羞的宝宝面对新人、新地点、新玩具会排斥，要给足够时间适应，换新看护人时让原看护人陪同过渡、逐渐增加接近时间。", "source": [{"book": "崔", "loc": "印刷页202"}, {"book": "崔", "loc": "印刷页203"}], "divergence": false, "divergence_note": null, "tags": ["气质", "个性化养育", "早教"], "third_party": null}, {"id": "2-3月-development-017", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "与需求多变的宝宝相处", "content": "需求多变的宝宝比较随心所欲，吃奶睡觉都难找规律。家长应尽快帮他建立规律的饮食与作息：记录一段时间的吃奶、作息找规律，在相对固定的时间哺乳、洗澡、游戏互动，帮宝宝建立昼夜观念，充分保证夜间睡眠质量。", "source": [{"book": "崔", "loc": "印刷页203"}], "divergence": false, "divergence_note": null, "tags": ["气质", "作息规律", "个性化养育"], "third_party": null}, {"id": "2-3月-development-018", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "哭闹安抚不住时先放下休息", "content": "当宝宝哭闹不休让你非常沮丧甚至愤怒时，最好的做法是轻轻把他放回婴儿床，自己稍微休息一下。最重要的是一定要抗拒任何摇晃或拍打孩子的冲动——摇晃会对孩子造成严重伤害。如果长期被哭闹困扰，请和儿科医生详细讨论应对技巧，并与其他看护者分享安抚方法。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["哭闹安抚", "摇晃综合征", "情绪管理"], "third_party": null}, {"id": "2-3月-development-019", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "development", "title": "进一步帮宝宝建立作息规律", "content": "作息规律重要，但每个宝宝都是独特个体，建立时要注意方式，不要刻意或过快安排，先了解宝宝自身需求再引导形成规律。可参考时间表但不必严格按表执行，宝宝发出明确信号时不应为了守时间表而硬不让他吃奶，要在一定范围内灵活把握。", "source": [{"book": "崔", "loc": "印刷页199"}, {"book": "崔", "loc": "印刷页200"}], "divergence": false, "divergence_note": null, "tags": ["作息规律", "早教", "个性化养育"], "third_party": null}], "care": [{"id": "2-3月-care-001", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "睡觉一律仰卧", "content": "这个阶段的宝宝睡觉应该始终保持仰卧的姿势，这是最安全的睡姿。满月后宝宝白天醒着的时间会变多，吃奶次数减少，夜里可能会少吃一次奶。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["仰卧", "睡姿", "夜奶"], "third_party": null}, {"id": "2-3月-care-002", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "care", "title": "让宝宝自己睡小床", "content": "建议夜间和宝宝同房不同床，让宝宝睡自己的小床，可以避免大人压到宝宝、影响睡眠质量等隐患，也能培养独立性。如果之前一直同床，分床初期可增加睡前陪伴、待宝宝睡着再离开，夜间哭闹先观察安抚、尽量不要立刻抱起。小床可与大床并排、稍微分开或单独放在房间一角。", "source": [{"book": "崔", "loc": "印刷页198"}, {"book": "崔", "loc": "印刷页199"}], "divergence": false, "divergence_note": null, "tags": ["同房不同床", "小床", "独立睡眠"], "third_party": null}, {"id": "2-3月-care-003", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "care", "title": "现在还不需要枕头", "content": "刚出生几个月的宝宝脊柱生理弯曲还没形成，平躺时不存在颈部紧绷、呼吸不畅的问题，此时用枕头反而会制造不适的弯曲，造成呼吸不畅，所以还不需要枕头。一般等到宝宝会独立坐之后再考虑，是否需要以宝宝睡得是否舒适为判断标准。", "source": [{"book": "崔", "loc": "印刷页197"}, {"book": "崔", "loc": "印刷页198"}], "divergence": false, "divergence_note": null, "tags": ["枕头", "脊柱", "日常护理"], "third_party": null}, {"id": "2-3月-care-004", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "care", "title": "进一步建立作息规律", "content": "这个阶段大多数宝宝已经有了一定的作息规律：早晨大致同一时间醒、晚上定点入睡。家长可以参考宝宝自身的需求帮他建立规律，但不要过快、过严地按时间表行事，否则会让宝宝缺乏安全感。应在一定时间范围内灵活引导，逐渐帮宝宝形成属于自己的作息规律。", "source": [{"book": "崔", "loc": "印刷页199"}, {"book": "崔", "loc": "印刷页200"}], "divergence": false, "divergence_note": null, "tags": ["作息规律", "灵活引导", "安全感"], "third_party": null}, {"id": "2-3月-care-005", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "逐渐拉长夜奶间隔", "content": "崔玉涛建议不要刻意叫醒宝宝喂夜奶，宝宝饿了自然会醒，可以尝试延长两次夜奶的间隔、逐渐减少夜间喂奶次数，为日后睡整觉打基础；如果只是需要安抚，可用安抚奶嘴或由爸爸陪哄。AAP同样指出这个阶段没必要夜里叫醒母乳宝宝喂奶，有些宝宝快4个月时夜里能连续睡5小时以上。", "source": [{"book": "崔", "loc": "印刷页194"}, {"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["夜奶", "睡整觉", "不叫醒喂奶"], "third_party": null}, {"id": "2-3月-care-006", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "防摔落护理要点", "content": "宝宝随时可能学会翻身，把他放在床、沙发、尿布更换台等高于地面的平面上时一定要特别小心，无人看护时绝不能单独留下。坐在婴儿椅里也不要连人带椅放到桌子凳子等高处；尿布更换台要选带5厘米以上护栏的，并远离窗户；放在任何设备上都要系安全带。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 预防摔落"}], "divergence": false, "divergence_note": null, "tags": ["防摔落", "尿布更换台", "安全带"], "third_party": null}, {"id": "2-3月-care-007", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "防烧烫伤护理要点", "content": "抱着宝宝时不要吸烟、喝热饮或在炉子边做饭，也不要让别人在宝宝周围吸烟。给宝宝洗澡前先用手腕或前臂内侧试水温，先放好水试好温度再把宝宝放进去，热水器最高温度定在49℃以下。不要用微波炉加热宝宝的奶，喂前要充分搅拌并试温。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 预防烧伤和烫伤"}], "divergence": false, "divergence_note": null, "tags": ["防烫伤", "水温", "微波炉"], "third_party": null}, {"id": "2-3月-care-008", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "care", "title": "防窒息护理要点", "content": "经常检查玩具上是否有容易扯下来或损坏的小部件、有没有尖锐边角。不要在婴儿床上悬挂玩具，因为这个阶段的宝宝可能把玩具扯下来或被玩具缠住。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 预防窒息"}], "divergence": false, "divergence_note": null, "tags": ["防窒息", "玩具", "婴儿床"], "third_party": null}], "health": [{"id": "2-3月-health-001", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "发热超38℃立刻就医", "content": "不满3个月的婴儿一旦直肠温度达到38℃及以上，要立刻就医，不要拖延。这个月龄的小婴儿病情容易很快加重，发热是需要马上处理的信号。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["发热", "就医信号", "新生儿"], "third_party": null}, {"id": "2-3月-health-002", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "出现这些情况要就医", "content": "感冒大多无需看医生，但若宝宝持续咳嗽、多次拒奶没胃口、不满3个月直肠温度达38℃及以上、格外烦躁，或异常困倦很难叫醒，就要及时带他就医。其中发热达38℃这一条要马上就医。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["就医信号", "感冒", "烦躁"], "third_party": null}, {"id": "2-3月-health-003", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "吃奶时咳嗽变脸色要查", "content": "宝宝吃奶时频繁或反复咳嗽是不正常的，应去看医生。如果吃奶过程中频繁停顿或脸色变化，要把乳房或奶瓶移开让他呼吸，这可能说明他呼吸困难，也要及时就医。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["喂养", "就医信号", "呼吸"], "third_party": null}, {"id": "2-3月-health-004", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "排便次数减少多属正常", "content": "两本书都提到这个阶段宝宝排便次数会明显减少，母乳喂养的宝宝可能隔三四天甚至一周才排一次，配方奶喂养的宝宝也会减少。这是肠道吸收变好的表现，只要吃奶好、体重正常、大便不过干过硬、排便不费劲，就不用因为次数少而担心。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 饮食"}, {"book": "崔", "loc": "印刷页193"}], "divergence": false, "divergence_note": null, "tags": ["排便", "母乳喂养", "常见现象"], "third_party": null}, {"id": "2-3月-health-005", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "吐奶（胃食管反流）", "content": "胃内容物反流到食管会引起吐奶，因为括约肌发育还不成熟，大多数婴儿都有一定程度的反流，会随时间减轻。喂奶时和喂奶后给宝宝拍嗝，喂完半小时内尽量让他保持直立，可减轻吐奶。若吐奶严重、影响吃奶或伴随体重不增，要向儿科医生咨询。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["吐奶", "胃食管反流", "喂养"], "third_party": null}, {"id": "2-3月-health-006", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "小婴儿也可能患中耳炎", "content": "中耳炎多见于大些的孩子，但偶尔也会发生在3个月以下婴儿身上，初期常表现为烦躁不安、尤其夜里，还可能发热。需就医由医生判断处理。注意：不要给宝宝吃阿司匹林，它可能引起严重的瑞氏综合征。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["中耳炎", "发热", "用药安全"], "third_party": null}, {"id": "2-3月-health-007", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "湿疹", "content": "满月后的婴儿随时可能患湿疹，会引起皮肤干燥、粗糙和红斑，最高发在面部、肘窝和腘窝，可能痒得让宝宝烦躁。预防复发可用温和的沐浴液和洗衣液、穿柔软衣物、每周洗澡不超过3次。严重时请医生推荐处理方法。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["湿疹", "皮肤", "护理"], "third_party": null}, {"id": "2-3月-health-008", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "RSV 感染要重点防", "content": "RSV 是导致婴幼儿下呼吸道感染最常见的病毒，2～8个月大是发病率最高的阶段，可造成细支气管炎和肺炎。预防办法：抱宝宝前用热水香皂洗手、避免接触有病症的人、远离人多场所、禁止任何人在宝宝周围吸烟。出现呼吸加快、喘息要就医。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["RSV", "呼吸道感染", "预防"], "third_party": null}, {"id": "2-3月-health-009", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "鼻塞影响吃奶睡觉怎么办", "content": "2～3个月的宝宝还不太会用嘴呼吸，感冒鼻塞会让他比大孩子更难受，常影响入睡和吃奶。可在喂奶前或鼻塞重时用干净的吸鼻器吸出鼻涕，先滴几滴医生开的盐水滴鼻液稀释鼻涕更易吸出，注意力度别太大以免加重肿胀。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["鼻塞", "感冒", "护理"], "third_party": null}, {"id": "2-3月-health-010", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "耳垢不用特意清", "content": "产生耳垢是耳朵正常健康的表现，耳朵会自我清洁，只需用柔软毛巾快速擦拭就能保持干净，不必特意去掏。如果耳朵里流出的是脓液等异常分泌物而不是耳垢，则需要带宝宝就医。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["耳垢", "护理", "就医信号"], "third_party": null}, {"id": "2-3月-health-011", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "按时接种2月龄疫苗", "content": "宝宝2个月大时应接种这几类疫苗，并在4个月大时再次接种：百白破、脊髓灰质炎灭活疫苗、B型流感嗜血杆菌疫苗、肺炎球菌疫苗、轮状病毒疫苗，以及若1个月时没接种则补种乙肝疫苗。乙肝第二针应在第一针后至少4周接种。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "2月龄", "乙肝"], "third_party": null}, {"id": "2-3月-health-012", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "坚持仰卧睡，防猝死", "content": "这个阶段的宝宝应该以仰卧姿势睡觉，这是最安全的睡姿，能降低婴儿猝死综合征风险。即使为了减轻吐奶，也不要让宝宝俯卧睡，除非吐奶特别严重、医生明确建议这样做。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["仰卧", "睡眠安全", "婴儿猝死"], "third_party": null}, {"id": "2-3月-health-013", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "千万不要摇晃宝宝", "content": "两本书都明确警告不要摇晃宝宝。AAP 强调宝宝哭闹不休让你沮丧愤怒时，绝不能摇晃或拍打，摇晃会对孩子造成严重伤害、是一种虐待行为；崔玉涛解释这个月龄宝宝颈部肌肉尚未发育完全，无法承受头部重量，摇晃可能伤到颈椎。安抚不了时可把他放回小床、自己先休息一下。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 情感和社交能力发育"}, {"book": "崔", "loc": "印刷页200"}], "divergence": false, "divergence_note": null, "tags": ["摇晃综合征", "安全", "哭闹"], "third_party": null}, {"id": "2-3月-health-014", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "health", "title": "互动玩耍的安全禁忌", "content": "和宝宝玩时不要做这些危险动作：不要高高抛接宝宝，下落惯性会让尚未发育成熟的骨骼承受头部压力；不要在宝宝眼前快速旋转晃动；不要让2个月的宝宝在杠上之类的地方站立翻跳，会损伤下肢和髋关节、增加O形或X形腿概率；不要常捏宝宝肚子，腹壁肌肉还在发育，可能造成损伤。", "source": [{"book": "崔", "loc": "印刷页200"}], "divergence": false, "divergence_note": null, "tags": ["互动安全", "抛接", "关节发育"], "third_party": null}, {"id": "2-3月-health-015", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "预防宝宝摔落", "content": "无人看护时永远不要把宝宝单独留在床、沙发、尿布更换台或凳子上，也不要把坐在婴儿椅里的宝宝连人带椅放到桌子等高处。尿布更换台要选带5厘米以上护栏的、别靠窗摆放，把宝宝放在任何设备上都要系安全带。这个阶段宝宝可能突然翻身，要格外小心。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["防摔落", "尿布台", "安全带"], "third_party": null}, {"id": "2-3月-health-016", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "预防烧伤和烫伤", "content": "抽烟、喝热饮或在炉边做饭时不要抱着宝宝，也别让别人在宝宝周围吸烟。给宝宝洗澡前先放好水、用手腕或前臂内侧试水温再放宝宝进去，热水器最高温度定在49℃以下。不要用微波炉热奶，喝前要充分搅拌并试温。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["防烫伤", "洗澡", "热奶"], "third_party": null}, {"id": "2-3月-health-017", "age_stage": "2-3月", "applies_to": ["1-2月", "2-3月"], "applies_label": "适用 1～3 月龄", "board": "health", "title": "预防窒息", "content": "经常检查玩具上容易扯下来或损坏的小部件是否完好、有没有尖锐边角。不要在婴儿床上悬挂玩具，因为这个阶段的宝宝可能把玩具扯下来或被玩具缠住，存在窒息风险。", "source": [{"book": "AAP", "loc": "第7章 1～3月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["防窒息", "玩具安全", "婴儿床"], "third_party": null}, {"id": "2-3月-health-018", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "health", "title": "同床睡有隐患，建议同房不同床", "content": "很多家长为了亲密或哺乳方便愿意和宝宝同床，但崔玉涛指出同床存在隐患：大人睡熟可能压到刚会翻身的宝宝，宝宝与成人床垫软硬不同还可能影响脊椎。建议让宝宝睡自己的小床、与父母同房不同床，既能避免风险又能培养独立性，小床可并排摆在大床旁便于夜间照顾。", "source": [{"book": "崔", "loc": "印刷页198"}], "divergence": false, "divergence_note": null, "tags": ["睡眠安全", "同房不同床", "小床"], "third_party": null}, {"id": "2-3月-health-019", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "health", "title": "这个阶段还不需要用枕头", "content": "刚出生几个月的宝宝生理弯曲还没形成，平躺时不存在颈部紧绷、呼吸不畅的问题，能自然平躺呼吸。此时用枕头反而会制造一个不适的弯曲、造成呼吸不畅。崔玉涛建议等宝宝会独立坐之后再考虑用枕头，是否使用以宝宝是否舒适为判断标准。", "source": [{"book": "崔", "loc": "印刷页197"}], "divergence": false, "divergence_note": null, "tags": ["枕头", "睡眠", "护理"], "third_party": null}, {"id": "2-3月-health-020", "age_stage": "2-3月", "applies_to": ["2-3月"], "applies_label": null, "board": "health", "title": "警惕生长过速和肥胖", "content": "崔玉涛提醒，婴幼儿期生长过速、过度肥胖对健康有害，世界卫生组织也把肥胖视为一种营养不良。生长过速大多是过度喂养造成的，控制体重要从调整哺喂量和喂奶次数入手，配方奶要严格按包装比例冲调、不要擅自加浓。建议养成用生长曲线评估发育的习惯，发现体重增长过快及时调整。", "source": [{"book": "崔", "loc": "印刷页192"}], "divergence": false, "divergence_note": null, "tags": ["生长过速", "肥胖", "过度喂养"], "third_party": null}]}, "3-4月": {"feeding": [{"id": "3-4月-feeding-001", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "何时开始添加辅食", "content": "宝宝大约6个月大之前最好纯母乳喂养，4～6个月大时可以开始添加辅食。辅食最好是软的，这样更安全。最佳时机可能是你吃宝宝能吃的食物、而他表现出想尝一尝的兴趣时。此时母乳仍是主要营养来源。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "母乳", "月龄"], "third_party": null}, {"id": "3-4月-feeding-002", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "挺舌反射与喂辅食时机", "content": "小婴儿天生有挺舌反射，会本能地用舌头把伸进嘴里的东西往外推。大多数宝宝在4～5个月大时就不再有挺舌反射，这时正好是让他练习吃辅食的好时机。在宝宝4个月做体检时，可以问问医生添加辅食的时间。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "挺舌反射", "发育"], "third_party": null}, {"id": "3-4月-feeding-003", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "尽早添加易过敏食物", "content": "这个阶段让宝宝开始吃含花生的食品，有助于防止他日后对花生过敏。没有证据显示等到6个月以后再添加鸡蛋、乳制品、大豆、花生或鱼能预防过敏，因此专科医生建议尽早在饮食中添加这些易过敏食物。若宝宝有严重湿疹或对鸡蛋蛋白过敏，应先咨询儿科医生。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "过敏", "花生"], "third_party": null}, {"id": "3-4月-feeding-004", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "喂辅食的方法与姿势", "content": "喂辅食时应让宝宝坐直，以尽量避免食物进入呼吸道。可以用勺子或手指喂，也可让宝宝自己用手拿着吃，但不要把辅食放进奶瓶或带奶嘴的喂食器，那会增加摄入量、导致体重增长过多并增高呛入呼吸道的风险。一开始每次只喂一两勺，等他适应吞咽后再慢慢加量。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "喂养方法", "坐直"], "third_party": null}, {"id": "3-4月-feeding-005", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "先尝辅食再喂奶过渡", "content": "顺利过渡的好办法是：每次先让宝宝尝一点儿辅食，再喂平时的母乳或配方奶。这样可避免宝宝在很饿时因不习惯辅食而闹脾气，也能让他慢慢适应用小勺吃辅食。如果他不停哭闹或拒绝，就不要逼他吃，可隔1～2周另选时间再试。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "过渡", "拒绝"], "third_party": null}, {"id": "3-4月-feeding-006", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "辅食种类与顺序", "content": "刚开始传统做法是喂一种谷物，但没有医学证据表明按特定顺序喂辅食更好。儿科医生建议选全谷物米粉而非精加工米粉，因为有些大米砷含量较高，应让宝宝吃多种谷物而非只吃一种。无论选什么，都要保证食物非常柔软或完全是泥状，直到宝宝能安全吃其他质地的食物。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "米粉", "顺序"], "third_party": null}, {"id": "3-4月-feeding-007", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "按饥饱信号喂、不强求分量", "content": "和母乳或配方奶喂养一样，要根据宝宝\"饱胀\"和\"饥饿\"的信号来决定他吃多少，而不要强求每餐吃够相应分量。宝宝可能前10次都拒绝某种食物，却在第11次尝试时爱上它，所以反复让他接触新蔬菜很重要。宝宝不需要在食物里添加糖和盐。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "饥饱信号", "少盐少糖"], "third_party": null}, {"id": "3-4月-feeding-008", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "辅食卫生与自制", "content": "喂辅食时不要直接从瓶罐袋里取喂宝宝，而要先倒适量到餐盘，防止剩下的被口水细菌污染；餐盘吃剩的要倒掉不留到下次。你不必依赖罐装食品，自己蒸煮新鲜蔬果做成软软的辅食最容易，香蕉可直接弄碎，其他水果多需加热变软；用前要检查食物是否腐坏。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "卫生", "自制"], "third_party": null}, {"id": "3-4月-feeding-009", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "只喝母乳配方奶和水", "content": "除了母乳（或配方奶）和水之外，不要给宝宝喝其他饮品。美国儿科学会建议不要给婴儿喝果汁，因为果汁不能提供营养物质，也不建议1岁以内的婴儿喝牛奶。绝不要把果汁作为宝宝脱水和腹泻时的饮品，喝果汁还会让宝宝对甜饮品上瘾，导致体重过度增长和龋齿。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": true, "divergence_note": "是否能给宝宝喝果汁存在分歧：AAP明确反对给1岁以内婴儿喝果汁，认为会上瘾、致龋齿和体重过度增长；崔玉涛则把在奶嘴里加稀释果汁列为帮宝宝接受奶嘴的\"不得已\"办法（见同阶段\"用果汁帮宝宝接受奶嘴\"要点），强调必须稀释、不要常用、适应后即停。第三方意见后续补。", "tags": ["饮品", "果汁", "母乳"], "third_party": {"confidence": "有明确权威结论", "conclusion": "不建议给1岁以内的婴儿喝果汁——包括稀释过的果汁。这一点上，中外权威机构方向高度一致：\n\n【为什么不建议】\n1. 没有营养必要：对1岁内宝宝来说，母乳或配方奶已能满足全部液体和营养需求；想补充维生素和膳食纤维，整个的果泥/蔬果泥远胜过果汁（CDC、AAP、中国卫健委 WS/T 678-2020 均持此立场，辅食推荐里明确\"不包括果汁\"）。\n2. 增加龋齿风险：100%纯果汁也被归入\"含糖饮料\"，糖分接触牙齿会增加蛀牙风险（AAP、美国儿科牙科学会 AAPD、CDC）。\n3. 影响体重和热量：果汁是\"喝进去的糖\"，容易造成额外热量摄入、体重过快增长，还会占掉本该喝奶的肚子（AAP）。\n4. 养成偏甜口味：宝宝一旦接受了甜味，往往就不爱喝白开水、对原味辅食和奶提不起兴趣——这一点崔玉涛和 AAP/CDC 的看法完全一致，崔玉涛也明确说\"不建议给孩子喝菜水和果汁\"\"1岁内宝宝不可吃果汁\"，主张用果泥替代。\n\n【机构间的细微差别】\n- AAP（美国儿科学会）、CDC（美国疾控中心）、AAPD（美国儿科牙科学会）：最严格、最明确——1岁以内任何形式的果汁都不给，包括稀释果汁，唯一例外是有医生指征的便秘处理。\n- 中国卫健委、中国营养学会：方向一致（辅食不含果汁、托育机构\"避免提供果汁饮料\"、辅食保持原味），但用词比美国稍温和。\n- WHO（世界卫生组织 2023）：针对6-23月龄建议\"限制\"100%果汁、与含糖饮料同等对待，措辞用\"限制\"而非\"禁止\"，且未单独把12月龄以下加严。\n\n【关于\"稀释果汁/不得已\"的说明】\n任务里提到崔玉涛把\"稀释果汁涂奶嘴\"作为帮宝宝接受奶嘴的不得已办法。需要诚实告知：本次检索到的崔玉涛公开原文中，确实有\"可将乳汁或果汁涂于安抚奶嘴上\"诱导孩子接受奶嘴、戒除吃手的说法，但这是把果汁涂在奶嘴头上做过渡诱导，不是当饮料喂；原文里也没有出现\"稀释\"\"不常用\"\"适应即停\"等具体措辞，这些修饰未能在公开来源中核实到。即便如此，这也只是极特殊的过渡场景，和\"日常给宝宝喝果汁\"是两回事。\n\n【给家长的实操建议】\n1岁以内：用白开水（满6月龄添加辅食后可少量）+ 母乳/配方奶满足喝水需求；想吃水果就给果泥、果块（注意性状和窒息风险），不要榨成汁喝。", "key_sources": [{"name": "美国儿科学会(AAP)《婴幼儿、儿童及青少年果汁摄入》政策声明", "year": "2017", "url": "https://publications.aap.org/pediatrics/article/139/6/e20170967/38754/Fruit-Juice-in-Infants-Children-and-Adolescents"}, {"name": "AAP官方家长平台HealthyChildren.org：1岁以下儿童不喝果汁", "year": "2017", "url": "https://www.healthychildren.org/English/news/Pages/AAP-Recommends-No-Fruit-Juice-for-Children-Under-1-Year.aspx"}, {"name": "美国疾控中心(CDC)：应避免或限制的食物和饮品", "year": "现行", "url": "https://www.cdc.gov/infant-toddler-nutrition/foods-and-drinks/foods-and-drinks-to-avoid-or-limit.html"}, {"name": "美国儿科牙科学会(AAPD)婴幼儿及青少年膳食建议", "year": "现行", "url": "https://www.aapd.org/research/oral-health-policies--recommendations/dietary-recommendations-for-infants-children-and-adolescents/"}, {"name": "国家卫生健康委行业标准 WS/T 678-2020《婴幼儿辅食添加营养指南》", "year": "2020", "url": "https://www.nhc.gov.cn/fzs/c100048/202005/69a4ae35ff314ebbb34d281196a6dc87/files/1733125339160_47351.pdf"}, {"name": "国家卫健委/中国营养学会《婴幼儿喂养健康教育核心信息》", "year": "2020", "url": "https://www.chinanutri.cn/yyjkzxpt/yyjkkpzx/jwjwx/202008/t20200803_218122.html"}, {"name": "WHO 6-23月龄辅食喂养指南（建议5.4：限制100%果汁）", "year": "2023", "url": "https://www.ncbi.nlm.nih.gov/books/NBK596423/"}, {"name": "崔玉涛科普（不建议给孩子喝菜水和果汁、用果泥替代）", "year": "公开科普", "url": "https://k.sina.cn/article_5279436857_13aadd03902700hapc.html"}], "caveat": "适用条件：本结论针对健康、1岁以内的普通婴儿的日常喂养。例外情形（如医生明确诊断的便秘需用果汁辅助处理）应遵医嘱，不属于自行给果汁的范畴。各机构在措辞力度上略有差异（美国AAP/CDC/AAPD最严格用\"禁止\"，WHO和中国机构偏\"限制/不推荐\"），但方向一致：1岁内不把果汁当日常饮品。崔玉涛\"涂奶嘴诱导接受奶嘴\"是极特殊过渡场景而非喂饮，且原文未见\"稀释/适应即停\"等措辞，请勿据此扩大为日常喂果汁。宝宝若有特殊健康状况、早产、过敏史、便秘或喂养困难，请以你的主治儿科医生意见为准。"}}, {"id": "3-4月-feeding-010", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "补充维生素D", "content": "美国儿科学会建议宝宝6个月前纯母乳喂养，纯母乳喂养意味着除维生素D外不需摄入其他食物或液体（除非医生建议）。建议婴儿补充维生素D，除非每天喝800毫升以上额外添加了维生素D的配方奶。不满1岁的婴儿每天补充400国际单位维生素D。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 营养补充剂"}], "divergence": false, "divergence_note": null, "tags": ["维生素D", "补充剂", "母乳"], "third_party": null}, {"id": "3-4月-feeding-011", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "feeding", "title": "是否需要补铁", "content": "出生后头4个月，母乳喂养的宝宝不需额外补铁，因为出生时体内储铁足够。随着成长加速、储铁减少，部分母乳或纯母乳喂养的4个月大宝宝应按每千克体重1毫克铁口服补铁剂，直到开始吃能补铁的辅食（如高铁婴儿米粉）。开始吃辅食后可从肉类、高铁米粉和绿色蔬菜中获取铁。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 营养补充剂"}], "divergence": false, "divergence_note": null, "tags": ["补铁", "母乳", "辅食"], "third_party": null}, {"id": "3-4月-feeding-012", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "feeding", "title": "宝宝突然拒绝吃母乳", "content": "宝宝不会无缘无故拒绝吃母乳，往往是吃奶时发生了让他不愉快的事。与妈妈有关的原因包括：近期吃了辛辣或刺激性食物改变了乳汁味道；妈妈焦虑紧张等情绪化导致荷尔蒙水平异常影响乳汁味道；以及乳房问题。家长应从妈妈和宝宝两方面积极搜寻原因，尽快恢复。", "source": [{"book": "崔", "loc": "印刷页208"}, {"book": "崔", "loc": "印刷页209"}], "divergence": false, "divergence_note": null, "tags": ["母乳", "拒奶", "乳汁"], "third_party": null}, {"id": "3-4月-feeding-013", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "feeding", "title": "长牙咬乳头致拒奶", "content": "如果宝宝已经长出牙来，在吃母乳时用牙龈咬妈妈乳头、吸吮时产生疼痛感，会让宝宝抵抗母乳。此外宝宝因其他疾病（如耳朵疾病）不舒服时也可能不愿吃母乳，家长应留意宝宝是否患了耳朵等疾病，需要时带宝宝就医。", "source": [{"book": "崔", "loc": "印刷页209"}], "divergence": false, "divergence_note": null, "tags": ["母乳", "长牙", "拒奶"], "third_party": null}, {"id": "3-4月-feeding-014", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "feeding", "title": "背奶妈妈帮宝宝适应奶嘴", "content": "很多妈妈上班后选择\"背奶\"继续母乳喂养，面临的问题是习惯了妈妈乳头的宝宝一开始可能拒绝奶嘴。为保证妈妈不在家时宝宝正常进食，家长应尽早帮宝宝适应奶嘴：选择合适的奶嘴，多次在哺喂时尝试，宝宝可能就会逐渐接受。", "source": [{"book": "崔", "loc": "印刷页209"}, {"book": "崔", "loc": "印刷页210"}], "divergence": false, "divergence_note": null, "tags": ["背奶", "奶嘴", "上班"], "third_party": null}, {"id": "3-4月-feeding-015", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "feeding", "title": "请家人喂、奶嘴抹母乳", "content": "给宝宝试奶嘴时尽量避开妈妈，因为宝宝一闻到妈妈奶味反而会更拒绝奶嘴，最好请家人帮忙，妈妈与宝宝保持距离、甚至让宝宝看不到妈妈。还可以在奶嘴上抹一两滴母乳，宝宝吸吮时闻到熟悉味道可能更容易接受；有的宝宝会因感觉与乳头不同而吐出，多试几次就会逐渐适应。", "source": [{"book": "崔", "loc": "印刷页210"}], "divergence": false, "divergence_note": null, "tags": ["奶嘴", "母乳", "家人"], "third_party": null}, {"id": "3-4月-feeding-016", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "feeding", "title": "用果汁帮宝宝接受奶嘴", "content": "当宝宝特别抗拒奶嘴时，可以在奶嘴中放一两滴果汁（如苹果汁或蔬菜汁），让宝宝闻到味道而接受奶嘴。但这是不得已而为之的办法，最好不要经常尝试；果汁一定要经过稀释，喝太多会影响味觉发育、引起偏食等问题；宝宝完全适应奶嘴后就不需要再给果汁了。", "source": [{"book": "崔", "loc": "印刷页210"}, {"book": "崔", "loc": "印刷页211"}], "divergence": true, "divergence_note": "是否能给宝宝喝果汁存在分歧：崔玉涛把在奶嘴里加稀释果汁列为帮宝宝接受奶嘴的\"不得已\"办法（强调稀释、不常用、适应后即停）；AAP则明确反对给1岁以内婴儿喝果汁，认为果汁无营养、会上瘾并导致龋齿和体重过度增长（见同阶段\"只喝母乳配方奶和水\"要点）。第三方意见后续补。", "tags": ["果汁", "奶嘴", "稀释"], "third_party": {"confidence": "有明确权威结论", "conclusion": "不建议给1岁以内的婴儿喝果汁——包括稀释过的果汁。这一点上，中外权威机构方向高度一致：\n\n【为什么不建议】\n1. 没有营养必要：对1岁内宝宝来说，母乳或配方奶已能满足全部液体和营养需求；想补充维生素和膳食纤维，整个的果泥/蔬果泥远胜过果汁（CDC、AAP、中国卫健委 WS/T 678-2020 均持此立场，辅食推荐里明确\"不包括果汁\"）。\n2. 增加龋齿风险：100%纯果汁也被归入\"含糖饮料\"，糖分接触牙齿会增加蛀牙风险（AAP、美国儿科牙科学会 AAPD、CDC）。\n3. 影响体重和热量：果汁是\"喝进去的糖\"，容易造成额外热量摄入、体重过快增长，还会占掉本该喝奶的肚子（AAP）。\n4. 养成偏甜口味：宝宝一旦接受了甜味，往往就不爱喝白开水、对原味辅食和奶提不起兴趣——这一点崔玉涛和 AAP/CDC 的看法完全一致，崔玉涛也明确说\"不建议给孩子喝菜水和果汁\"\"1岁内宝宝不可吃果汁\"，主张用果泥替代。\n\n【机构间的细微差别】\n- AAP（美国儿科学会）、CDC（美国疾控中心）、AAPD（美国儿科牙科学会）：最严格、最明确——1岁以内任何形式的果汁都不给，包括稀释果汁，唯一例外是有医生指征的便秘处理。\n- 中国卫健委、中国营养学会：方向一致（辅食不含果汁、托育机构\"避免提供果汁饮料\"、辅食保持原味），但用词比美国稍温和。\n- WHO（世界卫生组织 2023）：针对6-23月龄建议\"限制\"100%果汁、与含糖饮料同等对待，措辞用\"限制\"而非\"禁止\"，且未单独把12月龄以下加严。\n\n【关于\"稀释果汁/不得已\"的说明】\n任务里提到崔玉涛把\"稀释果汁涂奶嘴\"作为帮宝宝接受奶嘴的不得已办法。需要诚实告知：本次检索到的崔玉涛公开原文中，确实有\"可将乳汁或果汁涂于安抚奶嘴上\"诱导孩子接受奶嘴、戒除吃手的说法，但这是把果汁涂在奶嘴头上做过渡诱导，不是当饮料喂；原文里也没有出现\"稀释\"\"不常用\"\"适应即停\"等具体措辞，这些修饰未能在公开来源中核实到。即便如此，这也只是极特殊的过渡场景，和\"日常给宝宝喝果汁\"是两回事。\n\n【给家长的实操建议】\n1岁以内：用白开水（满6月龄添加辅食后可少量）+ 母乳/配方奶满足喝水需求；想吃水果就给果泥、果块（注意性状和窒息风险），不要榨成汁喝。", "key_sources": [{"name": "美国儿科学会(AAP)《婴幼儿、儿童及青少年果汁摄入》政策声明", "year": "2017", "url": "https://publications.aap.org/pediatrics/article/139/6/e20170967/38754/Fruit-Juice-in-Infants-Children-and-Adolescents"}, {"name": "AAP官方家长平台HealthyChildren.org：1岁以下儿童不喝果汁", "year": "2017", "url": "https://www.healthychildren.org/English/news/Pages/AAP-Recommends-No-Fruit-Juice-for-Children-Under-1-Year.aspx"}, {"name": "美国疾控中心(CDC)：应避免或限制的食物和饮品", "year": "现行", "url": "https://www.cdc.gov/infant-toddler-nutrition/foods-and-drinks/foods-and-drinks-to-avoid-or-limit.html"}, {"name": "美国儿科牙科学会(AAPD)婴幼儿及青少年膳食建议", "year": "现行", "url": "https://www.aapd.org/research/oral-health-policies--recommendations/dietary-recommendations-for-infants-children-and-adolescents/"}, {"name": "国家卫生健康委行业标准 WS/T 678-2020《婴幼儿辅食添加营养指南》", "year": "2020", "url": "https://www.nhc.gov.cn/fzs/c100048/202005/69a4ae35ff314ebbb34d281196a6dc87/files/1733125339160_47351.pdf"}, {"name": "国家卫健委/中国营养学会《婴幼儿喂养健康教育核心信息》", "year": "2020", "url": "https://www.chinanutri.cn/yyjkzxpt/yyjkkpzx/jwjwx/202008/t20200803_218122.html"}, {"name": "WHO 6-23月龄辅食喂养指南（建议5.4：限制100%果汁）", "year": "2023", "url": "https://www.ncbi.nlm.nih.gov/books/NBK596423/"}, {"name": "崔玉涛科普（不建议给孩子喝菜水和果汁、用果泥替代）", "year": "公开科普", "url": "https://k.sina.cn/article_5279436857_13aadd03902700hapc.html"}], "caveat": "适用条件：本结论针对健康、1岁以内的普通婴儿的日常喂养。例外情形（如医生明确诊断的便秘需用果汁辅助处理）应遵医嘱，不属于自行给果汁的范畴。各机构在措辞力度上略有差异（美国AAP/CDC/AAPD最严格用\"禁止\"，WHO和中国机构偏\"限制/不推荐\"），但方向一致：1岁内不把果汁当日常饮品。崔玉涛\"涂奶嘴诱导接受奶嘴\"是极特殊过渡场景而非喂饮，且原文未见\"稀释/适应即停\"等措辞，请勿据此扩大为日常喂果汁。宝宝若有特殊健康状况、早产、过敏史、便秘或喂养困难，请以你的主治儿科医生意见为准。"}}], "development": [{"id": "3-4月-development-001", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "development", "title": "3个月会做什么", "content": "3个月时，宝宝应该会俯卧抬头45°；很可能会把两只手握在一起、自发微笑。也许会竖抱时头部稳定、俯卧抬头90°、笑出声、抓住引逗他的玩具、追视到180°范围。这些是衡量发育进度的参考，每个宝宝快慢不同。", "source": [{"book": "崔", "loc": "印刷页205"}, {"book": "崔", "loc": "印刷页206"}], "divergence": false, "divergence_note": null, "tags": ["发育里程碑", "大运动", "精细运动"], "third_party": null}, {"id": "3-4月-development-002", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "从抬头到坐起", "content": "宝宝先学会俯卧抬头并坚持一会儿，再用手臂支撑弓背抬起胸部，增强上半身力量。等能抬起上半身后，家长可用手或枕头扶住腰背帮他练习坐，他会慢慢学会身体前倾、双臂支撑的“三足鼎立”。6到8个月前，在帮助下他能不用手撑坐一会儿。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "抬头", "坐"], "third_party": null}, {"id": "3-4月-development-003", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "development", "title": "宝宝还不会抬头怎么办", "content": "如果其他发育都正常，宝宝俯卧抬头不力，可能和看护方式有关，比如很少有机会练习俯卧、过度依赖摇椅或活动平台。在有人看护时多让宝宝练习趴卧抬头，运动发育才能按部就班进行。若一直缺乏俯卧机会、之后仍不会抬头，应尽早就医排查原因。", "source": [{"book": "崔", "loc": "印刷页207"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "抬头", "俯卧练习"], "third_party": null}, {"id": "3-4月-development-004", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "development", "title": "别让宝宝在腿上蹦跳", "content": "这个阶段宝宝骨骼钙化不完全、以软骨为主，肌肉力量薄弱，下肢还不足以支撑体重。长期端立站立可能让骨骼弯曲变形，甚至导致弓形腿。宝宝也还控制不好身体平衡，在大人腿上蹦跳时腿部和关节受力加大，更易扭伤，应避免这个动作。", "source": [{"book": "崔", "loc": "印刷页207"}, {"book": "崔", "loc": "印刷页208"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "站立", "安全"], "third_party": null}, {"id": "3-4月-development-005", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "手的精细动作进步", "content": "快4个月时，宝宝已能自如地把有趣的东西送进嘴里。接下来几个月，他会用拇指和其他手指拍、抓、扒，捡起很多东西。6到8个月前能学会把东西在两只手之间倒来倒去、翻来翻去。这时别在他身边放任何会让他窒息或受伤的东西。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["精细运动", "抓握", "安全"], "third_party": null}, {"id": "3-4月-development-006", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "颜色与追视能力", "content": "宝宝从出生就能看东西，但要过几个月视觉才发育成熟。现在他能分清红、蓝、黄等颜色，大多偏爱红色或蓝色。快4个月时视力范围扩大到几米以上，还学会用眼睛跟踪越来越快的动作，能轻松一直追着移动的物体看。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 视觉发育"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "颜色", "追视"], "third_party": null}, {"id": "3-4月-development-007", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "及时取下床铃", "content": "在婴儿床上方或弹跳椅前挂床铃，是刺激小婴儿视觉发育的好方法。但快5个月时宝宝很快会看腻，且这时他可能已能坐一会儿，会把悬挂物扯下来或缠住自己。所以一旦宝宝能撑起身体或坐直，就要尽快把悬挂物取下来。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 视觉发育"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "床铃", "安全"], "third_party": null}, {"id": "3-4月-development-008", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "牙牙学语怎么回应", "content": "快4个月时宝宝开始牙牙学语，会用到母语中的很多韵律和发音，音调时高时低，像在发表观点或提问。每天多和他讲话来鼓励他。当他发出某个音节，就重复给他听，再说些含这个音的简单词，比如他发出“ba”，你就教他“爸爸”“抱抱”。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "牙牙学语", "互动"], "third_party": null}, {"id": "3-4月-development-009", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "开始理解因果关系", "content": "4到5个月时，宝宝可能在偶然中明白因果关系：踢床板发现婴儿床晃动，敲东西发现会响。一旦懂得自己能引发这些有趣反应，他就会反复尝试。给他不易碎、轻、不太小的东西去“做实验”很重要，塑料勺、不会碎的杯子盖子都能带来乐趣。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知发育", "因果关系", "玩具"], "third_party": null}, {"id": "3-4月-development-010", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "陌生人焦虑是正常的", "content": "5到6个月的宝宝有时会因你离开房间或见到陌生人而哭，这是因为他对常照顾他的人产生了强烈依恋，能把你和别人区分开。到7到8个月时他可能明显拒绝靠太近的陌生人，这被称为“陌生人焦虑”，是发育正常的标志。可趁他爱社交时帮他熟悉今后的看护人。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄"}, {"book": "AAP", "loc": "第8章 4～7月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["情感社交", "陌生人焦虑", "依恋"], "third_party": null}, {"id": "3-4月-development-011", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "development", "title": "创造精细运动锻炼环境", "content": "帮宝宝锻炼精细运动，可从三方面着手：一是提供适合阶段的玩具，如拉铃，既易抓握又能同时锻炼视听；二是多让宝宝接触自然、触摸花草和书画，增加锻炼机会；三是别过多干涉，只要没有安全隐患就让他自己探索，并多用拍掌、微笑、语言给予鼓励。训练不能超出宝宝能力，家长只引导不强迫。", "source": [{"book": "崔", "loc": "印刷页214"}, {"book": "崔", "loc": "印刷页215"}], "divergence": false, "divergence_note": null, "tags": ["早教", "精细运动", "玩具"], "third_party": null}, {"id": "3-4月-development-012", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "development", "title": "怎样为宝宝选玩具", "content": "选玩具安全第一：大小适宜、不能有可吞咽或拆卸的零件，边角圆弧、表面光滑无尖锐突起，材质安全无毒易清洗；发声玩具声音不要过高以免伤听力，光线不刺眼以免伤视力。其次要选宝宝感兴趣的、且功能不超过其发育程度的玩具，购买时以孩子的兴趣为准，而非家长喜好。", "source": [{"book": "崔", "loc": "印刷页214"}, {"book": "崔", "loc": "印刷页215"}], "divergence": false, "divergence_note": null, "tags": ["早教", "玩具", "安全"], "third_party": null}, {"id": "3-4月-development-013", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "development", "title": "和宝宝一起读绘本", "content": "亲子绘本阅读从出生就可以开始。选绘本可遵循四原则：颜色鲜艳、图案简洁；这个月龄宝宝处于口腔期爱咬书，宜选硬板书或软布书；故事简单、内容易懂；增加互动性，如翻翻书、洞洞书、立体书、触感书、有声书。读时家长可模仿儿语用夸张的声音和表情，多重复强调内容。", "source": [{"book": "崔", "loc": "印刷页215"}, {"book": "崔", "loc": "印刷页216"}, {"book": "崔", "loc": "印刷页217"}], "divergence": false, "divergence_note": null, "tags": ["早教", "绘本", "亲子阅读"], "third_party": null}, {"id": "3-4月-development-014", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "development", "title": "绘本阅读怎么安排", "content": "为从小培养阅读兴趣，可每天安排2到3次阅读，每次3到5分钟，最好选宝宝吃饱、睡好、情绪好的时候，比如饭后、洗澡后、睡前。一旦宝宝表现出烦躁，家长要灵活调整时间，不要在宝宝正做别的事时强迫他读绘本。", "source": [{"book": "崔", "loc": "印刷页217"}], "divergence": false, "divergence_note": null, "tags": ["早教", "绘本", "作息"], "third_party": null}, {"id": "3-4月-development-015", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "development", "title": "宝宝多大可以坐起来", "content": "崔医生提醒，宝宝大约在20周、也就是5个月左右可以开始坐，正式坐起大约在5、6个月。扶坐时背部正确对齐很重要。如果到这个时间还不能独坐，可先让宝宝在有支撑的坐姿下练习，从靠垫或椅背开始，慢慢减少支撑，直到能独坐。", "source": [{"book": "崔", "loc": "印刷页216"}], "divergence": false, "divergence_note": null, "tags": ["发育里程碑", "坐", "早教"], "third_party": null}], "care": [{"id": "3-4月-care-001", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "建立固定又灵活的作息", "content": "快4个月大时，宝宝会形成较固定的进食、小睡、洗澡到夜间睡觉的生活规律，规律能增强宝宝的安全感，也方便家长安排时间。不过日程要保持灵活，遇到快速生长期吃奶变频、生病难入睡或临时出游等情况，打乱规律是正常的。对突发事件保持宽容，也能帮宝宝学习适应变化。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 第8章 4～7月龄"}], "divergence": false, "divergence_note": null, "tags": ["作息规律", "安全感", "灵活"], "third_party": null}, {"id": "3-4月-care-002", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "每天小睡几次怎么安排", "content": "这个阶段大多数宝宝每天仍需至少小睡2次，上午和中午各1次，有的宝宝下午会再睡一次。只要夜里能正常睡，小睡时一般让他想睡多久就睡多久。如果宝宝晚上不易入睡，就要在下午小睡时早些把他叫醒。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["小睡", "作息", "夜间睡眠"], "third_party": null}, {"id": "3-4月-care-003", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "固定的睡前程序帮入睡", "content": "这阶段宝宝更机敏好动，晚上常难平静，建立始终如一的睡前程序会帮助入睡。洗热水澡、轻摇、讲故事、吃奶等都能让宝宝放松、做好睡觉准备，关键是要在他过度疲劳之前就开始。久而久之宝宝会把这些活动和睡觉联系起来，放松舒适地入睡。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡前程序", "入睡", "放松"], "third_party": null}, {"id": "3-4月-care-004", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "学着自己入睡", "content": "在宝宝还没睡着时就把他放到婴儿床上，让他学着自己入睡：轻轻放下、轻声说晚安然后离开。如果哭闹，先看看他是否有麻烦，适当安慰后再离开房间，并随时间逐渐减少夜间关注。家长做法始终如一，大多数宝宝夜里会减少哭闹，最终学会自己入睡。所有安全睡眠规则仍然适用。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["自主入睡", "夜醒", "睡眠安全"], "third_party": null}, {"id": "3-4月-care-005", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "乳牙萌出前就要清洁口腔", "content": "两书都强调，乳牙萌出前家长就应给宝宝做口腔清洁。崔玉涛建议每次喂奶后用缠了纱布的手指轻擦宝宝口腔一圈，清理残留物，养成清洁习惯。AAP则提醒：发现长牙后改用柔软的婴儿专用牙刷加米粒大小的含氟牙膏刷牙。", "source": [{"book": "崔", "loc": "印刷页212"}, {"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["口腔清洁", "刷牙", "乳牙"], "third_party": null}, {"id": "3-4月-care-006", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "别含着奶睡觉防龋齿", "content": "两书都警告夜间含奶睡觉的风险。崔玉涛指出母乳本身的钙和蛋白质不会腐蚀牙齿，但奶粉中的乳糖、蛋白质在宝宝长牙后夜间含奶嘴睡觉时会被细菌作用产生腐蚀牙齿的物质，导致龋齿。AAP同样强调，不要让宝宝一边吮吸乳房或奶瓶一边入睡，无论白天小睡还是夜间，以免奶水留在牙齿上致龋。", "source": [{"book": "崔", "loc": "印刷页212"}, {"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["龋齿", "含奶睡觉", "夜奶"], "third_party": null}, {"id": "3-4月-care-007", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "长牙不适怎么缓解", "content": "这个时期宝宝开始长牙，通常先长两颗门牙，再长其余门牙、臼齿和尖牙；长牙时间和顺序因人而异，晚长不代表发育有问题。长牙可能带来流口水多、爱咬硬物、轻度烦躁哭闹和低热。可轻轻按摩牙床，或用结实橡胶磨牙胶（不要冷冻成很硬）。绝不要用出牙舒缓凝胶、顺势出牙药片或琥珀项链——它们或有毒、或可能致窒息。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["长牙", "磨牙胶", "用药禁忌"], "third_party": null}, {"id": "3-4月-care-008", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "第一次看牙医的时间", "content": "宝宝长出第一颗牙后的6个月内就应该去看牙医，但不应晚于12个月大的时候。可以找专门给儿童看诊的儿科牙医，也可以带宝宝去家庭牙医那里做常规口腔护理。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["看牙医", "口腔护理", "乳牙"], "third_party": null}, {"id": "3-4月-care-009", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "care", "title": "判断和纠正宝宝偏头", "content": "这阶段要重视宝宝偏头问题。判断时可拨开头发观察头部从上方、后方、侧面看是否左右对称、均匀，若不对称或拿不准，应带宝宝去医院确诊。3个月以内偏头不严重的，通常用体位疗法配合正型枕等纠正；如果超过6个月，或不满6个月但偏头特别严重，则需用专业定制的矫正头盔，矫正周期一般3～4个月、每天约戴23小时，定期清洗，不影响宝宝活动。", "source": [{"book": "崔", "loc": "印刷页211"}, {"book": "崔", "loc": "印刷页212"}], "divergence": false, "divergence_note": null, "tags": ["偏头", "头形", "矫正头盔"], "third_party": null}, {"id": "3-4月-care-010", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "care", "title": "和宝宝配合换纸尿裤", "content": "随着宝宝活动和互动能力增强，他不再愿意乖乖任家长摆弄换尿裤，家长要调整策略。一是准备齐全，把纸尿裤、屁屁霜、湿巾等所需物品全部提前备在手边，不要中途去找东西，以免把宝宝单独留在尿布台有坠落风险。二是边互动边换，用玩具或游戏转移注意力，快而不乱地完成。三是把换尿裤变成与宝宝交流游戏的互动体验。", "source": [{"book": "崔", "loc": "印刷页213"}], "divergence": false, "divergence_note": null, "tags": ["换纸尿裤", "互动", "安全"], "third_party": null}, {"id": "3-4月-care-011", "age_stage": "3-4月", "applies_to": ["3-4月"], "applies_label": null, "board": "care", "title": "妈妈上班前帮宝宝过渡", "content": "妈妈返岗对宝宝是一次较长时间的分离，应提前从两方面准备。第一，提前为宝宝选定固定的接替看护人，让其提前介入、熟悉宝宝的生活，避免频繁更换看护人和环境，以利宝宝建立规律生活、对他人产生信任。第二，化解分离焦虑，可在产假结束前一个月通过躲猫猫等游戏，有目的地让宝宝逐步适应家庭成员的短暂离开，明白妈妈离开后还会回来。", "source": [{"book": "崔", "loc": "印刷页213"}, {"book": "崔", "loc": "印刷页214"}], "divergence": false, "divergence_note": null, "tags": ["返岗", "看护人", "分离焦虑"], "third_party": null}], "health": [{"id": "3-4月-health-001", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "睡觉仍守安全睡眠规则", "content": "这个阶段所有安全睡眠规则依然适用，但宝宝现在可能会自己从俯卧翻成仰卧。建议在宝宝还没睡着时把他放到婴儿床上，让他学着自己入睡，轻轻放下、轻声道晚安后离开。如果哭闹，先察看是否有麻烦，适当安慰后再离开房间。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠安全", "自主入睡"], "third_party": null}, {"id": "3-4月-health-002", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "长牙不适与口腔清洁", "content": "婴儿开始长牙，可能过度流口水、爱啃硬物，伴轻度烦躁、哭闹和低热（直肠温度不超过38.3℃）。可用手指轻揉牙床或给结实橡胶磨牙胶缓解。发现长牙后用婴儿专用软牙刷加米粒大小含氟牙膏刷牙，别让宝宝含着乳房或奶瓶入睡以防龋齿。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["长牙", "口腔护理", "龋齿"], "third_party": null}, {"id": "3-4月-health-003", "age_stage": "3-4月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "出牙缓解产品要避坑", "content": "绝对不要用出牙舒缓凝胶麻痹牙床，极少数情况下它会损害婴儿血细胞携氧能力；顺势出牙药片也可能含毒素，有害无益；琥珀出牙项链既不止痛，还造成过窒息和勒住的事故，千万别在宝宝脖子上挂任何东西。冷冻过的磨牙胶会变硬，可能伤到宝宝。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["长牙", "用品安全", "就医信号"], "third_party": null}, {"
