["9-10月"], "applies_label": null, "board": "development", "title": "9个月里程碑清单", "content": "9个月时宝宝通常会扶着东西站立、把物品在两手间倒换、见到陌生人有不同反应。很可能会发出dada/mama的音(无所指)、用拇指和其他手指抓物、玩躲猫猫。有的还能自己坐下、拉物站起、用拇指食指捡东西、扶着家具走。", "source": [{"book": "崔", "loc": "印刷页285"}, {"book": "崔", "loc": "印刷页286"}], "divergence": false, "divergence_note": null, "tags": ["里程碑", "9个月", "大运动"], "third_party": null}, {"id": "9-10月-development-002", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "扶站与扶走", "content": "宝宝能扶站说明腿部力量渐能支撑体重,家长应鼓励并给机会,让他扶结实的桌、床、椅练习,周围别堆易翻倒的家具。崔玉涛提醒千万不要用力把宝宝拉起,以免肌肉骨骼损伤;有些宝宝11个月才能扶站,落后不必焦虑。站稳后他会扶着家具巡回走,要确保家具无尖角且够重或固定。", "source": [{"book": "崔", "loc": "印刷页286"}, {"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "扶站", "扶走"], "third_party": null}, {"id": "9-10月-development-003", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "爬行能力的发展", "content": "宝宝一般在7～10个月学会爬,最初可能只是手膝撑地前后摆动甚至后退,练习后才会向前。少数宝宝不会爬,改用屁股蹭或肚皮挪,只要能协调身体两侧、同时用手脚就无须担心。可在他差点够到处放有趣物品来鼓励练习。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "爬行"], "third_party": null}, {"id": "9-10月-development-004", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "不建议用学步车", "content": "学步车并不能帮宝宝学走路,反而会打消他走路的积极性,还有翻倒、摔下楼梯等安全隐患,美国儿科学会强烈建议不要使用。更好的选择是没有轮子的固定弹跳椅或游戏架,或有把手、有重量不会翻倒的结实小推车。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "学步车", "安全"], "third_party": null}, {"id": "9-10月-development-005", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "手部精细动作", "content": "宝宝会用拇指和食指(或拇指中指)准确捏起小东西,并用身边的小物练习捏的动作。学会张手后会兴致勃勃地扔东西,可把兴趣引到柔软的球上。他爱研究有轮子、把手、合页等活动部件的玩具,临近本阶段尾声甚至能把积木摞成塔。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 手部发育"}], "divergence": false, "divergence_note": null, "tags": ["精细动作", "捏取", "积木"], "third_party": null}, {"id": "9-10月-development-006", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "语言发育与多和宝宝说话", "content": "宝宝开始用手指、爬向目标或手势表达需求,咿呀声被ba、da、ma等清晰音节取代,会吐出ma ma、ba ba。他理解的比你想的多,要尽量多和他说话、描述正在做的事,说法保持一致。每天读色彩鲜艳的纸板书、指物说名,并关掉电视,因为电视会阻碍语言发育。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "亲子互动", "读书"], "third_party": null}, {"id": "9-10月-development-007", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "认知发育与物体恒存", "content": "宝宝注意力很短,在一个玩具上顶多2～3分钟,他最爱木勺、容器等家常用品。他靠摔、滚、扔来研究物体的形状、质地、大小。8个月起逐渐建立物体恒存概念,到快10个月会肯定看不见的玩具仍在并继续找,玩躲猫猫能帮他理解这一点。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知发育", "物体恒存", "躲猫猫"], "third_party": null}, {"id": "9-10月-development-008", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "促进大脑发育的日常", "content": "宝宝早期的环境与经历对大脑发育至关重要。每天多和他讲话、鼓励他说出学到的词,就能刺激智力;提供安全的探索环境和简单玩具,每天陪他玩游戏、唱歌、读书,能促进记忆力发展,并为今后几年的大脑发育打基础。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 大脑发育"}], "divergence": false, "divergence_note": null, "tags": ["大脑发育", "早教", "亲子互动"], "third_party": null}, {"id": "9-10月-development-009", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "陌生人焦虑与分离焦虑", "content": "这阶段宝宝出现陌生人焦虑、对陌生人甚至熟悉的亲戚保姆紧张躲避,同时变得更黏你,这是分离焦虑,也是亲子关系健康的证明,不是被宠坏。分离焦虑通常在10～18个月达到顶峰,18～24个月渐消。离开时尽量淡化气氛、迅速告别,并在家做短时分离练习帮他适应。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["情感发育", "分离焦虑", "陌生人焦虑"], "third_party": null}, {"id": "9-10月-development-010", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "自我意识与镜子游戏", "content": "自我意识成熟最明显的标志是宝宝照镜子的方式变了:他开始明白镜中影像是自己,会摸自己的鼻子或扯头发。可一起照镜子、互摸身体部位并说出名称来增强他的自我意识。他也可能开始害怕黑暗、雷声、吸尘器等,要尽量消除来源并平静地陪在他身边。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["自我意识", "镜子游戏", "新恐惧"], "third_party": null}, {"id": "9-10月-development-011", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "在安全的家中鼓励探索", "content": "通过探索获得的成就感会增强宝宝的自我认同。崔玉涛建议给宝宝划出一两个可探索的区域,克服必须时刻整洁的执念、每天整理一次即可,并和他一起收拾玩具建立整洁概念,不要总把不行挂嘴边。两书都强调先把家布置安全,在鼓励探索和环境整洁之间找到平衡。", "source": [{"book": "崔", "loc": "印刷页295"}, {"book": "崔", "loc": "印刷页296"}, {"book": "AAP", "loc": "第9章 8～12月龄"}], "divergence": false, "divergence_note": null, "tags": ["早教", "探索", "环境安全"], "third_party": null}, {"id": "9-10月-development-012", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "development", "title": "帮宝宝学会认识危险", "content": "宝宝的好奇心会驱使他不断探向危险,家长既要做好防护,也要逐渐帮他建立安全意识。告诉他剪刀菜刀等锋利物品不是玩具、只有大人能用;让他感知热水壶、热饮的温度建立烫的概念;藏好电线插座、远离风扇空调、把清洁剂药品放到够不到处。", "source": [{"book": "崔", "loc": "印刷页296"}, {"book": "崔", "loc": "印刷页297"}], "divergence": false, "divergence_note": null, "tags": ["早教", "安全意识", "危险"], "third_party": null}, {"id": "9-10月-development-013", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "development", "title": "重视宝宝自尊心的建立", "content": "从婴儿期起宝宝就有自尊心意识。建立自尊要多做亲子互动、让他感到自己被重视,有进步时及时鼓励,让他获得被认可的感觉。要避免:在外人面前批评宝宝、对他做的事用否定式表述、在他专注做事时从旁打断,以免削减他的乐趣、产生挫败感。", "source": [{"book": "崔", "loc": "印刷页297"}, {"book": "崔", "loc": "印刷页298"}], "divergence": false, "divergence_note": null, "tags": ["早教", "自尊心", "情感发育"], "third_party": null}], "care": [{"id": "9-10月-care-001", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "分离焦虑期睡眠会反复", "content": "8个月时宝宝白天仍可能小睡两次，晚上睡10～12小时，不用半夜喝奶。但接下来分离焦虑变强，宝宝可能抗拒上床，半夜醒来找你的次数也增多，这是这一阶段正常的反复。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "分离焦虑", "夜醒"], "third_party": null}, {"id": "9-10月-care-002", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "帮宝宝入睡的小方法", "content": "困难时期可多管齐下找到适合的助眠方式：有的宝宝在房门开着、能听到妈妈声音时更易入睡，有的靠吮手指或被轻轻摇动。播放白噪声尤其有效，但音量要调小，以免伤害宝宝敏感的听觉。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "入睡", "白噪声"], "third_party": null}, {"id": "9-10月-care-003", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜里醒来这样安抚", "content": "宝宝深夜叫你时，只需确认他安好、告诉他你就在附近，但不要开灯、哄抱或喂奶，更不要抱到大床上——这只会让处于分离焦虑的宝宝更不愿回自己的床。可以给点水。坚持每天用相同方式哄睡，他最终会习惯。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["夜醒", "安抚", "睡眠习惯"], "third_party": null}, {"id": "9-10月-care-004", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜里查看先排查是否生病", "content": "察看宝宝时要确认他舒适且没生病，中耳炎、哮吼等可能在夜间突然发作。确定无碍后检查尿布，脏了就在微弱灯光下迅速换好，以仰卧姿势放回婴儿床，说几句安慰的话再离开。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["夜醒", "生病排查", "换尿布"], "third_party": null}, {"id": "9-10月-care-005", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "长牙后开始刷牙", "content": "这一阶段宝宝至少长了1～2颗牙，没长牙也不用担心，12个月还没长牙都属正常。一旦长牙，就用软毛牙刷蘸一粒大米大小的含氟牙膏给他刷牙，每天一次、牙齿前后都刷到，最好安排在睡前。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "牙齿护理", "含氟牙膏"], "third_party": null}, {"id": "9-10月-care-006", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "睡前刷牙后只喝水", "content": "刷牙最好在晚上睡前，因为刷完牙后除了水，就不该再吃喝任何东西，睡前吃含糖食物会让护牙努力白费。如果宝宝拒绝刷牙，可让他仰躺在另一个人腿上，用做游戏的方式轻轻刷每颗牙。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "睡前", "护牙"], "third_party": null}, {"id": "9-10月-care-007", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "安排第一次看牙医", "content": "宝宝第一次看牙医应在长出第一颗牙后的6个月内，但不晚于1岁，以先到的时间为准。牙医可能给牙齿涂氟保护漆。儿科医生在健康检查时也会查牙、涂氟，但这不算作牙医门诊。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["牙医", "口腔检查", "涂氟"], "third_party": null}, {"id": "9-10月-care-008", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "别让奶瓶变成安抚物", "content": "千万不要让宝宝含着奶瓶入睡：喝奶过程中睡着，奶会浸泡刚长出的乳牙造成奶瓶龋齿，躺着喝睡着还可能引发中耳炎。也只允许宝宝坐着或被抱着时用奶瓶，别让它成为玩耍时的安抚物。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶", "奶瓶龋齿", "睡前喂奶"], "third_party": null}, {"id": "9-10月-care-009", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "care", "title": "撞头摇头多是自我安抚", "content": "这个月龄宝宝突然撞头、摇头一般都正常，可能因节奏感增强，也可能是出牙不适或睡前借此安抚自己帮助入睡。家长不必焦虑，多数宝宝3岁左右会自然放弃，重点是做好安全防护。", "source": [{"book": "崔", "loc": "印刷页288"}], "divergence": false, "divergence_note": null, "tags": ["撞头摇头", "自我安抚", "入睡"], "third_party": null}, {"id": "9-10月-care-010", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "care", "title": "撞头时给床围软护垫", "content": "对宝宝撞头摇头不必太担心，家长的重点是保护安全。比如在婴儿床周围包上柔软的护围，避免宝宝用力过大撞伤头部。若撞头伴随发育迟缓等异常，应带宝宝就医检查。", "source": [{"book": "崔", "loc": "印刷页288"}], "divergence": false, "divergence_note": null, "tags": ["撞头", "安全防护", "婴儿床"], "third_party": null}, {"id": "9-10月-care-011", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "care", "title": "频繁眨眼大多是正常发育", "content": "宝宝频繁眨眼常见原因有：对世界好奇、被睁眼闭眼的明暗变化吸引，待熟悉后会消失；眼部疾病；睫毛等异物进眼；以及受惊吓等心理因素。若眨眼伴随分泌物异常增多等其他症状，应带孩子进一步就医。", "source": [{"book": "崔", "loc": "印刷页289"}, {"book": "崔", "loc": "印刷页290"}], "divergence": false, "divergence_note": null, "tags": ["频繁眨眼", "日常观察", "就医信号"], "third_party": null}, {"id": "9-10月-care-012", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "care", "title": "宝宝多久洗一次头", "content": "洗头不必每天做，除非天气潮热、出汗多或头发出油，一般每隔2～3天洗一次即可。洗头水流要温柔不宜过急；选用合适的洗头帽，很多宝宝抗拒洗头是因为冲水时感到紧张不安。", "source": [{"book": "崔", "loc": "印刷页291"}], "divergence": false, "divergence_note": null, "tags": ["洗头", "头发护理", "日常护理"], "third_party": null}, {"id": "9-10月-care-013", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "care", "title": "给宝宝梳头的小技巧", "content": "给宝宝梳头要让他少抗拒、更配合：选用梳齿疏密适当的梳子，不要用太密的；梳理时不要猛烈扯头皮头发。宝宝头发不如想象中茂盛，注意不要乱拉太紧以免拉伤头皮，可结合玩具增加趣味。", "source": [{"book": "崔", "loc": "印刷页291"}], "divergence": false, "divergence_note": null, "tags": ["梳头", "头发护理", "日常护理"], "third_party": null}, {"id": "9-10月-care-014", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "care", "title": "学步鞋怎么选", "content": "为学步宝宝选鞋可参考：鞋形符合脚型、鞋头够宽敞；材质柔软、透气、轻便，太硬伤脚、不透气易出汗；鞋底防滑性要好，以免学步初期动作不协调摔倒；尺码适宜，确保穿上走路不会勉强踮脚。", "source": [{"book": "崔", "loc": "印刷页293"}, {"book": "崔", "loc": "印刷页294"}], "divergence": false, "divergence_note": null, "tags": ["学步鞋", "选鞋", "日常护理"], "third_party": null}, {"id": "9-10月-care-015", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "care", "title": "鞋子要勤更换", "content": "宝宝脚和足弓生长变化快，要定期换鞋，别让宝宝穿太小的鞋。生长高峰期6～8周就需换一个号码，通常每3～4个月换一双。不建议买大码鞋图省事，也不建议穿哥哥姐姐磨损过的旧鞋。", "source": [{"book": "崔", "loc": "印刷页294"}, {"book": "崔", "loc": "印刷页295"}], "divergence": false, "divergence_note": null, "tags": ["换鞋", "脚部护理", "日常护理"], "third_party": null}], "health": [{"id": "9-10月-health-001", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "扁平足是正常现象", "content": "这个阶段宝宝看起来像扁平足，是因为足弓被厚厚的脂肪垫掩盖了，属正常现象。AAP 指出 2～3 年内脂肪消失足弓就会显现；崔玉涛补充扁平足一般无需特殊治疗和训练，若伴有脚疼、腿疼、走路异常才需及时就诊。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 外观和生长情况"}, {"book": "崔", "loc": "印刷页287"}], "divergence": false, "divergence_note": null, "tags": ["扁平足", "足弓", "生长发育"], "third_party": null}, {"id": "9-10月-health-002", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "宝宝脚和站姿看着怪", "content": "宝宝仰躺时脚趾朝内呈内八字，通常快 24 个月时消失；刚学站会腆肚翘臀、后背前倾，刚走路时脚尖向外偏，都因髋关节韧带松，到 12～18 个月韧带收紧后脚才会朝前。这些都属正常，不必担心。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 外观和生长情况"}], "divergence": false, "divergence_note": null, "tags": ["内八字", "站姿", "生长发育"], "third_party": null}, {"id": "9-10月-health-003", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "health", "title": "练扶站别用力拉拽", "content": "宝宝能扶物站立时可鼓励并辅助，但千万不要用力把他拉起来，以免造成肌肉或骨骼损伤；练习处要清开周围带尖角的椅子等物，做好防磕碰保护。若宝宝站时总习惯踮脚着地，过早练站可能不利于发育，可让他多趴、多爬。", "source": [{"book": "崔", "loc": "印刷页286"}], "divergence": false, "divergence_note": null, "tags": ["扶站", "大运动", "安全"], "third_party": null}, {"id": "9-10月-health-004", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "health", "title": "怪异小动作多属正常", "content": "这个月龄宝宝突然出现撞头、摇头、拉头发、用力磨牙、频繁眨眼等怪动作，一般都是正常的，多与节奏感增强、出牙不适或自我安抚有关，大多数会在 3 岁左右自行消失。家长重点是做好安全防护，如在婴儿床周围加柔软护垫，避免撞伤。", "source": [{"book": "崔", "loc": "印刷页288"}], "divergence": false, "divergence_note": null, "tags": ["撞头", "磨牙", "行为"], "third_party": null}, {"id": "9-10月-health-005", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "health", "title": "频繁眨眼何时就医", "content": "宝宝频繁眨眼多是探索世界的正常表现，会逐渐消失。但若眨眼同时伴随分泌物异常增多等眼部症状，应带孩子就医查因；如眼内进了睫毛等异物，可在闭眼时用棉签轻轻取出。若伴随注意力总无法集中等多动表现，也应及时就医请医生判断。", "source": [{"book": "崔", "loc": "印刷页290"}], "divergence": false, "divergence_note": null, "tags": ["眨眼", "眼睛", "就医信号"], "third_party": null}, {"id": "9-10月-health-006", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "手指食物防呛噎", "content": "给宝宝手指食物要时刻看着，防止呛噎。AAP 提醒由于宝宝可能不嚼就吞，绝不能给整颗葡萄、整颗坚果、大块生蔬菜、爆米花、硬糖等，火腿肠、奶酪、肉块要切小块；崔玉涛同样提醒别给黄豆、整颗葡萄等又轻又圆的食材，宝宝夹不住、易误吸。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}, {"book": "崔", "loc": "印刷页291"}], "divergence": false, "divergence_note": null, "tags": ["呛噎", "手指食物", "喂养安全"], "third_party": null}, {"id": "9-10月-health-007", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "刷牙与第一次看牙医", "content": "宝宝一旦长牙，就要用软毛牙刷加一粒大米大小的含氟牙膏每天刷一次，最好睡前刷，刷后除水外不再吃喝。12 个月还没长牙也正常。第一次看牙医应在长出第一颗牙后的 6 个月内、不晚于 1 岁，牙医可能会涂氟保护漆。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "牙齿", "牙医"], "third_party": null}, {"id": "9-10月-health-008", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "奶瓶喂奶睡着的风险", "content": "不要让宝宝含着奶瓶喝奶睡着：奶液浸泡刚长出的乳牙会造成奶瓶龋齿（儿童早期龋齿），躺着喝奶睡着还可能引发中耳炎。只让宝宝坐着或被抱着用奶瓶喝东西，别让奶瓶变成玩耍时的安抚物。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶龋齿", "中耳炎", "喂养"], "third_party": null}, {"id": "9-10月-health-009", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "不要用学步车", "content": "学步车并不能帮宝宝学走路，反而会打消走路积极性，且存在很大安全隐患：碰到玩具或地毯易翻倒、容易摔下楼梯或冲进危险区域。美国儿科学会强烈建议不要使用，固定不动的弹跳椅或游戏架是更好的选择。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步车", "安全", "大运动"], "third_party": null}, {"id": "9-10月-health-010", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "怎样为宝宝选学步鞋", "content": "宝宝外出走路需要包头、柔软、防滑、有生长空间的鞋（运动鞋即可），崔玉涛补充鞋头要宽敞、鞋底弯折点在前 1/3 处、脚跟与鞋之间能插入家长一根手指为合适，脚长快需每 3～4 个月或生长高峰期 6～8 周换一双。两书都强调：发育正常的孩子不需要特殊鞋垫、高鞋背、加固鞋跟或足弓支撑设计。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}, {"book": "崔", "loc": "印刷页293"}], "divergence": false, "divergence_note": null, "tags": ["学步鞋", "选鞋", "足部"], "third_party": null}, {"id": "9-10月-health-011", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防烧伤烫伤", "content": "AAP 提醒：抱着宝宝时不要喝热饮、在炉边做饭；盛热液体或食物的容器别放桌沿、台面边缘或茶几上；别让宝宝在热炉灶、加热器旁爬来爬去。崔玉涛建议主动教宝宝认识危险，让他感知热茶杯外壁的温度，建立\"烫！\"的概念，知道这些东西不能随便摸。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防烧伤和烫伤"}, {"book": "崔", "loc": "印刷页297"}], "divergence": false, "divergence_note": null, "tags": ["烫伤", "烧伤", "安全"], "third_party": null}, {"id": "9-10月-health-012", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防摔落与楼梯防护", "content": "在楼梯顶端和底部都装儿童防护门，锁上没有防护的房间；不要让宝宝爬成年人坐的椅子（爬时易翻倒磕伤头、腿、手臂）。换尿布别再用尿布更换台，改在地板或不易摔落的大床上，且任何时候都不让宝宝独处。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防摔落"}], "divergence": false, "divergence_note": null, "tags": ["防摔落", "楼梯门", "安全"], "third_party": null}, {"id": "9-10月-health-013", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防溺水", "content": "不要把宝宝单独留在浴室或任何有水的地方，包括水桶、戏水池、游泳池、水槽和马桶；用完水立即清空容器。家中有游泳池要用至少 1.2 米高的栅栏把泳池四周围住，与房子完全隔开。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防溺水"}], "divergence": false, "divergence_note": null, "tags": ["防溺水", "安全"], "third_party": null}, {"id": "9-10月-health-014", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "汽车安全座椅要点", "content": "2 岁前甚至 2 岁后只要座椅尺寸合适，都应坐后向式汽车安全座椅。开车前把宝宝放进质量合格、安装正确的座椅并系好安全带；所有会载宝宝的车（含看护者、祖父母的车）都要正确安装。离车时哪怕一小会儿也绝不把宝宝单独留在车里。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 汽车安全座椅"}], "divergence": false, "divergence_note": null, "tags": ["汽车安全座椅", "出行安全"], "third_party": null}, {"id": "9-10月-health-015", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "health", "title": "教宝宝认识危险物品", "content": "随着探索欲增强，宝宝会主动接近甚至制造危险，家长要做好防护并逐渐帮他建立安全意识：剪刀、菜刀、指甲刀等锋利物品要告知不是玩具；藏好电线、给插座装安全堵；清洁剂、药品等放到宝宝够不到的地方。", "source": [{"book": "崔", "loc": "印刷页296"}], "divergence": false, "divergence_note": null, "tags": ["安全意识", "危险物品", "防护"], "third_party": null}, {"id": "9-10月-health-016", "age_stage": "9-10月", "applies_to": ["9-10月"], "applies_label": null, "board": "health", "title": "屏气发作怎么办", "content": "宝宝哭闹时可能屏气，出现暂时性哭声中止，严重时甚至全身抽搐、短暂失去知觉，多与生气、身体不适或强烈情绪有关，常在 1 岁左右出现、2～3 岁达高峰、4 岁后通常消失。家长应保持平和回应、不过度紧张。若屏气表现严重或反复，应及时带宝宝就医检查。", "source": [{"book": "崔", "loc": "印刷页295"}], "divergence": false, "divergence_note": null, "tags": ["屏气", "就医信号", "情绪"], "third_party": null}, {"id": "9-10月-health-017", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "8～12 月龄疫苗安排", "content": "第三针乙肝疫苗在 6～8 个月接种；第一针甲肝疫苗在 1 岁时或 1 岁后；第四针肺炎球菌疫苗在 12～18 个月接种；第一针麻腮风三联（MMR）和第一针水痘疫苗在 12～15 个月接种，二者可合并为四痘混合疫苗（发热风险略高但同样安全有效）。具体以当地接种程序为准。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "MMR", "肺炎球菌"], "third_party": null}]}, "10-11月": {"feeding": [{"id": "10-11月-feeding-001", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "每日热量与奶量", "content": "这一阶段宝宝每天约需750～900千卡热量，其中400～500千卡来自母乳或配方奶，每天约喝720毫升奶。母乳和配方奶本身含有维生素、矿物质等促进大脑发育的物质。如果宝宝胃口比以前小，不用担心，因为生长速度放缓，喝奶之外还有许多新鲜事物吸引他。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["热量", "奶量", "母乳配方奶"], "third_party": null}, {"id": "10-11月-feeding-002", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "过渡到粗糙食物", "content": "宝宝大约8个月时，可以开始吃比糊状稍粗糙、需要更多咀嚼的食物。可以添加酸奶、燕麦，或捣碎的香蕉、土豆，甚至浓点的汤或煮烂的蔬菜块来扩展食谱。鸡蛋、白软干酪、希腊酸奶和牛油果都是蛋白质的优质来源。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["辅食质地", "咀嚼", "蛋白质"], "third_party": null}, {"id": "10-11月-feeding-003", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "练习自己用勺子", "content": "随着手部能力提高，可以在用餐时给宝宝一把勺子让他摆弄，等他会拿了再让他试着自己吃。刚开始很多食物会掉到地上而非嘴里，可在餐椅下垫塑料布方便收拾。一定要有耐心，不要把勺子从宝宝手里夺走，他需要不断练习和你的鼓励。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["自主进食", "勺子", "手部发育"], "third_party": null}, {"id": "10-11月-feeding-004", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "适合手抓的食物", "content": "宝宝可以用手抓着吃的食物包括蒸熟的蔬菜块、香蕉等水果、煮熟的面条、小片全麦面包、鸡肉块、炒鸡蛋、全谷物米粉等。不妨提供不同味道、形状、颜色和质地的食物，但宝宝吃的时候要时刻看着他，防止呼吸道被食物阻塞。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["手抓食物", "进餐", "看护"], "third_party": null}, {"id": "10-11月-feeding-005", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "防噎：避免这些食物", "content": "宝宝可能不咀嚼就把食物吞下，所以千万不要给他大勺花生酱、大块生蔬菜、整颗坚果、整颗葡萄、爆米花、未煮熟的豌豆和西芹块、口香糖、硬糖等坚硬或圆形食物。火腿肠、奶酪、肉块也可能噎住宝宝，一定要切成小块，并在他吃东西时全程看护。建议全家人都参加基本急救培训。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["防噎", "食物安全", "急救"], "third_party": null}, {"id": "10-11月-feeding-006", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "学用杯子喝水", "content": "6个月之后就可以让宝宝使用带吸管的吸管杯或鸭嘴杯，这两种杯子能尽量少地往外溢水。开始时杯里装少量水，每天只在某一餐使用，并示范如何把杯子放到嘴边倾斜喝水。即使宝宝连续几周把杯子当玩具，也不要沮丧，大多数宝宝都会这样。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["杯子", "吸管杯", "断奶准备"], "third_party": null}, {"id": "10-11月-feeding-007", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "用杯子逐步替代奶瓶", "content": "用杯子喝水可以提高手嘴协调能力、提前为断奶做准备。完全学会用杯子大约需要6个月。可以先在中午用水杯喂奶代替母乳或奶瓶，适应后再改早上，晚间睡前喂奶最后改变。要记住美国儿科学会的建议：1岁之前母乳是宝宝营养的最佳来源。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["杯子", "断奶", "母乳"], "third_party": null}, {"id": "10-11月-feeding-008", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "别让奶瓶变成安抚物", "content": "千万不要让宝宝含着装奶的奶瓶入睡，奶会浸没刚长出的乳牙造成奶瓶龋齿，躺着喝奶睡着还可能引发中耳炎。也不要让宝宝边玩边拿着奶瓶喝，只允许坐着或被抱着时用奶瓶，其他时候用杯子，以免奶瓶变成安抚物。一旦做出决定就要坚持原则。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶", "奶瓶龋齿", "安抚物"], "third_party": null}, {"id": "10-11月-feeding-009", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "feeding", "title": "用食物应对缺铁性贫血", "content": "贫血是婴幼儿期常见的临床表现，其中以缺铁性贫血最常见。铁是合成血红蛋白的重要元素，体内铁减少时血红蛋白随之减少，就会出现缺铁性贫血。缺铁性贫血表现为脸色苍白发黄、口腔和眼睑黏膜变白、食欲不振、精神差、注意力下降等，要按时带宝宝就医诊断、及时干预。", "source": [{"book": "崔", "loc": "印刷页302"}, {"book": "崔", "loc": "印刷页303"}], "divergence": false, "divergence_note": null, "tags": ["缺铁性贫血", "血红蛋白", "就医"], "third_party": null}, {"id": "10-11月-feeding-010", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "feeding", "title": "补铁的三类食物", "content": "人体不能自己产生铁，只能从外界补充。补铁可以靠含铁的婴儿米粉，在辅食初期辅食量少、难以大量摄入补铁食物时通过含铁米粉补充；绿叶菜是很好的补铁食物，但不要过量，最好先在开水中稍稍焯一下；红肉如猪肉、牛羊肉含铁量很高且可直接吸收。日常饮食中含铁米粉、绿叶菜、红肉等都要每天适当摄入以保证营养均衡。", "source": [{"book": "崔", "loc": "印刷页303"}, {"book": "崔", "loc": "印刷页304"}], "divergence": false, "divergence_note": null, "tags": ["补铁", "含铁米粉", "红肉绿叶菜"], "third_party": null}, {"id": "10-11月-feeding-011", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "feeding", "title": "纠正边玩边吃的坏习惯", "content": "许多家庭让宝宝一边玩一边吃，进食没有规律、进食时间过长，容易养成不良进食习惯，影响营养摄入。不管是追着喂的策略还是边玩边喂的模式，对宝宝形成良好进食习惯都很不利。家长应根据宝宝情况调整，帮他养成良好的进食习惯。", "source": [{"book": "崔", "loc": "印刷页304"}], "divergence": false, "divergence_note": null, "tags": ["进食习惯", "边玩边吃", "规律"], "third_party": null}, {"id": "10-11月-feeding-012", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "feeding", "title": "崔医生提醒：少给肉松和猪肉零食", "content": "很多家长觉得肉松和猪肉零食方便又美味，但崔医生提醒，这类加工食品并不适合作为宝宝的主要食量来源，有的宝宝吃起来也比较抵触。总之这类食品不要给太多，更好的选择是给宝宝吃新鲜的小片肉类。", "source": [{"book": "崔", "loc": "印刷页304"}], "divergence": false, "divergence_note": null, "tags": ["肉松", "加工食品", "崔医生提醒"], "third_party": null}], "development": [{"id": "10-11月-development-001", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "宝宝10个月会做什么", "content": "10个月时宝宝应该会发出dada、mama的音但无所指，能用拇指和其他手指一起抓东西，会玩躲猫猫游戏。这些是这个月龄的基础能力，可作为对照参考。", "source": [{"book": "崔", "loc": "印刷页299"}], "divergence": false, "divergence_note": null, "tags": ["里程碑", "10个月"], "third_party": null}, {"id": "10-11月-development-002", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "10个月很可能会的事", "content": "10个月时宝宝很可能会自己坐下、拉着物体站起来、嗯嗯咿咿学说话、用积木等物品对敲，还会玩拍手游戏或跟人挥手再见。每个宝宝节奏不同，达不到不必焦虑。", "source": [{"book": "崔", "loc": "印刷页300"}], "divergence": false, "divergence_note": null, "tags": ["里程碑", "大动作", "10个月"], "third_party": null}, {"id": "10-11月-development-003", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "10个月也许会与甚至会的事", "content": "10个月时宝宝也许会扶着家具走、用拇指和食指夹东西；甚至会独自站立一瞬间、有所指向地发出dada、mama的音、尝试用杯子喝水，并以声音或身体动作传递需求。这些是进阶能力，出现得早晚都正常。", "source": [{"book": "崔", "loc": "印刷页300"}], "divergence": false, "divergence_note": null, "tags": ["里程碑", "精细动作", "10个月"], "third_party": null}, {"id": "10-11月-development-004", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "宝宝为什么还不会站立", "content": "学站速度受体重、身体协调性、练习机会等因素影响，不合脚的鞋袜也可能影响站立。家长可把玩具放在站起来才够得到的地方鼓励他，并在宝宝精神好时练习，疲惫时及时停止。通常11个月前会站立，之后仍不会要带去就医排查发育迟缓。", "source": [{"book": "崔", "loc": "印刷页301"}], "divergence": false, "divergence_note": null, "tags": ["大动作", "站立", "就医提示"], "third_party": null}, {"id": "10-11月-development-005", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "会坐与会爬的发育", "content": "8个月大时宝宝坐着应已不需支撑，偶尔歪倒也能用手臂撑住，并会探身去够东西。爬行通常在7～10个月掌握，最初可能只是手膝撑地前后摆动甚至倒退，练习后才会向前爬。如果快9个月还无法自己坐起，要联系儿科医生。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大动作", "爬行", "就医提示"], "third_party": null}, {"id": "10-11月-development-006", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "从扶站到迈出第一步", "content": "宝宝会抓住一切机会让自己站起来，刚开始可能不知道怎么坐下，可示范屈膝慢慢下降。站稳后会扶着家具巡回走，再到偶尔放手、走出几步。很多孩子在1岁前后迈出第一步，早一些或晚一些都完全正常。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大动作", "走路", "里程碑"], "third_party": null}, {"id": "10-11月-development-007", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "不要用学步车", "content": "学步车并不能帮孩子学走路，反而会打消走路的积极性，还有翻倒、摔下楼梯等安全隐患。美国儿科学会强烈建议不要使用，固定的弹跳椅或游戏架是更好的选择。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["走路", "学步车", "安全"], "third_party": null}, {"id": "10-11月-development-008", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "手部精细动作发育", "content": "宝宝会用拇指和食指（或拇指和中指）准确地捏起小东西，利用身边一切小物练习捏的动作。学会张开手指后会兴致勃勃地扔东西，可把兴趣引到柔软的球类上。他还喜欢有轮子、把手、合页的玩具，并会把东西塞进小洞里。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 手部发育"}], "divergence": false, "divergence_note": null, "tags": ["精细动作", "捏取", "玩具"], "third_party": null}, {"id": "10-11月-development-009", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "理解语言比表达更早", "content": "快1岁时宝宝开始用手指目标、爬向目标或打手势来传达需求，咿呀声被ba、da、ga、ma等清晰音节取代。他懂的比你猜想的多，可多和他说话、说法保持一致；同一样东西今天叫猫就别明天改叫咪咪。语言发育迟缓可能是听力障碍的表现，要重视他人的提醒。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言", "理解", "就医提示"], "third_party": null}, {"id": "10-11月-development-010", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "用图画书强化语言", "content": "图画书帮宝宝理解每个东西都有名称。选大的纸板书、布书或塑料书让他自己翻，指着图片反复说出名称，他听到的词越多学得越多。读书或说话时多让他参与，向他提问并等他回答，把交流当成真正的对话。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言", "早教", "读书"], "third_party": null}, {"id": "10-11月-development-011", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "崔医生谈引导宝宝用语言", "content": "在教宝宝说话时，对他的话要给予回应，把他不清晰的词与实际词语对应起来做示范，难以理解时耐心解析，这种积极互动会让宝宝更有成就感。家长的指令要简单，可先说请求再配合动作示范，帮宝宝理解需求。", "source": [{"book": "崔", "loc": "印刷页306"}], "divergence": false, "divergence_note": null, "tags": ["语言", "早教", "互动"], "third_party": null}, {"id": "10-11月-development-012", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "宝宝学说话别急于纠错", "content": "宝宝学说话阶段如果发音不准，家长不要当面纠错评判，而是再次做出正确示范；也不要过度逼宝宝学固定语言。给宝宝留出回答的空间，比正面纠正更有助于他自然习得正确用法。", "source": [{"book": "崔", "loc": "印刷页306"}], "divergence": false, "divergence_note": null, "tags": ["语言", "早教", "发音"], "third_party": null}, {"id": "10-11月-development-013", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "对宝宝说话别只纠正发音", "content": "宝宝说出的第一个词可能不准，只要是固定代表同一人或物的音节就该尊重。比如他每次要奶都说ma，你就在他说ma时给他奶，但你重复时要说奶，最后他会自己改过来。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言", "早教", "第一个词"], "third_party": null}, {"id": "10-11月-development-014", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "靠玩普通物品探索世界", "content": "这个阶段的宝宝注意力很短，最喜欢木勺、鸡蛋盒、塑料容器等家常用品，对与熟悉物品略有差异的东西特别感兴趣。他会通过摔、滚、扔、盖来研究物体，像小科学家一样理解形状、质地和大小的概念。可选能逐渐开阔眼界的物品，太陌生的反而会让他害怕。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知", "探索", "玩具"], "third_party": null}, {"id": "10-11月-development-015", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "物体恒存与躲猫猫", "content": "快10个月时宝宝会很肯定看不见的玩具依然存在，会继续四处寻找，这就是物体恒存的概念。和他玩躲猫猫游戏可以帮他理解这一概念，只要不断变化游戏形式，他几乎可以永不厌倦地玩下去。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知", "物体恒存", "躲猫猫"], "third_party": null}, {"id": "10-11月-development-016", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "想象游戏的雏形", "content": "快1岁时宝宝会意识到东西不仅有名称还有专门作用，游戏中出现想象的雏形，比如把玩具电话放到耳边而不只是啃咬敲打。可给他梳子、牙刷、杯子、勺子等有意义的道具来鼓励，并对他的行为热情回应。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知", "想象游戏", "早教"], "third_party": null}, {"id": "10-11月-development-017", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "日常活动锻炼大脑", "content": "早期岁月对大脑发育至关重要，家长每天都有机会锻炼宝宝的大脑。多跟他讲话、鼓励他把学到的词说出来，提供安全环境和简单玩具让他探索，每天玩游戏、唱歌、读书，都能促进智力和记忆力发育。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 大脑发育"}], "divergence": false, "divergence_note": null, "tags": ["大脑发育", "早教", "互动"], "third_party": null}, {"id": "10-11月-development-018", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "崔医生谈陪玩的技巧", "content": "陪玩既要给宝宝探索世界的自由，又要适当引导互动。宝宝完成某件事时给予语言肯定，比如夸他做得好，能强化他的积极性和探索能力。当宝宝遇到困难时家长可正面示范，但不要总在一旁提示正确做法或过度干预，否则会减弱专注力、限制探索能力发展。", "source": [{"book": "崔", "loc": "印刷页307"}], "divergence": false, "divergence_note": null, "tags": ["早教", "陪玩", "专注力"], "third_party": null}, {"id": "10-11月-development-019", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "development", "title": "以宝宝为主体的玩耍", "content": "正确而高效的玩以宝宝为主体，给他一个自由、自然的探索环境，只在他真正需要时才给予适当指南。过多的干预和阻止会减弱宝宝的专注力，所以家长不必每次都急着帮他把积木放到正确的位置。", "source": [{"book": "崔", "loc": "印刷页308"}], "divergence": false, "divergence_note": null, "tags": ["早教", "陪玩", "自主探索"], "third_party": null}], "care": [{"id": "10-11月-care-001", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "分离焦虑期的睡眠变化", "content": "8个月时宝宝每天通常仍小睡2次（上午、下午各一次），夜里能睡10～12小时，不需要半夜喝奶。但接下来几个月分离焦虑变强烈时，宝宝可能抗拒上床，半夜醒来找你的次数也会增多。这是焦虑紧张的自然表现，不是故意的。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "小睡", "分离焦虑"], "third_party": null}, {"id": "10-11月-care-002", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "帮宝宝顺利入睡的方法", "content": "这段时期可尝试多种助眠方法：有的宝宝在门开着、能听到妈妈声音时更易入睡，有的靠吮吸手指或被轻轻摇动入睡。播放白噪声尤其有效，但音量要调小，以免伤害宝宝敏感的听觉。每天坚持用相同方法哄睡，宝宝最终会习惯。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "入睡", "白噪声"], "third_party": null}, {"id": "10-11月-care-003", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜里醒来找你怎么办", "content": "宝宝深夜叫你时，只需确认他是否安好，告诉他你就在不远处，但不要开灯、哄他或抱起他。可以喂点水，不要喂奶，更不要抱到你的床上——分离焦虑期把他带到你床上只会让他更不愿回自己的床。检查并更换尿布后，用仰卧姿势放回婴儿床，说几句安慰的话再离开。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["夜醒", "睡眠", "尿布"], "third_party": null}, {"id": "10-11月-care-004", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜间查看先排查生病", "content": "夜里查看时要确保宝宝舒适且没有生病。有些疾病（如中耳炎或哮吼）可能在夜间突然发作。确认没生病后再检查尿布，若有排便排尿就在微弱灯光下迅速换好。很多父母会买无线婴儿监护器观察房间动静，购买前最好充分了解产品。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["夜醒", "生病", "监护器"], "third_party": null}, {"id": "10-11月-care-005", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "care", "title": "宝宝睡觉打鼾的常见原因", "content": "宝宝出生后上呼吸道还不够完善，引起不畅的原因很多：上呼吸道感染会使鼻黏膜肿胀、分泌物增多堵塞鼻腔而打鼾，随感染好转会逐渐消失；扁桃体肥大会堵塞呼吸道引发打鼾，多由感染引起。如果睡觉打鼾，家长要根据情况判断、有针对性地护理，必要时及时就医。", "source": [{"book": "崔", "loc": "印刷页301"}], "divergence": false, "divergence_note": null, "tags": ["打鼾", "睡眠", "呼吸道"], "third_party": null}, {"id": "10-11月-care-006", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "care", "title": "腺样体肥大与打鼾", "content": "造成腺样体肥大的主要原因是过敏，腺样体位于鼻咽后部，肥大向内会造成上呼吸道不畅引起打鼾，长期不干预可能导致颌面发育异常、面部变形，向外则可能造成听力问题。如果宝宝有打鼾、耳部不适、对声音不敏感等问题，需引起重视，及时到耳鼻喉科就诊。", "source": [{"book": "崔", "loc": "印刷页302"}], "divergence": false, "divergence_note": null, "tags": ["打鼾", "腺样体", "耳鼻喉"], "third_party": null}, {"id": "10-11月-care-007", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "给宝宝刷牙的方法", "content": "这一阶段宝宝至少长了1～2颗牙。一旦长牙就要用软毛牙刷和一粒大米大小的含氟牙膏刷牙。如果他拒绝，可让他仰躺在另一人的大腿上，用做游戏的方式轻轻刷每一颗牙。每天刷一次、前后都刷到，最好在睡前刷，刷后除水以外不再吃喝任何东西。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "口腔护理", "含氟牙膏"], "third_party": null}, {"id": "10-11月-care-008", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "第一次看牙医的时间", "content": "可以给宝宝安排第一次牙医门诊，时间应在长出第一颗牙后的6个月内，但不要晚于1岁，按哪个时间点先到来安排。牙医可能会给牙齿涂氟保护漆。儿科医生在健康检查时也可能检查牙齿并涂氟，但这不算作牙医门诊。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["牙医", "口腔护理", "涂氟"], "third_party": null}, {"id": "10-11月-care-009", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "care", "title": "从小注意保护宝宝隐私", "content": "从婴儿时期起注意保护隐私，有助于宝宝形成独立意识和自我保护意识。家长应避免在宝宝面前裸体；给宝宝换尿布时注意遮挡，在家最好关门、外出避开视野，不要在人多的地方暴露宝宝私处；不要给宝宝穿开裆裤。", "source": [{"book": "崔", "loc": "印刷页305"}], "divergence": false, "divergence_note": null, "tags": ["隐私保护", "日常护理"], "third_party": null}, {"id": "10-11月-care-010", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "care", "title": "禁止拿宝宝生殖器开玩笑", "content": "禁止任何家庭成员讨论或拿宝宝生殖器开玩笑的行为。有些亲友会拿男宝宝的生殖器开玩笑，这种行为会给宝宝错误的性别意识，不利于日后形成自我保护意识，让宝宝遇到危险时做不出恰当的应对。", "source": [{"book": "崔", "loc": "印刷页305"}], "divergence": false, "divergence_note": null, "tags": ["隐私保护", "自我保护"], "third_party": null}, {"id": "10-11月-care-011", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "care", "title": "如何处理宝宝手上的倒刺", "content": "手指上长倒刺多与遗传有关，但要注意护理。不要直接用手撕拔倒刺，撕拔容易导致伤口进一步受感染，也要避免宝宝啃咬倒刺。对已长出的倒刺，家长可先把宝宝的小手泡在温水中，待倒刺变软后用指甲刀平剪掉。", "source": [{"book": "崔", "loc": "印刷页305"}], "divergence": false, "divergence_note": null, "tags": ["倒刺", "手部护理", "日常护理"], "third_party": null}], "health": [{"id": "10-11月-health-001", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "生长与足部外观观察", "content": "这几个月发育依然很快，到1岁体重通常达出生时的3倍。要按生长曲线判断孩子是否仍按自己的模式发育，刚出生个头小的孩子曲线在平均线之下、只要往上走就不用担心。这个阶段看起来的扁平足、内八字和向外偏的脚尖大多正常，会随月龄增长逐渐改善。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 外观和生长情况"}], "divergence": false, "divergence_note": null, "tags": ["生长发育", "体重", "足部"], "third_party": null}, {"id": "10-11月-health-002", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "health", "title": "体重放缓多属正常", "content": "如果宝宝身体健康、饮食正常，一段时间内体重不增或增长缓慢，很可能是爬、站等运动量增加所致，此时身长仍会正常增长。家长要持续观察身长曲线，把身长和体重结合着看。如果体重和身长同时减缓，就要考虑是否存在喂养问题，需及时咨询医生。", "source": [{"book": "崔", "loc": "印刷页300"}], "divergence": false, "divergence_note": null, "tags": ["体重", "生长曲线", "就医信号"], "third_party": null}, {"id": "10-11月-health-003", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "health", "title": "还不会站立的判断", "content": "学站的速度受体重、协调性、练习机会等影响，不合脚的鞋袜也可能造成妨碍，可把玩具放在站起来才够得到的地方鼓励练习，并在宝宝精神好时进行、疲惫时及时中止。通常宝宝都能在11个月前学会站立，如果之后还没学会，家长应带宝宝就医，检查是否存在发育迟缓。", "source": [{"book": "崔", "loc": "印刷页301"}], "divergence": false, "divergence_note": null, "tags": ["站立", "发育迟缓", "就医信号"], "third_party": null}, {"id": "10-11月-health-004", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "health", "title": "睡觉打鼾要查因", "content": "宝宝睡觉打鼾常见原因有上呼吸道感染（随感染好转会消失）、扁桃体肥大和腺样体肥大。腺样体肥大长期不干预可能影响颌面发育甚至听力。如果宝宝有打鼾、耳部不适、对声音不敏感等情况，应及时到耳鼻喉科就诊；若已明显影响生长发育，则需评估是否手术。", "source": [{"book": "崔", "loc": "印刷页301"}, {"book": "崔", "loc": "印刷页302"}], "divergence": false, "divergence_note": null, "tags": ["打鼾", "耳鼻喉", "就医信号"], "third_party": null}, {"id": "10-11月-health-005", "age_stage": "10-11月", "applies_to": ["10-11月"], "applies_label": null, "board": "health", "title": "发脾气与情绪观察", "content": "宝宝在快速学技能的阶段偶尔闹小情绪、出现一些发育中的小反复，都属正常，家长不妨放宽心再观察一段时间。但如果宝宝一直没有明显好转，又总是易哭闹、易发脾气，家长就应引起注意，及时咨询医生，排查是否存在心理方面的问题。", "source": [{"book": "崔", "loc": "印刷页302"}], "divergence": false, "divergence_note": null, "tags": ["情绪", "心理健康", "就医信号"], "third_party": null}, {"id": "10-11月-health-006", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "这一阶段的疫苗安排", "content": "麻腮风三联疫苗（MMR）和第一针水痘疫苗都在12～15个月大时接种，可单独打或合为四痘混合疫苗；第三针乙肝在6～8个月大接种，第一针甲肝在1岁时或1岁后接种，第四针肺炎球菌在12～18个月大接种。全面、及时接种是保护孩子不受疾病困扰的最佳方法，无须担心疫苗抗原会超出孩子免疫系统的负担。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "MMR", "乙肝甲肝"], "third_party": null}, {"id": "10-11月-health-007", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "汽车安全座椅", "content": "2岁以前甚至以后，孩子都应坐在大小合适的后向式汽车安全座椅上。开车前要把孩子放进质量合格、安装正确的座椅并系好安全带，所有乘坐的车（含看护者和祖父母的车）都要正确安装。绝对不要把孩子单独留在车上，哪怕只有一小会儿。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 汽车安全座椅"}], "divergence": false, "divergence_note": null, "tags": ["安全座椅", "出行安全"], "third_party": null}, {"id": "10-11月-health-008", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "预防摔落与学步车", "content": "在楼梯的顶部和底部都安装儿童防护门，并锁上没有保护装置的房间。不要让孩子爬上成人坐的椅子，以免椅子翻倒。不要让孩子使用学步车，固定不动的婴儿弹跳椅或游戏架是更好的选择。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防摔落"}], "divergence": false, "divergence_note": null, "tags": ["防摔落", "学步车", "防护门"], "third_party": null}, {"id": "10-11月-health-009", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "预防烧伤和烫伤", "content": "抱着孩子时不要吸烟、喝热饮或在炉子旁做饭；要处理热的液体或食物时，先把孩子放到婴儿床、围栏或高脚餐椅等安全的地方。不要把盛热液体或食物的容器放在桌子、台面边缘或茶几等较矮的台面上，也不要让孩子在热的炉灶、加热器或火炉旁爬来爬去。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防烧伤和烫伤"}], "divergence": false, "divergence_note": null, "tags": ["防烫伤", "厨房安全"], "third_party": null}, {"id": "10-11月-health-010", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "预防溺水", "content": "不要把孩子单独留在浴室或其他有水的地方，包括水桶、戏水池、游泳池、水槽和马桶等，用完水后立即清空容器中的水。如果家中有游泳池，一定要用至少1.2米高的栅栏把游泳池四周围住，将其与房子完全隔开。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防溺水"}], "divergence": false, "divergence_note": null, "tags": ["防溺水", "用水安全"], "third_party": null}, {"id": "10-11月-health-011", "age_stage": "10-11月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "长牙护理与首次看牙", "content": "这一阶段孩子至少长了1～2颗牙，到1岁还没长牙也正常。一旦长牙，就用软毛牙刷蘸一粒大米大小的含氟牙膏每天刷一次牙，最好在睡前刷、刷后只喝水。孩子第一次看牙医应在长出第一颗牙后的6个月内、且不晚于1岁，牙医可能会涂氟保护漆。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["长牙", "刷牙", "牙医"], "third_party": null}]}, "11-12月": {"feeding": [{"id": "11-12月-feeding-001", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "每天需要多少奶量和热量", "content": "这个阶段宝宝每天需要750～900千卡热量，其中约400～500千卡来自母乳或配方奶，大约每天喝720毫升奶。如果宝宝胃口比之前变小不用担心，因为生长速度放缓，又有很多新鲜事吸引他。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["奶量", "热量", "食欲"], "third_party": null}, {"id": "11-12月-feeding-002", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "从糊状过渡到粗一点的食物", "content": "宝宝8个月左右可以开始吃比糊状稍粗、需要更多咀嚼的食物。可以添加酸奶、燕麦、捣碎的香蕉或土豆、浓汤、煮烂的蔬菜块来扩展食谱。鸡蛋、白软干酪、希腊酸奶和牛油果都是优质蛋白质来源。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "食物质地", "蛋白质"], "third_party": null}, {"id": "11-12月-feeding-003", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "鼓励宝宝自己学用勺子", "content": "宝宝手部能力提高后，可以在吃饭时给他一把勺子让他摆弄、尝试自己吃。刚开始很多食物会被弄到地上，可在餐椅下垫塑料布方便收拾。要有耐心，不要把勺子夺走，宝宝需要不断练习和你的鼓励，连续把勺子送进嘴里可能要到1岁以后才能做到。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["自主进食", "勺子", "精细动作"], "third_party": null}, {"id": "11-12月-feeding-004", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "可以用手抓着吃的食物", "content": "宝宝可以用手抓着吃的食物包括蒸熟的蔬菜块、香蕉等水果、煮熟的面条、小片全麦面包、鸡肉块、炒鸡蛋、全谷物米粉等。许多家庭会提前让宝宝吃个半饱，再让他坐在餐桌旁和家人一起吃些手抓食物。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["手抓食物", "辅食"], "third_party": null}, {"id": "11-12月-feeding-005", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "警惕容易卡喉的食物", "content": "宝宝吃东西时一定要全程看着，防止呼吸道被食物堵住。千万不要给大勺花生酱、大块生蔬菜、整颗坚果、整颗葡萄、爆米花、硬糖等坚硬或圆形食物。火腿肠、奶酪、肉块要切成小块再给宝宝吃。建议全家学习基本急救。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["安全", "卡喉", "急救"], "third_party": null}, {"id": "11-12月-feeding-006", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "引导宝宝用杯子喝水", "content": "6个月后就可以让宝宝用吸管杯或鸭嘴杯，母乳喂养的宝宝更容易学会用杯子。开始时杯里装少量水，每天只在某一餐用，给他示范怎么放到嘴边、怎么倾斜喝。即使他连续几周把杯子当玩具也别气馁，大多数宝宝都这样。用杯子能提高手嘴协调能力，也为断奶做准备。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["杯子", "喝水", "断奶准备"], "third_party": null}, {"id": "11-12月-feeding-007", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "奶瓶不要当安抚物，警惕奶瓶龋齿", "content": "不要在奶瓶里装奶哄宝宝入睡，宝宝边喝边睡奶会浸泡乳牙造成奶瓶龋齿，躺着喝睡着还可能引发中耳炎。也不要让宝宝玩耍时拿着奶瓶，只在坐着或被抱着时用奶瓶，其他时候用杯子，以免奶瓶变成离不开的安抚物。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶", "龋齿", "安抚物"], "third_party": null}, {"id": "11-12月-feeding-008", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "feeding", "title": "什么时候开始断母乳", "content": "关于断母乳的时间众说纷纭，但每个家庭情况不同，应根据自身实际决定。如果妈妈身体和时间都允许，可以继续母乳喂养；如果妈妈身体状况不允许、工作与喂养冲突，或宝宝长期频繁吃奶影响营养均衡，则可以有计划地引导宝宝离乳。妈妈不要因外界压力而勉强自己。", "source": [{"book": "崔", "loc": "印刷页312"}], "divergence": false, "divergence_note": null, "tags": ["断母乳", "时机"], "third_party": null}, {"id": "11-12月-feeding-009", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "feeding", "title": "1岁后母乳还有营养吗", "content": "近年研究发现1岁后母乳仍然富有营养，主要营养素不会随月龄减少，有些成分甚至增多，母乳中的免疫活性物质也会增加，宝宝感染时免疫因子还会进一步上升帮他抵御感染。加上6个月后辅食一起承担营养，不必担心母乳营养不足。妈妈不需要为此过于担忧。", "source": [{"book": "崔", "loc": "印刷页313"}], "divergence": false, "divergence_note": null, "tags": ["母乳营养", "免疫"], "third_party": null}, {"id": "11-12月-feeding-010", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "feeding", "title": "断母乳要健康回奶", "content": "断母乳时要关注乳房健康，避免急性乳腺炎。建议优先选择自然回奶：逐渐减少哺乳或吸奶次数、拉长间隔、缩短每次时长，泌乳量会随之减少，还可穿稍紧身内衣适度托抚乳房。若需快速回奶或自然回奶效果不好，应在医生指导下进行，不要随意用回奶药或打回奶针。", "source": [{"book": "崔", "loc": "印刷页314"}], "divergence": false, "divergence_note": null, "tags": ["断母乳", "回奶", "乳房健康"], "third_party": null}, {"id": "11-12月-feeding-011", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "feeding", "title": "断母乳要坚定、多陪伴、家人配合", "content": "断母乳期间妈妈要意志坚定，不要反复重新哺乳，否则既难断成又会伤害宝宝心理；遇到宝宝生病也尽量用其他方式安抚而非喂奶。同时要给宝宝更多陪伴和关爱补足安全感，并请家人配合，让爸爸或其他人多和宝宝互动、帮忙喂食，帮宝宝逐渐接受其他喂养方式。", "source": [{"book": "崔", "loc": "印刷页314"}], "divergence": false, "divergence_note": null, "tags": ["断母乳", "陪伴", "家人配合"], "third_party": null}, {"id": "11-12月-feeding-012", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "feeding", "title": "断乳后要保证奶量和高质饮食", "content": "断乳后宝宝仍需高质量饮食补充营养。处于辅食追加阶段的宝宝，不管是否断母乳，每天都应保持600～800毫升奶量以满足生长发育。1岁以内断母乳应以配方奶替代；满1岁、之前没接触过配方奶的宝宝，可先用牛奶过渡，再逐渐过渡到配方奶。", "source": [{"book": "崔", "loc": "印刷页315"}], "divergence": false, "divergence_note": null, "tags": ["断乳后", "奶量", "配方奶"], "third_party": null}, {"id": "11-12月-feeding-013", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "feeding", "title": "宝宝突然食欲下降不必慌", "content": "一向胃口好的宝宝突然不爱多吃了，只要没有生病或异常，通常是正常现象。原因大致有三：一是对周围事物兴趣增加，注意力都在爬行、走路和探索上；二是独立意识增强；三是宝宝在表达自己。千万不要强迫宝宝吃饭，以免加重他对吃饭的抵触，若持续异常应及时就医。", "source": [{"book": "崔", "loc": "印刷页316"}], "divergence": false, "divergence_note": null, "tags": ["食欲下降", "不强迫进食"], "third_party": null}, {"id": "11-12月-feeding-014", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "feeding", "title": "鼓励宝宝开始自己进食", "content": "这个阶段宝宝开始想自己动手吃饭、不愿家长喂。面对这种变化，家长应顺应宝宝的成长，把进食的主动权逐渐交给他，多观察、多鼓励他的自主尝试，并及时肯定和表扬他自己吃饭的行为，帮助他一步步进入独立进食的阶段。", "source": [{"book": "崔", "loc": "印刷页317"}], "divergence": false, "divergence_note": null, "tags": ["自主进食", "独立", "鼓励"], "third_party": null}], "development": [{"id": "11-12月-development-001", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "development", "title": "11个月会做什么", "content": "11个月时，宝宝应该会自己坐下、拉着物体站起来。很可能会扶着家具走、咿咿呀呀学说话、用拇指和食指捏握东西、用积木对敲、玩拍手游戏或挥手再见。也许会不扶东西独立站一瞬间、发出dada/mama的音。这些动作仅代表发育程度，不建议刻意做独站训练。", "source": [{"book": "崔", "loc": "印刷页309"}, {"book": "崔", "loc": "印刷页310"}], "divergence": false, "divergence_note": null, "tags": ["里程碑", "11个月", "大运动"], "third_party": null}, {"id": "11-12月-development-002", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "独立站与学步", "content": "孩子站稳后会扶着家具试探着走几步，确保所扶家具无尖角、够重或固定牢。平衡能力提高后他会偶尔放手，刚开始脚步不稳、走一步就摔，但很快能连续走好几步。大多数孩子会在几天内从蹒跚学步变为相当自信地前进，多在1岁生日前后迈出第一步，早些晚些都正常。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步", "大运动", "里程碑"], "third_party": null}, {"id": "11-12月-development-003", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "development", "title": "学步时奇怪步态", "content": "学步初期宝宝控制平衡能力差，可能双臂展向两侧像飞翔、走路撇脚或用脚尖走，行走速度也不稳，这些都是为达到平衡所必需的正常现象，家长不用担心也无需干预，随年龄增长会逐渐转正常。但如果过了1岁半走路姿势仍异常，应及时带宝宝就医检查。", "source": [{"book": "崔", "loc": "印刷页311"}], "divergence": false, "divergence_note": null, "tags": ["学步", "步态", "就医信号"], "third_party": null}, {"id": "11-12月-development-004", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "不要用学步车", "content": "两书都不建议使用学步车。AAP指出学步车不能帮孩子学走路、反而打消其走路积极性，且碰到障碍物易翻倒、易摔下楼梯，建议改用固定的弹跳椅、游戏架或结实的四轮小推车。崔玉涛指出学步车两腿间宽带子夹住、双腿无法蹬地易致O形腿，且靠车轮推移而非用脚走，达不到学步目的，还易冲撞摔倒，建议改用助步车。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}, {"book": "崔", "loc": "印刷页318"}], "divergence": false, "divergence_note": null, "tags": ["学步车", "助步工具", "安全"], "third_party": null}, {"id": "11-12月-development-005", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "development", "title": "助步车与学步带", "content": "等宝宝能站立且有想走路的欲望时，可以使用助步车，让他推着走练习行走。学步带的作用不在帮助学步，而是保证学步时的安全：它是带腰带的装置，家长用后背带子给宝宝向上的拉力，宝宝走熟后还能用来限制活动范围、保证安全。", "source": [{"book": "崔", "loc": "印刷页318"}, {"book": "崔", "loc": "印刷页319"}], "divergence": false, "divergence_note": null, "tags": ["助步车", "学步带", "助步工具"], "third_party": null}, {"id": "11-12月-development-006", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "学步鞋怎么选", "content": "两书都讲到学步穿鞋。AAP指出孩子外出走路后需要鞋子：必须包头、柔软舒适、鞋底柔韧防滑、留出脚生长空间，运动鞋就不错，不需要特殊鞋垫高背或足弓设计；脚长得快，第一双鞋只能穿2～3个月，应每月检查是否合脚。崔玉涛指出为足弓健康，只要会站就可穿袜子锻炼脚踝，开始学走可准备一双学步专用鞋。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}, {"book": "崔", "loc": "印刷页319"}], "divergence": false, "divergence_note": null, "tags": ["学步鞋", "足部", "用品"], "third_party": null}, {"id": "11-12月-development-007", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "手部精细动作", "content": "这几个月孩子会准确地用拇指和食指（或拇指和中指）捏起东西，用身边的小东西练习捏的动作。学会张开手指后会兴致勃勃地扔东西，可把硬物换成各种软球减少损坏和噪音。他还喜欢研究有活动部件的玩具，并能把东西塞进小洞；到这阶段接近尾声甚至能自己把积木摞成塔。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 手部发育"}], "divergence": false, "divergence_note": null, "tags": ["精细动作", "捏握", "玩具"], "third_party": null}, {"id": "11-12月-development-008", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "语言发育与多说话", "content": "快1岁时宝宝会用手指目标、打手势传达需求，咿呀声被ba、da、ga、ma等较清晰的音节取代，甚至吐出mama、baba。这时他理解的语言比你猜想的多，要尽可能多和他说话，尤其在洗澡、换尿布、喂食时，用简单明确、说法一致的话语描述周围事物。语言发育迟缓可能是听力障碍的表现，应重视他人提醒。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言", "说话", "听力"], "third_party": null}, {"id": "11-12月-development-009", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "读书与交流互动", "content": "图画书能强化孩子对每个东西都有名称的理解，宜选大纸板书、布书或塑料书让他自己翻，指着图片反复说出名称。读书和说话时要多创造机会让他参与：提问后等他回答、让他主导、重复他的发音。坚持每天读书和唱简单的歌大有帮助，并要关掉电视、限制屏幕时间，因为只有你全神贯注孩子才能学习。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["读书", "早教", "屏幕时间"], "third_party": null}, {"id": "11-12月-development-010", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "探索是孩子的科学", "content": "孩子学会爬后会不断寻找新事物征服：搜查抽屉、翻倒废纸篓、洗劫柜子，把东西摔、滚、扔、晃来研究其特点。这看似随便玩，其实是他像科学家一样探索世界、理解形状质地大小的途径。最喜欢的不是昂贵玩具，而是木勺、鸡蛋盒、塑料容器等家常用品，以及与熟悉物品略有差异的东西。务必用安全锁锁好有危险的抽屉柜子。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["探索", "认知", "玩具"], "third_party": null}, {"id": "11-12月-development-011", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "物体恒存与藏猫猫", "content": "这几个月孩子会理解物体即使离开视线仍然存在，即物体恒存。快10个月时他会很肯定藏起的玩具依然存在、继续四处寻找。可以通过和他玩藏猫猫帮助理解这一概念，只要不断变换游戏形式，他几乎能永不厌倦地玩下去。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["物体恒存", "藏猫猫", "认知"], "third_party": null}, {"id": "11-12月-development-012", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "东西有专门作用", "content": "快1岁时孩子会意识到东西不仅有名称还有专门作用，这种新认知以想象的雏形出现在游戏中：他不再把玩具电话当作啃咬敲打的玩意，而会放到耳边，因为见过你这么做。可以给他梳子、牙刷、杯子、勺子等有意义的道具来鼓励这种发育，并对他的行为热情回应。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知", "假装游戏", "早教"], "third_party": null}, {"id": "11-12月-development-013", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "每天锻炼大脑", "content": "孩子早期岁月对大脑发育至关重要，接触的环境和经历会产生巨大影响。家长每天都有机会锻炼孩子大脑：多和他讲话、鼓励他说出学到的词；提供舒适安全的环境让他探索；提供简单玩具；每天一起玩游戏、唱歌、读书以促进记忆力提高。这些活动会为他未来几年的大脑发育打下良好基础。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 大脑发育"}], "divergence": false, "divergence_note": null, "tags": ["大脑发育", "早教", "互动"], "third_party": null}, {"id": "11-12月-development-014", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "陌生人焦虑", "content": "陌生人焦虑是孩子情感发育最初的里程碑之一。3个月时能平静接触陌生人，现在却因陌生人接近而紧张，甚至曾经不怕的亲戚、保姆突然靠近也会让他想躲或吓哭。这是他第一次区分熟悉和陌生，是正常表现，并非被宠坏，也是他与你关系健康的证明，无须担心。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["陌生人焦虑", "情感发育", "社交"], "third_party": null}, {"id": "11-12月-development-015", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "分离焦虑及应对", "content": "孩子认识到世上只有一个你，你离开视线时他因时间感差、不知你何时回来而非常不安，常哭闹、夜醒找你。分离焦虑通常在10～18个月达到顶峰、18～24个月逐渐消失。应对建议：避开他疲倦饥饿生病时离开；离开时动静别太大、让看护者转移其注意力后迅速道别离开；在家做短时分离练习；说会回来就一定回来。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["分离焦虑", "情感发育", "应对"], "third_party": null}, {"id": "11-12月-development-016", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "development", "title": "又黏人又独立", "content": "1岁左右的宝宝有时很黏人、有时想被亲近却推开你，这种矛盾行为是这阶段的正常表现，也是逐渐独立的标志。家长要帮宝宝建立安全感：在他能独立活动时给足空间，鼓励他勇敢尝试，做得好时及时关注他的进步。可以让他自己在旁边玩玩具，家长退到一旁观察再慢慢离开，给他独立的空间。", "source": [{"book": "崔", "loc": "印刷页311"}], "divergence": false, "divergence_note": null, "tags": ["独立", "黏人", "安全感"], "third_party": null}, {"id": "11-12月-development-017", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "自我意识与照镜子", "content": "这阶段孩子自我意识正在成熟，最明显的标志是照镜子方式的变化：8个月时只当镜子是有趣的东西，现在则明白影像是自己，会摸自己的鼻子或扯头发。可以玩镜子游戏增强自我意识，一起摸彼此的身体部位并说出名称、做各种表情并告诉他情绪的名字。随自我意识稳定，他会更自信、不那么怕生。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["自我意识", "镜子游戏", "情感发育"], "third_party": null}, {"id": "11-12月-development-018", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "开始出现新的害怕", "content": "孩子可能开始害怕过去并不在意的东西，对黑暗、闪电、吸尘器等声响很大的家电感到害怕都很常见。现在唯一办法是尽量消除恐惧来源，如放小夜灯、趁他不在时用吸尘器；无法屏蔽时就留在他身边、平静安慰让他明白你没害怕。每次及时获得安慰，他的恐惧会逐渐减轻。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["害怕", "情绪", "安抚"], "third_party": null}, {"id": "11-12月-development-019", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "development", "title": "开始自己进食", "content": "之前要家长喂的宝宝现在开始想自己吃饭，这是独立意识形成的表现。家长应把握一个原则：宝宝需要喂时就喂，随着他长大、想自己来时就放手让他尝试。可以多让宝宝参与拿衣服、整理、吃饭等力所能及的事，并经常鼓励、肯定他自己动手的行为。", "source": [{"book": "崔", "loc": "印刷页317"}], "divergence": false, "divergence_note": null, "tags": ["自主进食", "独立", "鼓励"], "third_party": null}, {"id": "11-12月-development-020", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "development", "title": "为宝宝办周岁生日会", "content": "为快满1岁的宝宝办生日会要注意：不邀请太多人，陌生人会让他紧张，以亲戚家人为主、可叫两三个常一起玩的小伙伴；装饰简单别太多刺激物；时间随宝宝作息安排、控制在1～1.5小时以免疲惫哭闹；食物避开巧克力坚果等不适合的配方；礼物以书本玩具为主；不要强迫宝宝当众表演技能。", "source": [{"book": "崔", "loc": "印刷页324"}], "divergence": false, "divergence_note": null, "tags": ["生日会", "早教", "周岁"], "third_party": null}, {"id": "11-12月-development-021", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "development", "title": "帮宝宝认识世界", "content": "即将满周岁的宝宝是天生的探索者，家长应给予适当引导和鼓励。只要不涉及安全和边界，尽量不过多干预；宝宝做了某件事后及时鼓励表扬，遇挫折想放弃时适时引导。要充分调动触觉、听觉、视觉、嗅觉、味觉等各种感官认识世界，给他充裕的时间和空间，多带他去公园、图书馆等真实环境，让他在真实世界里了解世界。", "source": [{"book": "崔", "loc": "印刷页325"}, {"book": "崔", "loc": "印刷页326"}], "divergence": false, "divergence_note": null, "tags": ["早教", "探索", "感官"], "third_party": null}], "care": [{"id": "11-12月-care-001", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "分离焦虑会打乱睡眠", "content": "8个月时宝宝白天可能仍小睡两次，晚上能睡10～12小时、不用半夜喝奶。但接下来几个月分离焦虑变强，他可能抗拒上床，半夜醒来找你的次数也增多。这是这一阶段常见的睡眠倒退，属于正常表现。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "分离焦虑", "夜醒"], "third_party": null}, {"id": "11-12月-care-002", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "帮宝宝顺利入睡的方法", "content": "睡眠倒退期可以多试几种助眠方式：有的宝宝在房门开着、能听到妈妈声音时更易入睡，有的靠吮手指或被轻轻摇动入睡。播放白噪声尤其有效，但音量要调小，以免伤害宝宝敏感的听觉。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "入睡", "白噪声"], "third_party": null}, {"id": "11-12月-care-003", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜里宝宝叫你时怎么应对", "content": "宝宝深夜叫你时，只需确认他安好，告诉他你就在附近，但不要开灯、哄他或抱起他；可以喝点水，但不要喂奶，更不要抱到大人床上。先检查是否生病、要不要换尿布，再在微弱灯光下迅速放回床里。坚持每天用同样的方法，他最终会习惯。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["夜醒", "睡眠", "安抚"], "third_party": null}, {"id": "11-12月-care-004", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "开始给宝宝刷牙", "content": "这阶段宝宝至少长了1～2颗牙，还没长牙也别担心，满12个月没长牙也正常。一旦长牙，就用软毛牙刷加一粒大米大小的含氟牙膏每天刷一次，前后都刷到。最好在睡前刷，刷后除了水不再吃喝，否则含糖食物会让努力白费。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["牙齿", "刷牙", "护理"], "third_party": null}, {"id": "11-12月-care-005", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "安排第一次牙医门诊", "content": "可以给宝宝安排第一次看牙医，时间应在长出第一颗牙后的6个月内，但不晚于1岁，以先到者为准。牙医可能给牙齿涂氟保护漆。儿科医生在健康检查时也可能检查牙齿、涂氟，但这不算作牙医门诊。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["牙齿", "牙医", "护理"], "third_party": null}, {"id": "11-12月-care-006", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "不建议用学步车", "content": "两本书都不建议用学步车。崔玉涛指出宝宝坐进去后两腿被宽带子夹住、不能蹬地站立，容易导致O形腿，且靠车轮滑行而非用脚走路，达不到学步目的，还易冲撞摔倒。AAP同样强烈建议不要使用，因为它会打消走路积极性、碰到障碍易翻倒、更容易摔下楼梯。", "source": [{"book": "崔", "loc": "印刷页318"}, {"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步车", "安全", "日常护理"], "third_party": null}, {"id": "11-12月-care-007", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "助步车与学步带怎么用", "content": "等宝宝能站立、有走路意愿时可以用助步车，让他推着走练习行走。学步带的作用不在帮宝宝学步，而是保证安全：它是套在宝宝身上的腰带装置，家长用背后的带子给一个向上的牵引力，宝宝走熟后还能限定活动范围。", "source": [{"book": "崔", "loc": "印刷页318"}], "divergence": false, "divergence_note": null, "tags": ["助步车", "学步带", "日常护理"], "third_party": null}, {"id": "11-12月-care-008", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "光脚、穿袜与学步鞋", "content": "崔玉涛建议，为促进足弓健康发育，只要宝宝会站就可以给他穿袜子锻炼脚踝灵活，开始学走时再准备一双学步鞋。AAP则强调外出走路才需要鞋，鞋要包头、柔软、防滑、留生长空间（如运动鞋），不需要特殊鞋垫或足弓支撑设计；脚长得快，鞋每月检查一次是否合脚。", "source": [{"book": "崔", "loc": "印刷页319"}, {"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步鞋", "袜子", "日常护理"], "third_party": null}, {"id": "11-12月-care-009", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "外出旅行尽量不打乱作息", "content": "带宝宝旅行时很难严格维持原有的吃奶、吃饭、睡觉规律，作息被打乱容易让宝宝出现健康问题、也打乱旅行计划。所以家长规划行程时应尽量照顾宝宝的日常作息，不要过分干扰。", "source": [{"book": "崔", "loc": "印刷页319"}], "divergence": false, "divergence_note": null, "tags": ["旅行", "作息", "日常护理"], "third_party": null}, {"id": "11-12月-care-010", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "旅行前关注温度与时差", "content": "出行要随天气、室内外、早晚的温度变化及时给宝宝增减衣物，防止着凉感冒。去时差较大的地区，可根据到达时间合理安排作息：晚上到达就尽量让宝宝在飞机上睡觉，白天到达可让他多睡一会儿，减少时差影响。", "source": [{"book": "崔", "loc": "印刷页319-320"}], "divergence": false, "divergence_note": null, "tags": ["旅行", "温度", "时差"], "third_party": null}, {"id": "11-12月-care-011", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "换看护人前问清生活细节", "content": "如果平时主要由家中老人照顾，外出旅游改由父母照看，宝宝容易心理不适应；若父母不熟悉宝宝的生活规律会更严重。因此出发前父母要尽可能详细地向日常主要看护人询问宝宝的生活细节，提前做好准备。", "source": [{"book": "崔", "loc": "印刷页320"}], "divergence": false, "divergence_note": null, "tags": ["旅行", "看护人", "日常护理"], "third_party": null}, {"id": "11-12月-care-012", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "乘飞机让宝宝边起降边吃喝", "content": "飞机起降时气压变化会让宝宝耳朵不适。家长可以利用宝宝爱吃的小食或饮料，让他在起降过程中多喝水、吸吮；母乳喂养的宝宝可以在飞机起飞、下降时吃奶，借吞咽动作缓解耳朵的不适。", "source": [{"book": "崔", "loc": "印刷页321-322"}], "divergence": false, "divergence_note": null, "tags": ["乘飞机", "旅行", "护理"], "third_party": null}, {"id": "11-12月-care-013", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "生日会要迁就宝宝作息", "content": "为宝宝办周岁生日会时，时间要根据宝宝平时的作息安排，尽量不打乱他的吃睡规律、不要让他太疲劳。活动时间尽量简短，最好控制在1～1.5小时内，以免宝宝因疲惫哭闹、影响气氛。", "source": [{"book": "崔", "loc": "印刷页324"}], "divergence": false, "divergence_note": null, "tags": ["生日会", "作息", "日常护理"], "third_party": null}, {"id": "11-12月-care-014", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "care", "title": "断乳期帮宝宝重建睡眠", "content": "断乳会影响宝宝的睡眠。家长可以在断母乳后用其他安抚方式代替哺乳入睡，比如睡前适当补充牛奶、小饼干等辅食（吃完要清洁口腔，并随时间推移逐渐减少），或用固定的睡前仪式帮宝宝重新建立良好的睡眠习惯。", "source": [{"book": "崔", "loc": "印刷页316"}], "divergence": false, "divergence_note": null, "tags": ["断乳", "睡眠", "安抚"], "third_party": null}], "health": [{"id": "11-12月-health-001", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "1岁前后的疫苗安排", "content": "宝宝12～15个月大时接种第一针麻腮风三联疫苗(MMR)和第一针水痘疫苗,两者可一起打(四痘混合疫苗)也可分开。第四针肺炎球菌疫苗在12～18个月接种,第三针乙肝在6～8个月、第一针甲肝在1岁后接种。按时全程接种是保护宝宝的最佳方式。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "MMR", "肺炎球菌", "1岁"], "third_party": null}, {"id": "11-12月-health-002", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "health", "title": "不要用学步车", "content": "两书都不建议使用学步车。崔玉涛指出宝宝双腿被夹住无法蹬地站立,容易导致O形腿,且靠车轮滑行达不到学步目的,还易冲撞摔倒甚至摔下楼梯;AAP同样强烈建议不要使用,可改用固定的弹跳椅、游戏架或较重不会翻倒的助步车。", "source": [{"book": "崔", "loc": "印刷页318"}, {"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步车", "安全", "O形腿"], "third_party": null}, {"id": "11-12月-health-003", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "health", "title": "走路姿势异常何时就医", "content": "学步初期宝宝展开双臂、走得不稳、用脚尖走或步态奇怪都属正常,随年龄和平衡能力增长会自然转正,不必急于纠正。但若宝宝过了1岁半走路姿势仍有异常,应及时带宝宝就医,请医生检查是否存在发育问题。", "source": [{"book": "崔", "loc": "印刷页311"}], "divergence": false, "divergence_note": null, "tags": ["学步", "步态", "就医信号"], "third_party": null}, {"id": "11-12月-health-004", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "health", "title": "生长曲线呈阶梯状别担心", "content": "宝宝生长并非匀速,加上测量误差和运动量增加,生长曲线常呈阶梯状。只要在一定范围内波动且整体趋势向上,就属正常,无需干预。但若身长、体重均增长迟缓,家长要重视并请医生检查是否存在发育问题。", "source": [{"book": "崔", "loc": "印刷页310"}], "divergence": false, "divergence_note": null, "tags": ["生长曲线", "就医信号", "发育"], "third_party": null}, {"id": "11-12月-health-005", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "会移动后的居家防护", "content": "宝宝能爬能走后没有危险意识、记忆又短,必须时刻有人看护。把家布置成安全环境:橱柜抽屉装儿童安全锁,危险和贵重物品放到够不到处,不让宝宝独自进卫生间等危险房间,家具尖角包好或换成软边。地上的小物件(气球碎片、纽扣电池、硬币等)极其危险,必须清走。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 第9章 8～12月龄"}], "divergence": false, "divergence_note": null, "tags": ["居家安全", "防护", "误吞"], "third_party": null}, {"id": "11-12月-health-006", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "楼梯装防护门", "content": "宝宝一有机会就想爬楼梯,这个阶段绝不能让他单独在台阶上玩。应在楼梯上下两端都安装儿童安全防护门,防止他自己爬上爬下;即使他学会了倒退爬下楼梯,平时也要随时把防护门关上。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防摔落"}], "divergence": false, "divergence_note": null, "tags": ["楼梯", "防护门", "防摔"], "third_party": null}, {"id": "11-12月-health-007", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "汽车安全座椅", "content": "2岁以前甚至以后都应让宝宝坐后向式汽车安全座椅,只要座椅尺寸合适。开车前务必把宝宝放进合格、安装正确的座椅并系好安全带,所有他乘坐的车(含看护者和祖父母的车)都要正确安装。离开汽车时绝不能把宝宝单独留在车上,哪怕一会儿。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 汽车安全座椅"}], "divergence": false, "divergence_note": null, "tags": ["汽车座椅", "后向式", "出行安全"], "third_party": null}, {"id": "11-12月-health-008", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防烫伤与防溺水", "content": "抱着宝宝时不要喝热饮、抽烟或在炉边做饭;盛热液体或食物的容器不要放在桌台边缘或茶几等矮处,别让宝宝在热炉灶、火炉旁爬。任何有水的地方(水桶、戏水池、泳池、水槽、马桶)都不能留宝宝独处,用完水立即清空;家中泳池要用至少1.2米高栅栏围住。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防烧伤和烫伤"}, {"book": "AAP", "loc": "第9章 8～12月龄 · 预防溺水"}], "divergence": false, "divergence_note": null, "tags": ["防烫伤", "防溺水", "居家安全"], "third_party": null}, {"id": "11-12月-health-009", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防窒息的食物处理", "content": "宝宝可能不嚼就吞,千万别给整颗坚果、整颗葡萄、大块生蔬菜、爆米花、硬糖、大勺花生酱等坚硬或圆形食物;火腿肠、奶酪、肉块要切成小块。给宝宝吃东西时一定要在旁边盯着,防止呼吸道被阻塞。家庭成员最好都接受基本急救培训。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["防窒息", "辅食", "急救"], "third_party": null}, {"id": "11-12月-health-010", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "刷牙与第一次牙医门诊", "content": "宝宝一长牙就要用软毛牙刷加一粒大米大小的含氟牙膏刷牙,每天一次,睡前刷完后除水外不再吃喝。第一次看牙医应在长出第一颗牙后的6个月内,但不晚于1岁。12个月还没长牙也属正常,不必担心。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "含氟牙膏", "牙医"], "third_party": null}, {"id": "11-12月-health-011", "age_stage": "11-12月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "语言迟缓警惕听力问题", "content": "快1岁时宝宝会用手指、爬向目标或打手势来传达需求。要注意,语言发育迟缓可能是听力障碍的表现,所以别忽视他人关于宝宝听力或语言的提醒,尤其初次为人父母时更要重视。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "听力", "就医信号"], "third_party": null}, {"id": "11-12月-health-012", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "health", "title": "学步鞋与赤足锻炼", "content": "为促进足弓健康发育,只要宝宝会站,就可以给他穿袜子锻炼脚踝灵活;开始学走路后可准备一双学步专用鞋。AAP补充:鞋子要包头、柔软、防滑、有生长空间(运动鞋即可),不需要特殊鞋垫或足弓支撑;宝宝脚长得快,第一双鞋只能穿2～3个月,要每月检查是否合脚。", "source": [{"book": "崔", "loc": "印刷页319"}, {"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步鞋", "足弓", "穿袜"], "third_party": null}, {"id": "11-12月-health-013", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "health", "title": "远途旅行的健康防护", "content": "带宝宝旅行要密切关注温度变化随时增减衣物、提前按目的地时差规划睡眠、尽量不打乱日常作息,出发前向主要看护人问清宝宝生活细节。旅途随带急救药具,优先吃一次性包装食品避免食物中毒,留意水质变化引起的腹泻并及时补水就医。", "source": [{"book": "崔", "loc": "印刷页319"}, {"book": "崔", "loc": "印刷页320"}], "divergence": false, "divergence_note": null, "tags": ["旅行", "食物中毒", "腹泻"], "third_party": null}, {"id": "11-12月-health-014", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "health", "title": "旅途防蚊虫叮咬", "content": "蚊虫叮咬不仅会让宝宝感染皮炎,还可能传播乙型脑炎、黄热病等传染病,被某些不知名虫子咬后还有中毒风险。出行要用蚊帐、防蚊用品防护,夜间外出给宝宝穿长袖、睡前用防蚊喷雾;一旦被叮咬应及时处理伤口,必要时尽快带宝宝就近就诊。", "source": [{"book": "崔", "loc": "印刷页320"}], "divergence": false, "divergence_note": null, "tags": ["蚊虫叮咬", "乙脑", "传染病"], "third_party": null}, {"id": "11-12月-health-015", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "health", "title": "乘飞机乘火车护耳", "content": "带宝宝乘飞机时,起降气压变化会让宝宝耳朵不适,可在此时让宝宝吸吮、喝水、喝奶或吃点零食来缓解。乘火车(尤其动车、高铁)也要注意保护宝宝耳朵,避免在人多易传播病毒的封闭空间长时间停留,看护好宝宝别让他独自在过道走动以免发生事故。", "source": [{"book": "崔", "loc": "印刷页321"}, {"book": "崔", "loc": "印刷页323"}], "divergence": false, "divergence_note": null, "tags": ["乘飞机", "乘火车", "护耳"], "third_party": null}, {"id": "11-12月-health-016", "age_stage": "11-12月", "applies_to": ["11-12月"], "applies_label": null, "board": "health", "title": "周岁生日会的食物安全", "content": "为宝宝准备周岁生日会食物时,要避免蛋糕含巧克力、坚果等不适合宝宝的配方,外购食物不要备太多以免吃不完变质,并避免给宝宝那些容易呛噎的零食。生日会时间宜短(控制在1～1.5小时),别打乱作息让宝宝太疲劳。", "source": [{"book": "崔", "loc": "印刷页324"}], "divergence": false, "divergence_note": null, "tags": ["生日会", "食物安全", "防窒息"], "third_party": null}]}}, "count": 796};

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function monthsBetween(b){const d=new Date(b+"T00:00:00");let m=(TODAY.getFullYear()-d.getFullYear())*12+(TODAY.getMonth()-d.getMonth());if(TODAY.getDate()<d.getDate())m--;return Math.max(0,m);}
function daysBetween(b){return Math.max(0,Math.round((TODAY-new Date(b+"T00:00:00"))/864e5));}
function stageForMonths(m){if(m<12)return STAGES[m];if(m<18)return'12-18月';if(m<24)return'18-24月';if(m<30)return'2-2.5岁';return'2.5-3岁';}

 </div>
 <div class="disc">本内容为图书要点整理，不替代医生诊断，紧急情况请及时就医。</div>`;}

function saveBaby(){const n=(document.getElementById('bname').value||'').trim();const v=document.getElementById('bday').value;if(n){babyName=n;LS.set('bb_babyname',n);}if(v){birthday=v;LS.set('bb_birthday',v);}renderHome();}

function renderTimeline(){const m=monthsBetween(birthday),cur=stageForMonths(m);
 const el=document.getElementById('view-timeline');
 el.innerHTML=`<div class="h1">按月龄浏览</div><div class="sub">点任意阶段查看四大板块照护重点</div>
 <div class="tl">`+STAGES.map(s=>{const has=hasData(s);return `<button class="${has?'has':'no'} ${s===cur?'cur':''}" onclick="openStage('${s}')">${s}<span class="badge">${has?'✓ 已上线':'M2 生产中'}</span></button>`;}).join('')+`</div>
 <div class="disc">已上线 0-12 月全部 12 个阶段；1-3 岁阶段稍后生产、届时点亮。</div>`;}

function locText(s){if(s.book==='崔')return '崔玉涛 '+s.loc; const seg=(s.loc.split('·').pop()||'').trim(); return '美儿科会 · '+seg;}
function cardHTML(p){const star=favs.has(p.id)?'on':'';const div=p.divergence?'<span class="divbadge">🔶 双书分歧</span>':'';
 const alabel=p.applies_label?`<span class="alabel">${esc(p.applies_label)}</span>`:'';
 const note=p.divergence&&p.divergence_note?`<div class="note"><b>分歧并列：</b>${esc(p.divergence_note)}</div>`:'';
 let tp='';
 if(p.third_party){const t=p.third_party;const ks=(t.key_sources||[]).map(s=>s.url?`<a href="${s.url}" target="_blank">${esc(s.name)}</a>`:esc(s.name)).join('、');
   tp=`<div class="tp"><div class="tphd">第三方权威参考 · ${esc(t.confidence)}</div><div>${esc(t.conclusion)}</div><div class="tpsrc">权威来源：${ks}</div>${t.caveat?`<div class="tpsrc">适用条件：${esc(t.caveat)}</div>`:''}</div>`;}
 const src=(p.source||[]).map(s=>`<span class="chip ${s.book==='崔'?'cui':'aap'}">${locText(s)}</span>`).join('');
 const tags=(p.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
 return `<div class="card" id="c-${p.id}"><div class="head" onclick="toggle('${p.id}')"><div class="ti">${esc(p.title)}${div}${alabel}</div>
  <button class="star ${star}" onclick="event.stopPropagation();fav('${p.id}')">★</button><span class="chev">›</span></div>
  <div class="body"><div class="txt">${esc(p.content)}</div>${note}${tp}<div class="srcrow">${src}${tags}</div></div></div>`;}

function renderStage(){const el=document.getElementById('view-stage');
 if(!hasData(curStage)){el.innerHTML=`<div class="stagehd"><button class="back" onclick="go('timeline')">‹</button><div class="t">${curStage}</div></div>
   <div class="ph">这个阶段(1-3岁)的内容<b>稍后生产</b>。<br><b>0-12 月</b>全部 12 个阶段已上线，<br>去 <b>月龄</b> 里选 0-1月 ~ 11-12月 任意阶段查看。</div>`;return;}
 const tabs=BOARDS.map(b=>{const n=boardPts(curStage,b.key).length;return `<button class="${b.key===curBoard?'on':''}" onclick="setBoard('${b.key}')">${b.short} ${n}</button>`;}).join('');
 const pts=boardPts(curStage,curBoard);
 const own=pts.filter(p=>!p.applies_label), gen=pts.filter(p=>p.applies_label);
 let cards=own.map(cardHTML).join('');
 if(gen.length) cards+=`<div class="zone">适用 1～3 月龄 · 整段通用（美国儿科学会）</div>`+gen.map(cardHTML).join('');
 el.innerHTML=`<div class="stagehd"><button class="back" onclick="go('timeline')">‹</button><div class="t">${curStage} 照护重点</div></div>
  <div class="boardtabs">${tabs}</div><div class="count">${BOARDS.find(b=>b.key===curBoard).full} · 本月专属 ${own.length} 条 · 段通用 ${gen.length} 条（点标题展开）</div>
  ${cards}
  <div class="disc">本内容为图书要点整理，不替代医生诊断，紧急情况请及时就医。</div>`;}

function setBoard(k){curBoard=k;renderStage();document.querySelector('#view-stage .boardtabs').scrollIntoView({block:'start'});document.querySelector('.screen').scrollTop=0;}
function toggle(id){document.getElementById('c-'+id).classList.toggle('open');}
function fav(id){if(favs.has(id))favs.delete(id);else favs.add(id);LS.set('bb_favs',[...favs]);
 const cur=document.querySelector('.view.on').id;
 if(cur==='view-stage')renderStage();else if(cur==='view-fav')renderFav();else if(cur==='view-search')doSearch();}

function renderSearch(){const el=document.getElementById('view-search');
 el.innerHTML=`<div class="searchbar"><input id="q" placeholder="搜症状/关键词，如 发烧、辅食、湿疹" oninput="doSearch()"></div>
  <div class="chips">${['发热','吐奶','便秘','湿疹','睡眠','疫苗','吃手','抬头'].map(t=>`<button onclick="quickSearch('${t}')">${t}</button>`).join('')}</div>
  <div id="results"><div class="empty">输入关键词，或点上面的常用词试试<br><span class="bk">（搜索覆盖 0-12 月全部内容）</span></div></div>`;}
function quickSearch(t){document.getElementById('q').value=t;doSearch();}
function doSearch(){const q=(document.getElementById('q').value||'').trim();const box=document.getElementById('results');
 if(!q){box.innerHTML='<div class="empty">输入关键词开始搜索</div>';return;}
 const hits=ALL.filter(p=>(p.title+p.content+(p.tags||[]).join('')).includes(q));
 if(!hits.length){box.innerHTML=`<div class="empty">没找到「${esc(q)}」相关内容</div>`;return;}
 box.innerHTML=`<div class="count">找到 ${hits.length} 条</div>`+hits.map(p=>`<div class="bk" style="margin:0 2px 4px">${p._stage} · ${p._boardShort}</div>`+cardHTML(p)).join('');}

function renderFav(){const el=document.getElementById('view-fav');const list=[...favs].map(id=>byId[id]).filter(Boolean);
 if(!list.length){el.innerHTML=`<div class="h1">我的收藏</div><div class="empty">还没有收藏<br>在要点右上角点 ★ 即可收藏，随时回看</div>`;return;}
 el.innerHTML=`<div class="h1">我的收藏</div><div class="count">${list.length} 条 · 存在本机</div>`+list.map(p=>`<div class="bk" style="margin:0 2px 4px">${p._stage} · ${p._boardShort}</div>`+cardHTML(p)).join('');}

renderHome();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script></body></html>
