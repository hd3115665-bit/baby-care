e": false, "divergence_note": null, "tags": ["餐椅", "安全带", "进餐环境"], "third_party": null}, {"id": "6-7月-feeding-017", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "补充维生素D", "content": "AAP建议婴儿应补充维生素D（除非每天喝800毫升以上额外添加维生素D的配方奶）：不满1岁的婴儿每天补充400国际单位，1岁以上每天补充600国际单位，因为维生素D缺乏可导致佝偻病。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 营养补充剂"}], "divergence": false, "divergence_note": null, "tags": ["维生素D", "营养补充", "佝偻病"], "third_party": null}, {"id": "6-7月-feeding-018", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "通过辅食补铁", "content": "AAP指出随着成长加速，婴儿体内储存的铁逐渐减少就需要补铁；部分或纯母乳喂养的4个月大婴儿应按每千克体重每天1毫克标准口服补铁剂，直到开始吃可补铁的辅食（如高铁婴儿米粉），之后可从肉类、高铁米粉和绿色蔬菜中获取铁。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 营养补充剂"}], "divergence": false, "divergence_note": null, "tags": ["补铁", "营养补充", "母乳喂养"], "third_party": null}, {"id": "6-7月-feeding-019", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "为什么要添加辅食", "content": "崔玉涛指出宝宝满6个月后，纯母乳或配方粉已无法提供生长发育高速阶段所需的足量营养素，因此需要补充辅食；吃辅食还能锻炼宝宝的咀嚼能力和手眼协调能力，并促进乳牙萌出。", "source": [{"book": "崔", "loc": "印刷页246"}], "divergence": false, "divergence_note": null, "tags": ["辅食作用", "营养", "能力锻炼"], "third_party": null}, {"id": "6-7月-feeding-020", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "怎样选和冲调米粉", "content": "崔玉涛建议选正规厂家、大品牌、以大米为主原料的米粉，初期一定要先选纯米粉（标注纯大米或原味），可含铁等矿物质但不要含其他食材配料以免不易判断过敏原。冲调时不必严格按说明书比例，宜从稀到稠逐步加浓，且保持无盐无糖的原味。", "source": [{"book": "崔", "loc": "印刷页250"}], "divergence": false, "divergence_note": null, "tags": ["米粉选购", "冲调", "纯米粉"], "third_party": null}, {"id": "6-7月-feeding-021", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "宝宝拒绝吃辅食怎么办", "content": "崔玉涛指出宝宝拒绝辅食时家长不要逼迫，让宝宝保持对食物的兴趣最重要。可从几方面找原因：不适应新食物需耐心坚持每天尝试、肚子不饿可在饥饿时再喂、餐具冷热或材质不合适、以及对某种原料过敏（确定过敏应立即停止）。", "source": [{"book": "崔", "loc": "印刷页253"}], "divergence": false, "divergence_note": null, "tags": ["拒绝辅食", "不强迫", "原因排查"], "third_party": null}, {"id": "6-7月-feeding-022", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "添加辅食后宝宝拒奶怎么办", "content": "崔玉涛指出宝宝添加辅食后可能因身体不适、吃奶分心、吃太多辅食或口味偏甜而对奶失去兴趣。家长应先找原因再应对：身体不适及时护理、吃太多辅食则减少辅食量、饿时先喂奶，切勿强迫进食以免加剧抵触。", "source": [{"book": "崔", "loc": "印刷页253"}], "divergence": false, "divergence_note": null, "tags": ["拒奶", "辅食与奶", "不强迫"], "third_party": null}, {"id": "6-7月-feeding-023", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "训练宝宝的咀嚼能力", "content": "崔玉涛指出宝宝的咀嚼能力并非与生俱来、需后天训练，它是粉碎消化食物的第一步，咀嚼差不光影响进食，还会因口腔发育不充分而不利于日后语言能力发展。家长应在满6个月添加辅食后针对不同阶段以不同方式训练宝宝咀嚼。", "source": [{"book": "崔", "loc": "印刷页254"}], "divergence": false, "divergence_note": null, "tags": ["咀嚼训练", "口腔发育", "语言发展"], "third_party": null}, {"id": "6-7月-feeding-024", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "辅食食材要搭配均衡", "content": "崔玉涛建议宝宝接受较多食材后应搭配均衡，每餐营养均衡，包含主食、菜、肉，其中主食应占约50%；水果糖分不是辅食主要组成，建议把果泥单独放在餐间喂，避免偏食。", "source": [{"book": "崔", "loc": "印刷页252"}], "divergence": false, "divergence_note": null, "tags": ["营养均衡", "食材搭配", "果泥"], "third_party": null}, {"id": "6-7月-feeding-025", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "feeding", "title": "辅食要现盛现吃、不留剩", "content": "AAP提醒给孩子喂辅食时不要直接从瓶、罐或袋中取出来喂，而要先倒适量到餐盘里，防止容器中余下的辅食被孩子口水中的细菌污染；餐盘中吃剩的辅食要及时倒掉，不要留到下次再吃。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["卫生", "防污染", "辅食保存"], "third_party": null}], "development": [{"id": "6-7月-development-001", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "development", "title": "6个月会做的事", "content": "6个月时宝宝应该会双腿支撑一点重量、拉坐时头部不后仰、伸手去够想要的东西。很可能会自己吃饼干。也许会独坐、叫名字有反应、抓起积木、玩躲猫猫,甚至能扶站(仅代表发育程度,不建议刻意训练)、发出dada、mama的音(但无所指)、把积木从一只手换到另一只手。这些只是参考,每个宝宝节奏不同。", "source": [{"book": "崔", "loc": "印刷页243"}, {"book": "崔", "loc": "印刷页244"}], "divergence": false, "divergence_note": null, "tags": ["发育里程碑", "6个月"], "third_party": null}, {"id": "6-7月-development-002", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "development", "title": "大运动发育:爬", "content": "大运动发育是随生长水到渠成、按序而行的事,家长可提供适度练习机会,但绝不应强迫提前训练。很多宝宝6个月左右出现的爬姿并不标准,用腹部匍匐前进甚至倒退着爬,都是正常的。家长可在宝宝趴着时在前面放小玩具引逗他够取;如不放心,可在体检时请医生检查。", "source": [{"book": "崔", "loc": "印刷页244"}, {"book": "崔", "loc": "印刷页245"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "爬行", "不强迫训练"], "third_party": null}, {"id": "6-7月-development-003", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "学坐的过程", "content": "坐起会随背部和颈部肌肉力量增强、躯干头颈平衡发展而分步实现。先学会俯卧抬头并坚持,再用手臂支撑、弓背抬起胸部。等能抬起上半身后,可用手扶住或用枕头撑住腰背帮他练习平衡,很快能学会身体前倾、双臂支撑的\"三足鼎立\"。6～8个月前,在你帮助下他能不用手臂支撑坐一段时间。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "学坐"], "third_party": null}, {"id": "6-7月-development-004", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "翻身与抓握", "content": "约5个月大时宝宝会趴着摇晃身体、踢腿、用手臂划水,这些动作是翻身和爬行的必要准备。这个阶段快结束时很可能学会俯卧仰卧互相翻身,大多数先学会俯卧翻到仰卧,先学会仰卧翻俯卧也完全正常。手部方面会用拇指和其他手指拍、抓、扒捡东西,6～8个月前能把东西从一只手转到另一只手。注意不要在身边放会让他窒息或受伤的东西。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "精细运动", "翻身", "安全"], "third_party": null}, {"id": "6-7月-development-005", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "探索自己的身体", "content": "随着身体协调能力增强,宝宝开始探索以前没意识到的身体部位:躺着时抓自己的脚和脚趾塞进嘴里,换尿布时摸自己的外生殖器,坐着时拍打膝盖或大腿。把他的小脚放在地板上时,他可能蜷脚趾摩挲地面、练习\"走路\"或上下跳。这些都是为爬行和站立做的准备。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["运动发育", "身体探索"], "third_party": null}, {"id": "6-7月-development-006", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "视觉发育:辨色与追物", "content": "宝宝现在才能分清红、蓝、黄等颜色的差异,大多偏爱红色和蓝色,选图画书或装饰画时可记住这点。视力范围已增大到几米以上并继续增大,能轻松一直跟着移动的物体看。镜子也能带来无穷快乐,影像变化对应他自己的动作,会逐渐让他意识到镜中是自己。如对新东西毫无兴趣,或一只/两只眼睛向内或向外斜视,请联系儿科医生。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 视觉发育"}], "divergence": false, "divergence_note": null, "tags": ["视觉发育", "颜色", "预警信号"], "third_party": null}, {"id": "6-7月-development-007", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "development", "title": "开始模仿大人说话", "content": "宝宝6个月或7个月大之后,家长的参与对语言发育更重要,因为这时他开始积极模仿人们说话的声音,对你发出的声音有更积极的反应并试着模仿。可以教他一些简单的音节和词语,如\"宝宝\"\"猫\"\"狗\"\"妈妈\"\"爸爸\"等。尽管要到一年多以后才能听懂他说话,但宝宝在1岁前就能理解很多词了。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "模仿", "6-7个月"], "third_party": null}, {"id": "6-7月-development-008", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "语言发育的预警信号", "content": "如果快7个月大的宝宝仍没有开始牙牙学语或模仿任何声音,可能意味着听力或语言发育有问题。听力部分损失的宝宝仍会被巨响吓到或转头找声源,但难以模仿大人讲话。如平时不牙牙学语或发不出不同的声音,应向儿科医生咨询;经常耳部感染可能导致中耳积液影响听力。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "听力", "预警信号"], "third_party": null}, {"id": "6-7月-development-009", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "认知:理解因果关系", "content": "这一阶段宝宝会更理解因果关系,常在4～5个月时偶然发现:踢床板时床会晃、敲打东西会发出声音。一旦明白自己能引发这些反应,他就会反复尝试,比如故意扔东西看你捡。这虽然有时烦人,但是他认识因果和自身影响环境的方式。可给他不易碎、轻、不太小的东西(塑料勺、不会碎的杯罐盖盒)让他实验。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知发育", "因果关系"], "third_party": null}, {"id": "6-7月-development-010", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "认知:物体恒存", "content": "这一阶段结束时,宝宝会发现东西即使离开视线也仍然存在,这就是\"物体恒存\"。此前他可能认为世界只由看到的东西组成,玩具藏在布下或盒里就觉得彻底消失、不会去找。4个月大以后他会逐渐意识到世界比想象中稳定。通过玩躲猫猫这类游戏和观察周围的人和物,他会在接下来几个月继续认识物体的恒存性。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知发育", "物体恒存", "躲猫猫"], "third_party": null}, {"id": "6-7月-development-011", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "development", "title": "气质与个性", "content": "宝宝的个性大部分由天生气质决定:急躁还是温顺、开朗还是易怒、固执还是乖巧。气质包括活跃程度、对事情的坚持程度和对世界的适应能力,这几个月会表现得更明显。个性强、敏感的宝宝需要更多耐心和温柔引导,不能在他准备好前强迫行动。最好的做法是认识并适应孩子的性格,而非抗拒或试图改变。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["情感社交", "气质", "个性"], "third_party": null}, {"id": "6-7月-development-012", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "development", "title": "陌生人焦虑(认生)", "content": "5～6个月起宝宝可能因你离开房间或见到陌生人而哭,这是他对常照顾者产生强烈依恋的表现。到7～8个月大时,他可能明显拒绝靠太近的陌生人,这被称为\"陌生人焦虑\",是发育正常的标志。可利用陌生人焦虑出现前这段喜爱社交的时期,帮他熟悉今后照顾他的人(保姆、亲戚等),有助于之后顺利度过认生期。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 第8章 4～7月龄"}], "divergence": false, "divergence_note": null, "tags": ["情感社交", "陌生人焦虑", "依恋"], "third_party": null}, {"id": "6-7月-development-013", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "development", "title": "宝宝胆小怕生怎么办", "content": "宝宝随月龄增长心理水平发展,会开始区别对待家人和陌生人,这是一种正常的阶段性表现,过后会恢复。家长应营造稳定的情感环境、温柔亲切地对待。在陌生环境中可抱着宝宝、保持身体紧密接触和目光交流给他安全感(可通过他攀抱的力度判断是否放松);家长自己要积极向人打招呼但不强迫宝宝也这样做;宝宝完全放松后再交流,也不强迫他拥抱陌生人。", "source": [{"book": "崔", "loc": "印刷页259"}, {"book": "崔", "loc": "印刷页260"}], "divergence": false, "divergence_note": null, "tags": ["早教", "认生", "安全感"], "third_party": null}, {"id": "6-7月-development-014", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "development", "title": "培养宝宝的专注力", "content": "专注力是一切学习的开始。喂辅食是这个阶段培养专注力的好机会:用颜色鲜明的碗和勺吸引目光,每次吃饭环境稳定不变,身边不放其他玩具和食物。宝宝想用手抓食物、边玩边吃,在保证安全的前提下最好不要限制,这本身就是很好的专注力训练。要避免强迫按点吃、强行喂难接受的食物、强迫每餐吃完,这些会让宝宝产生压迫感、难以专注。也可借助玩具、绘本培养,尤其推荐讲绘本。", "source": [{"book": "崔", "loc": "印刷页260"}, {"book": "崔", "loc": "印刷页261"}], "divergence": false, "divergence_note": null, "tags": ["早教", "专注力", "绘本"], "third_party": null}], "care": [{"id": "6-7月-care-001", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "建立规律又灵活的作息", "content": "快4个月大时宝宝已形成进食、小睡、洗澡、晚上睡觉的固定生活规律，规律能增强宝宝的安全感，也方便家长安排时间。但日程要保持灵活，遇到生病、出游、亲友来访等突发情况可以暂时打乱，宽容对待反而能帮宝宝学会适应变化。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 第8章 4～7月龄"}], "divergence": false, "divergence_note": null, "tags": ["作息", "规律", "安全感"], "third_party": null}, {"id": "6-7月-care-002", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "每天小睡两次为主", "content": "这个阶段大多数宝宝每天仍需上午和中午各小睡一次，有些宝宝下午还会再睡一次。只要夜间睡得正常，小睡时就让宝宝想睡多久睡多久；如果宝宝夜里难入睡，则应在下午小睡时早点把他叫醒。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["小睡", "夜间睡眠", "作息"], "third_party": null}, {"id": "6-7月-care-003", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "固定睡前程序帮助入睡", "content": "这个阶段宝宝更机敏好动，晚上容易难以平静，固定的睡前程序能帮他入睡。洗热水澡、轻摇、讲故事、吃奶等都能让宝宝放松，要在他过度劳累前就开始，让他把这些活动和睡觉联系起来。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡前程序", "入睡", "放松"], "third_party": null}, {"id": "6-7月-care-004", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "让宝宝学着自己入睡", "content": "在宝宝还没睡着时就把他放到婴儿床上，轻声道晚安后离开，让他学习自己入睡。如果哭闹，先查看是否有麻烦，适当安慰后再离开，并随时间逐渐减少夜间关注。安全睡眠规则仍然适用，只是现在他可能会自己从俯卧翻成仰卧。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["自主入睡", "夜醒", "睡眠安全"], "third_party": null}, {"id": "6-7月-care-005", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "开始长牙的顺序与表现", "content": "这个时期宝宝开始长牙，通常先长两颗门牙（上下都有可能），再长另两颗门牙，接着是臼齿和尖牙。长牙时间和顺序因人而异，长得晚或顺序不同都不必担心，往往由基因决定，不代表发育有问题。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["长牙", "出牙顺序"], "third_party": null}, {"id": "6-7月-care-006", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "缓解长牙不适：能做与禁用", "content": "长牙可能让宝宝流口水多、爱咬硬物，伴轻度烦躁哭闹和低热（直肠温度不超过38.3℃）。可用手指轻轻按摩牙床，或用结实橡胶磨牙胶（不要冷冻成很硬）。绝对不要用出牙舒缓凝胶、顺势出牙药片、琥珀出牙项链，它们有害甚至致窒息。若体温超过38.3℃且极度痛苦，多半不是长牙引起，要看医生。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["长牙", "磨牙胶", "用药安全"], "third_party": null}, {"id": "6-7月-care-007", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "出牙后的刷牙与看牙医", "content": "发现宝宝长牙后就要在家刷牙，用柔软的婴儿专用牙刷和米粒大小的含氟牙膏。不要让宝宝含着乳房或奶瓶入睡，以免奶水留在牙上引发龋齿。长出第一颗牙后6个月内、最迟不超过12个月大时，要带宝宝看牙医。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "含氟牙膏", "看牙医"], "third_party": null}, {"id": "6-7月-care-008", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "训练宝宝的咀嚼能力", "content": "咀嚼能力不是天生的，需要后天训练，它是消化食物的第一步，还能减轻胃的负担、缓解出牙期不适。咀嚼差不仅影响进食，还会因口腔肌肉锻炼不足影响日后语言发展。从满6个月添加辅食起，家长就应针对不同阶段用不同方式训练宝宝咀嚼。", "source": [{"book": "崔", "loc": "印刷页254"}, {"book": "崔", "loc": "印刷页255"}], "divergence": false, "divergence_note": null, "tags": ["咀嚼", "口腔发育", "语言"], "third_party": null}, {"id": "6-7月-care-009", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "让宝宝习惯坐餐椅吃饭", "content": "从添加辅食起就要让宝宝习惯在餐椅里吃饭。相比家长抱着喂，坐餐椅姿势更稳，宝宝还能从坐位高度看着父母，更利于建立正餐的进食环境和习惯。", "source": [{"book": "崔", "loc": "印刷页255"}, {"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["餐椅", "进食习惯"], "third_party": null}, {"id": "6-7月-care-010", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "高脚餐椅的安全使用", "content": "宝宝6～7个月大时已能坐在高脚餐椅上吃饭。为确保舒适安全，要使用安全带并定期清洗，最好选带可拆卸托盘、四周边较高的餐椅，既能挡住掉落的食物，又方便拿到水槽清洗，整张餐椅也要隔段时间清洗一遍。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["高脚餐椅", "安全带", "清洁"], "third_party": null}, {"id": "6-7月-care-011", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "添加辅食后大便会变样", "content": "添加辅食后宝宝大便会出现各种颜色和性状，只要宝宝状态和精神良好就不必担忧，多半与吃的食物有关。例如吃胡萝卜或南瓜泥大便可能发橙，吃菠菜会变绿并带菜纤维，吃葡萄会有种子，吃西兰花可能有黑点。大便也会比之前变稀、气味变臭，这都是添加辅食后的正常现象，看到怪大便不必大惊小怪。", "source": [{"book": "崔", "loc": "印刷页245"}, {"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["大便", "辅食", "护理观察"], "third_party": null}, {"id": "6-7月-care-012", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "大便异常时要留意", "content": "加辅食后大便变成形、颜色多变、气味变浓是正常的，里面还可能有未消化的食物（如豌豆、玉米、番茄皮或蔬菜茎叶）。但如果大便非常稀、带黏液，可能是消化系统出了问题，应向医生咨询。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 添加辅食"}], "divergence": false, "divergence_note": null, "tags": ["大便", "消化", "就医信号"], "third_party": null}, {"id": "6-7月-care-013", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "用玩具让宝宝配合洗澡", "content": "随着身体能力增强，宝宝洗澡时会变得不太配合，洗澡难度升级。家长可以在浴室里放一些适合年龄段的玩具，造出一个'水上乐场'，让宝宝觉得洗澡也是在玩水，从而更愿意接受洗澡、享受其中的乐趣。", "source": [{"book": "崔", "loc": "印刷页256"}, {"book": "崔", "loc": "印刷页257"}], "divergence": false, "divergence_note": null, "tags": ["洗澡", "玩具", "配合"], "third_party": null}, {"id": "6-7月-care-014", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "穿太多比穿太少更易着凉", "content": "着凉会让宝宝生病，比如感染呼吸道疾病。很多家长以为着凉是室温太低所致，其实穿太多才是主因之一：一出汗又吹风，汗液蒸发，加上宝宝皮肤薄、汗腺调节体温能力不成熟，就容易忽冷忽热着凉。判断冷热应以颈背等部位的衣物温度为准，摸着温暖就说明宝宝不冷。", "source": [{"book": "崔", "loc": "印刷页256"}, {"book": "崔", "loc": "印刷页257"}], "divergence": false, "divergence_note": null, "tags": ["着凉", "穿衣", "体温调节"], "third_party": null}, {"id": "6-7月-care-015", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "日常防着凉的几个细节", "content": "洗澡时注意房间和水温，洗完及时擦干身体以免带走体温着凉。夏天出汗后不要马上进开着空调的房间防温差太大，室温可调到24～26℃且不要直吹宝宝；及时更换湿衣。冬天从室外进到温暖室内要及时脱外衣，以免出汗后感冒。", "source": [{"book": "崔", "loc": "印刷页258"}], "divergence": false, "divergence_note": null, "tags": ["着凉", "空调", "穿脱衣"], "third_party": null}, {"id": "6-7月-care-016", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "认识幼儿急疹：烧退疹出", "content": "幼儿急疹又称婴儿玫瑰疹，是常见的病毒感染性疾病，多发于2岁以内、尤以1岁以内居多，患病后多终身免疫。典型表现是'烧退疹出'：前期无明显症状却突然高热39～40℃、持续3～5天，退烧药只能暂时降温；之后体温恢复正常，皮肤才出现直径2～5毫米的红色疹点，主要分布在面部、腹部和后背，疹子一般几天后自行消退。", "source": [{"book": "崔", "loc": "印刷页258"}, {"book": "崔", "loc": "印刷页259"}], "divergence": false, "divergence_note": null, "tags": ["幼儿急疹", "发热", "出疹"], "third_party": null}, {"id": "6-7月-care-017", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "幼儿急疹的护理", "content": "幼儿急疹是自限性疾病，通常不需特别医治，会随病程自行恢复。突然高烧不必急于住院，若24小时内宝宝精神状态良好可继续观察。出疹后到疹子全部消退前要勤洗澡、勤换衣，保持皮肤清洁；若皮肤破损出现渗出、结痂等继发感染迹象（极少见），要及时就医。", "source": [{"book": "崔", "loc": "印刷页259"}], "divergence": false, "divergence_note": null, "tags": ["幼儿急疹", "护理", "就医信号"], "third_party": null}, {"id": "6-7月-care-018", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "care", "title": "枕头要合适、定期清洗更换", "content": "给宝宝准备的枕头不宜太高也不宜太低，要贴合颈部弯曲弧度，让头和身体保持水平。枕芯（如小米、决明子）要便于清洗、定期拆洗晾晒，荞麦皮、绿豆等填充物容易霉变，建议每三个月更换一次，以免霉菌引发呼吸道疾病和过敏。", "source": [{"book": "崔", "loc": "印刷页255"}, {"book": "崔", "loc": "印刷页256"}], "divergence": false, "divergence_note": null, "tags": ["枕头", "清洁", "防霉"], "third_party": null}, {"id": "6-7月-care-019", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "婴儿摇椅每天限用两次", "content": "用婴儿摇椅哄哭闹的宝宝常常有效，尤其带摇篮的那种。要选稳稳立在地面上的，不要用系在门框上的，并注意设备标明的重量限制或建议年龄。每天使用不超过2次、每次不超过半小时，每次都要系好安全带；它能让宝宝安静，但不能取代家长的看护。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 婴儿摇椅和婴儿围栏"}], "divergence": false, "divergence_note": null, "tags": ["婴儿摇椅", "安全", "看护"], "third_party": null}, {"id": "6-7月-care-020", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "care", "title": "六个月后更容易生病是正常的", "content": "宝宝大约6个月大时会失去通过胎盘从母体获得的免疫力，加上能自己够到更多物品和人，患传染病的概率会增大，这是正常现象。保护宝宝的第一道防线是尽量不让他接触病人，尤其是流感、呼吸道合胞病毒、水痘或麻疹等高传染性疾病患者。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["免疫力", "传染病", "防护"], "third_party": null}], "health": [{"id": "6-7月-health-001", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "health", "title": "6月龄要打的疫苗", "content": "宝宝6个月大时需要接种：第三针百白破、第三针脊髓灰质炎灭活疫苗（也可在6～18个月接种）、第三针肺炎球菌、第三针B型流感嗜血杆菌、第三针乙肝（可能在6～18个月接种）、第三针轮状病毒（依疫苗类型决定打2针还是3针）。如果正处于流感暴发季节，还可以接种第一针流感疫苗，第二针在1个月后补种。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "6月龄", "接种时间"], "third_party": null}, {"id": "6-7月-health-002", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "6个月后更容易生病", "content": "大约6个月大时，宝宝从母体获得的免疫力逐渐消失，加上他能自己够取、接触更多人和物品，患传染病的概率会增大，这是正常现象。第一道防线是尽量不让宝宝接触病人，尤其是流感、呼吸道合胞病毒、水痘、麻疹等高传染性疾病的患者。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["免疫力", "预防传染", "健康观察"], "third_party": null}, {"id": "6-7月-health-003", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "怎么判断宝宝生病了", "content": "宝宝是否生病不总是好判断。可以留意：是否面色苍白或有黑眼圈、是否比平时更烦躁或没精神，传染病常伴发热，也可能因没食欲、腹泻、呕吐而体重减轻。如果怀疑宝宝生病却找不出确切病因，或对某些症状很担忧，应联系医生并清楚描述这些症状。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 健康观察"}], "divergence": false, "divergence_note": null, "tags": ["就医信号", "健康观察", "发热"], "third_party": null}, {"id": "6-7月-health-004", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "长牙护理与危险的出牙产品", "content": "这个时期宝宝开始长牙，可能流口水多、爱啃硬物，伴轻度烦躁、哭闹和低热（直肠温度不超过38.3℃）。可用手指轻轻按摩牙床缓解，磨牙胶要选结实橡胶制成的、不要冷冻。绝对不要用出牙舒缓凝胶、顺势出牙药片，琥珀出牙项链既无效又有窒息、勒颈风险，千万别在宝宝脖子上挂任何东西。若宝宝极度痛苦且体温超过38.3℃，多半不是长牙引起，需就医。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 长牙和口腔护理"}], "divergence": false, "divergence_note": null, "tags": ["长牙", "出牙产品", "安全", "发热"], "third_party": null}, {"id": "6-7月-health-005", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "补维生素D与防晒", "content": "身体需要阳光合成维生素D，但日晒过多会增加日后皮肤癌风险。美国儿科学会建议婴儿补充维生素D：不满1岁每天400国际单位（除非每天喝800毫升以上额外加了维生素D的配方奶）。宝宝长时间在户外时应使用防晒霜、戴帽子、穿防晒服，预防晒伤。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 营养补充剂"}], "divergence": false, "divergence_note": null, "tags": ["维生素D", "防晒", "营养补充"], "third_party": null}, {"id": "6-7月-health-006", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "安全：汽车安全座椅", "content": "开车前务必把宝宝放进质量合格、安装正确的汽车安全座椅，系好五点式安全带。当身高体重达到后向式座椅上限时换用可转换式座椅。后排是最安全的位置，千万不要把后向式安全座椅装在有安全气囊的前排。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["安全", "汽车座椅", "出行"], "third_party": null}, {"id": "6-7月-health-007", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "安全：防溺水、防摔落", "content": "千万不要把宝宝单独留在浴盆或水槽里，哪怕只有几厘米深的水也可能溺水，洗澡椅和游泳圈都不能代替大人看护，宝宝在水中或水边时要始终保持一臂之内。无人看护时也永远不要把宝宝放在桌子、尿布台等高于地面的地方；若从高处摔落且看上去不正常，要立即就医或呼叫急救。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["安全", "防溺水", "防摔落"], "third_party": null}, {"id": "6-7月-health-008", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "安全：防烧烫伤", "content": "抱着宝宝时不要吸烟、喝热饮或在炉子旁做饭。咖啡、茶等热饮要放在宝宝够不到的地方。把水龙头热水最高温度设定为不超过49℃，以防烫伤。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["安全", "防烫伤", "热水"], "third_party": null}, {"id": "6-7月-health-009", "age_stage": "6-7月", "applies_to": ["3-4月", "4-5月", "5-6月", "6-7月"], "applies_label": "适用 4～7 月龄", "board": "health", "title": "安全：防窒息", "content": "不要给宝宝吃任何可能堵塞呼吸道的食物，所有食物都要搅碎或足够柔软到不用咀嚼就能咽下；整颗坚果、未切开的葡萄、圣女果、生胡萝卜、西芹等都不能给。同时确保宝宝不会被电线或窗帘绳缠住。", "source": [{"book": "AAP", "loc": "第8章 4～7月龄 · 安全检查"}], "divergence": false, "divergence_note": null, "tags": ["安全", "防窒息", "辅食安全"], "third_party": null}, {"id": "6-7月-health-010", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "health", "title": "如何应对幼儿急疹", "content": "幼儿急疹是常见的病毒感染，典型表现是「烧退疹出」：先无明显症状地突然高热39～40℃、持续3～5天，退烧药后体温可暂降又回升；退热后皮肤出现直径2～5毫米的红色疹点，主要在面部、腹部和后背，宝宝多无不适、几天后自行消退。它是自限性疾病，通常不需特别医治，但若持续高热很高或宝宝状态不好，应按发热护理并及时就医；疹未退前要勤洗澡勤换衣保持皮肤清洁。", "source": [{"book": "崔", "loc": "印刷页258"}], "divergence": false, "divergence_note": null, "tags": ["幼儿急疹", "发热", "出疹", "就医信号"], "third_party": null}, {"id": "6-7月-health-011", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "health", "title": "如何预防宝宝着凉", "content": "着凉容易引起呼吸道感染等疾病。常见原因之一其实是穿太多——一出汗又吹到风、汗液蒸发就着凉，宝宝皮肤薄、汗腺调节体温能力还不成熟，更易忽冷忽热。日常要注意：洗澡时控制好房间和水温，洗完及时擦干；夏天出汗后别马上进开着空调的房间，室温调到24～26℃且不要直吹宝宝；冬天进入暖和的室内要及时脱外衣，以免出汗后感冒。", "source": [{"book": "崔", "loc": "印刷页256"}], "divergence": false, "divergence_note": null, "tags": ["预防着凉", "穿衣", "室温"], "third_party": null}, {"id": "6-7月-health-012", "age_stage": "6-7月", "applies_to": ["6-7月"], "applies_label": null, "board": "health", "title": "用枕头要注意窒息和霉变", "content": "给宝宝准备的枕头不宜太高也不宜太低，要贴合颈部弧度，躺上去头和身体保持水平。枕芯（如小米、决明子等）不要选用一种、避免宝宝把脸埋进去窒息，也不要把枕头填得过硬影响头部塑形。枕芯要定期拆洗晾晒，荞麦皮、绿豆等填充物容易霉变，建议三个月更换一次，以免霉菌引发呼吸道疾病和过敏。", "source": [{"book": "崔", "loc": "印刷页255"}], "divergence": false, "divergence_note": null, "tags": ["枕头", "防窒息", "霉变", "安全"], "third_party": null}]}, "7-8月": {"feeding": [{"id": "7-8月-feeding-001", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "每天热量与奶量", "content": "这一阶段宝宝每天需要750～900千卡热量，其中400～500千卡来自母乳或配方奶，每天约喝720毫升奶。母乳和配方奶本身就含有维生素、矿物质和促进大脑发育的物质。如果宝宝胃口比之前小了不用担心，因为现在生长速度减缓，而且有许多新鲜有趣的事情吸引他。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["奶量", "热量", "食欲"], "third_party": null}, {"id": "7-8月-feeding-002", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "辅食可以更粗一些", "content": "大约8个月起，可以给宝宝吃比糊状稍粗、需要更多咀嚼的食物。可以添加酸奶、燕麦，或捣碎的香蕉、土豆，甚至浓一点的汤或煮烂的蔬菜块来扩展食谱。鸡蛋是理想的蛋白质来源，白软干酪、希腊酸奶和牛油果也是优质蛋白质来源。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "咀嚼", "蛋白质"], "third_party": null}, {"id": "7-8月-feeding-003", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "鼓励宝宝自己用勺吃饭", "content": "随着手的能力提高，可以在用餐时给宝宝一个勺子让他摆弄，会用了就让他试着自己吃。刚开始别期望太高，很多食物会被弄到地上，可在餐椅下垫一块塑料布方便收拾。一定要有耐心，不要把勺子夺走，宝宝需要不断练习以及你的鼓励和信心。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["自主进食", "用勺", "耐心"], "third_party": null}, {"id": "7-8月-feeding-004", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "手抓食物与防呛噎", "content": "可以用手抓着吃的食物包括蒸熟的蔬菜块、香蕉等水果、煮熟的面条、小片全麦面包、鸡肉块、炒鸡蛋、全谷物米粉等，吃的时候要时刻看着宝宝防止呛噎。由于宝宝可能不嚼就吞下，千万不要给大勺花生酱、大块生蔬菜、整颗坚果、整颗葡萄、爆米花、硬糖等坚硬或圆形食物；火腿肠、奶酪、肉块要切成小块。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["手抓食物", "呛噎", "安全"], "third_party": null}, {"id": "7-8月-feeding-005", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "练习用杯子喝水", "content": "宝宝6个月后就可以随时让他使用吸管杯或鸭嘴杯，母乳喂养的宝宝更容易学会用杯子。开始时杯里装少量水，每天只在某一餐给他用，并示范如何把杯子放到嘴边、倾斜喝水。即使他连续几周把水杯当玩具玩也别沮丧，多数宝宝都这样，完全学会用杯子喝各种液体大约需要6个月。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["杯子", "断奶准备", "喝水"], "third_party": null}, {"id": "7-8月-feeding-006", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "别用奶瓶哄睡防龋齿", "content": "不要在奶瓶里装配方奶让宝宝快些入睡。宝宝喝奶时睡着，奶会浸没刚长出的乳牙造成奶瓶龋齿，躺着喝奶睡着还可能引发中耳炎。也不要让奶瓶变成安抚物：只允许宝宝坐着或被抱着时用奶瓶喝，其他时候用杯子，一旦定了规矩就不要让步。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶", "龋齿", "安抚物"], "third_party": null}, {"id": "7-8月-feeding-007", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "feeding", "title": "市售辅食与自制辅食各有利弊", "content": "市售辅食方便、易储存，还添加了宝宝生长发育所需的营养素，但菜泥果泥保存时间长会损失新鲜度和部分营养，有些还加了糖、油、盐等调味品，不适合1岁以内宝宝。自制辅食更新鲜、卫生，有利于宝宝及早适应家庭饮食，但缺乏很多营养元素尤其是钙和铁。究竟自制还是购买，应根据自家实际情况理智选择。", "source": [{"book": "崔", "loc": "印刷页268"}, {"book": "崔", "loc": "印刷页269"}], "divergence": false, "divergence_note": null, "tags": ["市售辅食", "自制辅食", "选择"], "third_party": null}, {"id": "7-8月-feeding-008", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "feeding", "title": "吃辅食后体重不增的排查", "content": "按理说加了辅食营养来源更多体重应加快增长，但若出现增长缓慢甚至下降，家长要结合宝宝实际反思喂养方式。常见原因有三：进食量不足（注意别凭一大碗的量高估实际进食，应看食物种类和频次而非用几碗、多少克来计量）、饮食结构不合理（碳水化合物作为辅食主体占比要够），以及消化吸收不良（大便里有很多整粒颗粒说明咀嚼和肠胃消化功能未成熟、食物相对偏粗，需更换食物过渡）。", "source": [{"book": "崔", "loc": "印刷页269"}, {"book": "崔", "loc": "印刷页270"}], "divergence": false, "divergence_note": null, "tags": ["体重不增", "进食量", "消化吸收"], "third_party": null}, {"id": "7-8月-feeding-009", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "feeding", "title": "宝宝对新食物的恐新", "content": "加辅食后有些宝宝会拒绝接受新辅食，这是比较高比例的现象，属于心理上对新食物的排斥与不适应，并非过敏。可以放心的是并非所有宝宝、也不是对所有新食物都抵触。当发现宝宝对某种食物抵触时，不要强迫他一定要吃，可以先换一种食物，过一段时间后再尝试给他吃该食物，大多数情况下宝宝也能接受了。", "source": [{"book": "崔", "loc": "印刷页270"}, {"book": "崔", "loc": "印刷页272"}], "divergence": false, "divergence_note": null, "tags": ["恐新", "拒食", "换食物"], "third_party": null}, {"id": "7-8月-feeding-010", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "feeding", "title": "轻微食物过敏怎么办", "content": "加辅食后一些宝宝会出现呕吐、腹泻、皮疹、口腔过敏等，可能是对某种食物过敏。最主要的对策是把可疑食物从宝宝的餐食里去除，如果症状明显好转就初步判断与该食物有关；之后再次给宝宝吃这种食物又重新引起过敏反应，就可以确诊为食物过敏。轻微过敏的对症治疗（如使用抗组胺药物）应在医生指导下进行。", "source": [{"book": "崔", "loc": "印刷页270"}, {"book": "崔", "loc": "印刷页271"}], "divergence": false, "divergence_note": null, "tags": ["食物过敏", "回避", "就医"], "third_party": null}, {"id": "7-8月-feeding-011", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "feeding", "title": "培养良好的进食习惯", "content": "辅食添加初期就应帮宝宝养成良好进食习惯，并做正面示范。给宝宝创造良好的进食环境，尽量让他和大人一起吃饭，吃饭不专心时先关掉电视和手机，把注意力引导到进食上。帮助宝宝按时进食，家长要以身作则不要边吃饭边看电视、玩手机、聊天。还可以准备好看的餐具，鼓励宝宝自己进食以提高吃饭的积极性。", "source": [{"book": "崔", "loc": "印刷页271"}, {"book": "崔", "loc": "印刷页272"}], "divergence": false, "divergence_note": null, "tags": ["进食习惯", "示范", "自主进食"], "third_party": null}], "development": [{"id": "7-8月-development-001", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "development", "title": "7个月会做和可能会做的事", "content": "7个月时宝宝应该会翻身、自己吃饼干。很可能会在无外部辅助下短暂地坐、别人叫名字时有反应、抓起一块积木、想办法够取不易拿到的玩具、拒绝别人把玩具拿走。这些是这个月龄常见的发育表现。", "source": [{"book": "崔", "loc": "印刷页263"}, {"book": "崔", "loc": "印刷页264"}], "divergence": false, "divergence_note": null, "tags": ["发育里程碑", "大运动", "7个月"], "third_party": null}, {"id": "7-8月-development-002", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "development", "title": "7个月能学会和甚至会的事", "content": "7个月时宝宝能学会把积木等物品从一只手换到另一只手、见到陌生人时有不同于看到日常看护人的反应。甚至会咿咿呀呀地说话、发出dada或mama的音但无所指、用积木敲打、用拇指和其他手指抓东西。", "source": [{"book": "崔", "loc": "印刷页264"}], "divergence": false, "divergence_note": null, "tags": ["发育里程碑", "精细动作", "语言萌芽"], "third_party": null}, {"id": "7-8月-development-003", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "独坐与翻身", "content": "8个月时宝宝坐着应该已经不再需要支撑，偶尔歪倒也通常能用手臂撑住自己，还会探身去够东西，并逐渐学会趴下再坐起。他躺着会动个不停，可随意翻身且一眨眼就能翻过去，所以换尿布时要放在地板或大床上，任何时候都不要让他独处。若快9个月还无法自己坐起，要联系儿科医生。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "独坐", "安全"], "third_party": null}, {"id": "7-8月-development-004", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "学爬与楼梯防护", "content": "宝宝通常在7～10个月学会爬，最初可能只是手膝撑地前后摆动，甚至先倒退着爬，练习后才会向前。少数宝宝一直不爬而用挪蹭等方式移动，只要能协调身体两侧、同时用手脚就无须过度担心。可在他差一点够到的地方放玩具来鼓励爬行，并在楼梯上下两端装安全防护门。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "爬行", "安全"], "third_party": null}, {"id": "7-8月-development-005", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "扶站扶走到独走", "content": "宝宝会抓住机会让自己站起来，刚开始可能不知道怎么坐下，可示范屈膝慢慢下降。站稳后会扶着家具走动，要确保家具无尖角且稳固。随平衡提高他会偶尔放手，从蹒跚学步逐渐变得自信。很多孩子在1岁前后迈出第一步，早一些或晚一些都正常。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "站立", "行走"], "third_party": null}, {"id": "7-8月-development-006", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "不要使用学步车", "content": "美国儿科学会强烈建议不要让孩子使用学步车。学步车并不能帮助孩子学走路，反而会打消其走路积极性，还有很大安全隐患：碰到玩具或地毯易翻倒，孩子更容易摔下楼梯或进入危险地带。固定的弹跳椅或游戏架是更好的选择。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["安全", "学步车", "大运动"], "third_party": null}, {"id": "7-8月-development-007", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "手部精细动作发育", "content": "这几个月宝宝学会用拇指和食指或拇指和中指准确捏起东西，会用身边的小东西练习捏的动作。学会张开手指后会兴致勃勃地扔东西，可把兴趣引导到柔软的球类上。他还喜欢把东西捡起摇晃、两手传递，对有轮子、把手、合页的玩具和小洞特别感兴趣，到阶段末甚至能把积木摞成塔。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 手部发育"}], "divergence": false, "divergence_note": null, "tags": ["精细动作", "捏取", "玩具"], "third_party": null}, {"id": "7-8月-development-008", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "语言发育与多和宝宝说话", "content": "快1岁时宝宝开始用手指、爬向目标或打手势来传达需求，并模仿大人交谈的手势，咿呀声被ba、da、ga、ma等较清晰音节取代，甚至会说mama、baba。要尽可能多和他说话，描述周围正在发生的事，话语简单明确且说法保持一致。注意语言发育迟缓可能是听力障碍的表现。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "亲子互动", "听力"], "third_party": null}, {"id": "7-8月-development-009", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "development", "title": "坚持每天给宝宝读书", "content": "崔玉涛建议：阅读的好处不仅限于理解书中内容，只要家长保持耐心坚持朗读，宝宝会慢慢对书本内容产生兴趣，尤其被色彩鲜艳的图案吸引并参与互动。AAP同样建议给宝宝读图画书、选大的纸板书或布书让他自己翻，指着图片反复说出名称，帮他理解每个东西都有名称。两书都认为坚持每天读书对词汇积累和语言理解大有帮助。", "source": [{"book": "崔", "loc": "印刷页273"}, {"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["早教", "亲子阅读", "语言发育"], "third_party": null}, {"id": "7-8月-development-010", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "development", "title": "阅读习惯的培养方法", "content": "崔玉涛建议从现在着重培养宝宝的阅读习惯，把阅读贯穿到日常生活中，每天1～2次、每次约五分钟但要坚持，选择宝宝感兴趣的图画书。早些给宝宝朗读，对其词汇量积累、理解能力增强和语言表达力培养都有积极作用。", "source": [{"book": "崔", "loc": "印刷页273"}], "divergence": false, "divergence_note": null, "tags": ["早教", "亲子阅读", "阅读习惯"], "third_party": null}, {"id": "7-8月-development-011", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "认知发育与注意力", "content": "8个月的宝宝对什么都好奇但注意力很短，在一个玩具上顶多停留2～3分钟就转移；快12个月时可能为玩玩具坐15分钟，但仍会动个不停，不该期望他一动不动。这个阶段他最喜欢木勺、鸡蛋盒、塑料容器等家常用品，尤其对与熟悉物品略有差异的东西感兴趣，应选择能逐渐开阔眼界的玩具。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知发育", "注意力", "玩具选择"], "third_party": null}, {"id": "7-8月-development-012", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "物体恒存与藏猫猫", "content": "这几个月宝宝会理解物体即使离开视线也仍然存在，即物体恒存。8个月时把玩具藏到围巾下他会掀开去找，快10个月时会很肯定玩具还在并继续寻找。可以通过和他玩藏猫猫游戏来帮助理解物体恒存，不断变化形式他几乎可以永不厌倦地玩下去。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知发育", "物体恒存", "藏猫猫"], "third_party": null}, {"id": "7-8月-development-013", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "日常活动促进大脑发育", "content": "孩子早期岁月对大脑发育至关重要，每天都有机会锻炼孩子的大脑。多跟他讲话、鼓励他把学到的词说出来能刺激智力；提供舒适安全的探索环境和简单玩具能促进大脑更好发育；每天和他玩游戏、唱歌、读书能提高记忆力，并为未来几年的大脑发育打下基础。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 大脑发育"}], "divergence": false, "divergence_note": null, "tags": ["早教", "大脑发育", "亲子互动"], "third_party": null}, {"id": "7-8月-development-014", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "陌生人焦虑是正常里程碑", "content": "这几个月宝宝在熟悉的你面前开朗外向，遇到陌生人或物体却紧张缠人易受惊。陌生人焦虑是情感发育最初的里程碑之一，是他第一次区分熟悉和陌生，并非被宠坏或教育方式造成。即使曾经不怕的亲戚和保姆现在也可能让他想躲或被吓哭，尤其当对方突然接近时。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["情感发育", "陌生人焦虑", "里程碑"], "third_party": null}, {"id": "7-8月-development-015", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "分离焦虑及应对", "content": "大约同期宝宝会更依赖你，出现分离焦虑：你离开视线哪怕去隔壁房间他也会惊慌哭起来。分离焦虑通常在10～18个月达到顶峰，18～24个月逐渐消失。应对建议包括：把外出安排在他吃饱睡足后、离开时动静不要太大并让看护者转移其注意力后迅速道别、在家做短时分离练习、送去看护时不要放下就走。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["情感发育", "分离焦虑", "安抚"], "third_party": null}, {"id": "7-8月-development-016", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "自我意识与镜子游戏", "content": "这一阶段宝宝自我意识正在成熟，最明显的标志是照镜子方式的变化：大约8个月时只把镜子当有趣的东西，之后会明白影像是自己，照镜子时会摸自己的鼻子或扯头发。可以玩镜子游戏增强自我意识，一边摸彼此身体不同部位一边说出名称，或对着镜子做各种表情并告诉他情绪叫什么。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["情感发育", "自我意识", "镜子游戏"], "third_party": null}, {"id": "7-8月-development-017", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "和宝宝互动的早教游戏", "content": "可为宝宝设计一系列早教互动：尽量在地板上陪他爬行、让自己成为他爬行探索的目标；用打开关闭物品、把玩具倒出再放回等游戏锻炼精细动作，并准备多种活动避免厌倦；通过读故事、听音乐持续进行语言互动。注意经常进行同样活动会让孩子厌倦，最好多样化。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · （外）祖父母"}], "divergence": false, "divergence_note": null, "tags": ["早教", "亲子游戏", "精细动作"], "third_party": null}], "care": [{"id": "7-8月-care-001", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜醒多与抗拒睡觉", "content": "8个月大时宝宝白天可能仍小睡两次（上午、下午各一次），夜间能睡10～12小时，不需要半夜喝奶。但接下来几个月分离焦虑变强，宝宝可能抗拒上床、夜里醒来找你的次数也会增多。这是这个阶段的正常现象。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "小睡", "分离焦虑"], "third_party": null}, {"id": "7-8月-care-002", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "帮宝宝顺利入睡的方法", "content": "这个困难时期可以多试几种助眠方法：有的宝宝门开着、能听到妈妈声音时更易入睡，有的靠吮手指或被轻轻摇动安抚。播放白噪声尤其有效，但音量要调小，以免伤害宝宝敏感的听觉。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "入睡", "白噪声"], "third_party": null}, {"id": "7-8月-care-003", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜里哭闹怎么处理", "content": "宝宝深夜叫你时，只需确认他安好、告诉他你就在不远处，但不要开灯、哄抱或喂奶，更不要抱到大人床上——正经历分离焦虑时这样只会让他更不愿回自己的床。可以喂点水，检查并更换尿布，在微弱灯光下迅速换好后让宝宝仰卧放回床里，说几句安慰的话再离开。坚持每天用相同方法，宝宝最终会习惯。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "夜醒", "哄睡"], "third_party": null}, {"id": "7-8月-care-004", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜醒先排查是否生病", "content": "夜里察看时要确认宝宝舒适且没有生病，因为有些疾病（如中耳炎、哮吼）可能在夜间突然发作。确定没生病后再检查尿布，需要时更换。很多父母会用无线婴儿监护器来观察聆听宝宝在房间里的动静，购买前最好先充分了解产品。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["睡眠", "夜醒", "健康排查"], "third_party": null}, {"id": "7-8月-care-005", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "还没长牙不用着急", "content": "AAP指出，到这一阶段宝宝至少已长1～2颗牙甚至更多，但如果还没长牙也不必担心，12个月还没长牙对婴儿来说是正常的。崔玉涛同样认为这个月龄段没出牙非常常规，家长无须担心，要到出生后13个月乳牙仍无萌出迹象才算延迟。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}, {"book": "崔", "loc": "印刷页264"}], "divergence": false, "divergence_note": null, "tags": ["出牙", "乳牙", "护理"], "third_party": null}, {"id": "7-8月-care-006", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "care", "title": "出牙晚与缺钙无关", "content": "崔玉涛指出，出牙时间早晚不能人为干预，但适度咀嚼较硬的食物或物品，如磨牙棒、磨牙饼干、牙胶等，对牙齿产生刺激，有助于乳牙萌出。可以肯定的是出牙晚与缺钙没有直接关系，钙主要帮助牙齿矿化，对牙苗生长作用不大，因此不要为促进出牙而盲目给宝宝补钙。", "source": [{"book": "崔", "loc": "印刷页264"}], "divergence": false, "divergence_note": null, "tags": ["出牙", "缺钙误区", "补钙"], "third_party": null}, {"id": "7-8月-care-007", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "如何给宝宝刷牙", "content": "宝宝一旦长牙，就要开始用软毛牙刷和少许含氟牙膏（一粒大米大小）刷牙。如果他拒绝，可以让他仰躺在另一个人腿上，以做游戏的方式轻轻刷到每颗牙。每天刷一次、前后都刷到，最好在睡前刷，因为刷完后除了水不应再吃喝任何东西，晚上吃含糖食物会让努力白费。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "口腔护理", "含氟牙膏"], "third_party": null}, {"id": "7-8月-care-008", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "安排第一次牙医门诊", "content": "可以给宝宝安排第一次看牙医，时间应在长出第一颗牙后的6个月内、但不晚于1岁，以先到者为准。牙医可能会给牙齿涂氟保护漆。儿科医生也可能在儿童健康检查时检查牙齿并涂氟，但这不算作牙医门诊。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["牙医", "口腔护理", "涂氟"], "third_party": null}, {"id": "7-8月-care-009", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "care", "title": "牙缝大、牙不齐多属正常", "content": "崔玉涛指出，随着月龄增加牙龈会逐渐变宽，乳牙之间出现较大牙缝，这是生长发育的正常现象，反而有好处：能为日后排列预留空间，若乳牙过于紧密恒牙长出后容易拥挤；牙缝大也不易残留食物残渣、更易清洁。最早长出的乳牙因数量少、彼此没有依靠，方向显得自由散漫，随更多乳牙萌出会排得更紧密，此时不整齐不代表长大后牙齿拥挤。", "source": [{"book": "崔", "loc": "印刷页273"}], "divergence": false, "divergence_note": null, "tags": ["乳牙", "牙缝", "牙齿排列"], "third_party": null}, {"id": "7-8月-care-010", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "防奶瓶龋齿：别含奶睡", "content": "两书都提醒含奶睡觉会损坏乳牙。AAP指出，孩子喝奶过程中睡着，奶会浸没刚长出的乳牙造成奶瓶龋齿（儿童早期龋齿），因此不要在睡前奶瓶里装配方奶哄睡。崔玉涛同样强调尽量避免让宝宝含着奶嘴或乳头睡，食物中的糖分会被分解成酸性物质附着牙齿引起龋齿；一时难戒可用安抚奶嘴或在奶瓶中装清水替代，吃奶睡着会长时间含乳头影响牙齿发育。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}, {"book": "崔", "loc": "印刷页273"}], "divergence": false, "divergence_note": null, "tags": ["龋齿", "奶瓶龋", "含奶睡"], "third_party": null}, {"id": "7-8月-care-011", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "care", "title": "饭后睡前清洁口腔", "content": "崔玉涛建议根据宝宝情况，尤其在出牙后、吃完食物后给宝宝清洁牙齿，尽可能清除口腔中残留的糖分；晚上吃完最后一顿奶后应帮助宝宝刷牙、彻底清洁口腔，做好牙齿清洁是防龋的重要一环。", "source": [{"book": "崔", "loc": "印刷页274"}], "divergence": false, "divergence_note": null, "tags": ["口腔清洁", "防龋", "睡前护理"], "third_party": null}], "health": [{"id": "7-8月-health-001", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "health", "title": "没出牙是正常的，别担心", "content": "这个月龄的宝宝还没出牙非常常见，家长不用担心。一般要到出生后13个月乳牙仍无萌出迹象才算延迟。出牙时间无法人为干预，但让宝宝适度咀嚼磨牙棒、磨牙饼干、牙胶等较硬物品，对牙齿有刺激，有助于乳牙萌出。", "source": [{"book": "崔", "loc": "印刷页264"}], "divergence": false, "divergence_note": null, "tags": ["出牙", "乳牙", "正常现象"], "third_party": null}, {"id": "7-8月-health-002", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "health", "title": "出牙晚不等于缺钙", "content": "出牙晚与缺钙没有直接关系，钙主要是帮助牙齿矿化，对牙苗生长作用不大。即使宝宝出牙延迟，也不能作为判断缺钙的依据。家长不要为了促进出牙而盲目给宝宝补钙。", "source": [{"book": "崔", "loc": "印刷页264"}], "divergence": false, "divergence_note": null, "tags": ["出牙", "缺钙误区", "补钙"], "third_party": null}, {"id": "7-8月-health-003", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "health", "title": "长牙晚、出汗多、枕秃≠缺钙", "content": "家长常把长牙晚、出汗多、枕秃等体征都归为缺钙，从而频繁就医、不停补钙，其实这些问题和补钙并无直接联系。出现这些常见现象不必急于把它当成缺钙信号，更不应据此盲目补钙。", "source": [{"book": "崔", "loc": "印刷页265"}], "divergence": false, "divergence_note": null, "tags": ["缺钙误区", "枕秃", "出汗多"], "third_party": null}, {"id": "7-8月-health-004", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "health", "title": "皮肤发黄多是吃多黄色食物", "content": "宝宝添加辅食后皮肤发黄，很可能是黄色食物（如南瓜泥）吃得过多导致的色素沉淀，常先从手、脚、脸等部位变黄。这种情况一般不需要治疗，减少这类食物摄入即可。如果发现宝宝皮肤异常或情况变化，应及时就医。", "source": [{"book": "崔", "loc": "印刷页267"}], "divergence": false, "divergence_note": null, "tags": ["皮肤发黄", "辅食", "就医信号"], "third_party": null}, {"id": "7-8月-health-005", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "health", "title": "宝宝摸私处是正常探索", "content": "7个月前后，男宝宝偶尔出现勃起、女宝宝用手触摸私处，都是这个阶段正常的探索和好奇行为，与尿布材质等无关。家长没必要强烈制止，保护宝宝的好奇心即可；随着宝宝接触的新事物越来越多，注意力会自然从私处移开。", "source": [{"book": "崔", "loc": "印刷页267-268"}], "divergence": false, "divergence_note": null, "tags": ["私处", "正常探索", "行为"], "third_party": null}, {"id": "7-8月-health-006", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防噎食：这些食物别给宝宝", "content": "宝宝可能不咀嚼就把食物吞下，喂食时务必全程盯着，防止呼吸道被阻塞。千万不要给大勺花生酱、大块生蔬菜、整颗坚果、整颗葡萄、爆米花、硬糖等坚硬或圆形食物；火腿肠、奶酪、肉块要切成小块。建议家庭成员都接受基本急救培训。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["防噎", "喂养安全", "急救"], "third_party": null}, {"id": "7-8月-health-007", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "小物件会进嘴，地上别放小东西", "content": "宝宝会捡起够得到的任何小东西放进嘴里。气球碎片、纽扣电池、硬币等小物件极其危险。地板上、沙发下等宝宝能够到的地方都不要留小物件，存在潜在危险的抽屉、柜子要用儿童安全锁锁好。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["误吞", "小物件", "居家安全"], "third_party": null}, {"id": "7-8月-health-008", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "换尿布防摔落，别再用更换台", "content": "宝宝一眨眼就能翻身，换尿布时非常危险，最好不要再用尿布更换台，改在地板上或不易摔落的大床上换。任何时候都不要让宝宝独处，哪怕很短时间。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["防摔落", "换尿布", "看护"], "third_party": null}, {"id": "7-8月-health-009", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "楼梯装防护门，别让宝宝单独上下", "content": "宝宝学会移动后会想往楼梯上爬，这个阶段绝不能让他自己在台阶上玩。家里有楼梯应在上下两端都安装儿童安全防护门，即使宝宝学会倒退爬下楼梯，也要随时把防护门关上。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["楼梯", "防护门", "防摔落"], "third_party": null}, {"id": "7-8月-health-010", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "美国儿科学会强烈建议别用学步车", "content": "学步车并不能帮宝宝学走路，反而会打消他走路的积极性，还有很大安全隐患：碰到玩具、地毯易翻倒，宝宝更容易摔下楼梯或冲进危险地带。美国儿科学会强烈建议不要让宝宝使用学步车，可选固定的弹跳椅或游戏架。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步车", "安全隐患", "AAP建议"], "third_party": null}, {"id": "7-8月-health-011", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "夜醒先排查是否生病", "content": "夜间察看宝宝时要确认他舒适且没有生病。中耳炎、哮吼等疾病可能在夜间突然发作。确定没生病后再检查尿布，需要就换。如果排除生病后宝宝仍哭，可过一会儿再进房间安慰。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["夜醒", "中耳炎", "就医信号"], "third_party": null}, {"id": "7-8月-health-012", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "长牙后开始刷牙，最好睡前刷", "content": "宝宝一旦长牙，就要用软毛牙刷和一粒大米大小的含氟牙膏给他刷牙，每天一次、前后都刷到，最好在睡前刷。刷牙后除了水不应再吃喝任何东西。12个月还没长牙也属正常。崔玉涛同样强调晚上吃完最后一顿奶后要帮宝宝刷牙、彻底清洁口腔。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}, {"book": "崔", "loc": "印刷页274"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "含氟牙膏", "口腔清洁"], "third_party": null}, {"id": "7-8月-health-013", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "第一次牙医门诊的时间", "content": "宝宝第一次看牙医应在长出第一颗牙后的6个月内，但不要晚于1岁，以先到为准。牙医可能给牙齿涂氟保护漆。儿科医生在健康检查时检查牙齿、涂氟保护漆，但这不算牙医门诊。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["牙医", "涂氟", "口腔检查"], "third_party": null}, {"id": "7-8月-health-014", "age_stage": "7-8月", "applies_to": ["7-8月"], "applies_label": null, "board": "health", "title": "6～8个月接种第三针乙肝疫苗", "content": "第三针乙肝疫苗需要在宝宝6～8个月大时接种。全面、及时地给宝宝接种疫苗，是保护他不受疾病困扰的最佳方法。宝宝免疫系统每天抵御的抗原远多于疫苗所含抗原，完全能轻松应对。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "乙肝疫苗", "接种时间"], "third_party": null}, {"id": "7-8月-health-015", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "始终用后向式安全座椅", "content": "2岁前甚至2岁后，只要座椅尺寸合适，宝宝都应坐后向式汽车安全座椅。绝不要把宝宝单独留在车上，哪怕一小会儿。所有载宝宝的车（含看护者、祖父母的车）都要正确安装安全座椅，开车前系好安全带。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 汽车安全座椅"}], "divergence": false, "divergence_note": null, "tags": ["安全座椅", "后向式", "出行安全"], "third_party": null}, {"id": "7-8月-health-016", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防烧烫伤：热饮热食远离宝宝", "content": "抱着宝宝时不要吸烟、喝热饮或在炉子旁做饭；处理热液体或食物前先把宝宝放到安全处。盛热液体、热食的容器不要放在桌子或台面边缘，也不要放在茶几等较矮台面上。不要让宝宝在热炉灶、加热器或火炉旁爬来爬去。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防烧伤和烫伤"}], "divergence": false, "divergence_note": null, "tags": ["防烫伤", "热饮热食", "居家安全"], "third_party": null}, {"id": "7-8月-health-017", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防溺水：有水处不留宝宝独处", "content": "不要把宝宝单独留在浴室或任何有水的地方，包括水桶、戏水池、游泳池、水槽和马桶等，用完水立即清空容器。家中有游泳池，要用至少1.2米高的栅栏把泳池四周围住，与房子完全隔开。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防溺水"}], "divergence": false, "divergence_note": null, "tags": ["防溺水", "看护", "居家安全"], "third_party": null}, {"id": "7-8月-health-018", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防摔落：别让宝宝爬成人椅", "content": "楼梯顶部和底部都要装儿童防护门，没有保护装置的房间要锁上。不要让宝宝爬上成年人坐的椅子，这类椅子在宝宝往上爬时可能翻倒，造成头部、腿部或手臂受伤。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防摔落"}], "divergence": false, "divergence_note": null, "tags": ["防摔落", "防护门", "居家安全"], "third_party": null}, {"id": "7-8月-health-019", "age_stage": "7-8月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "奶睡会导致龋齿和中耳炎", "content": "不要为了哄睡在奶瓶里装配方奶让宝宝含着喝：喝着睡着时奶会浸没乳牙，造成奶瓶龋齿（儿童早期龋齿）；躺着喝奶睡着还可能引发中耳炎。崔玉涛同样提醒，避免让宝宝含着乳头或奶嘴睡觉，必要时可用清水或安抚奶嘴替代。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}, {"book": "崔", "loc": "印刷页273-274"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶龋齿", "奶睡", "中耳炎"], "third_party": null}]}, "8-9月": {"feeding": [{"id": "8-9月-feeding-001", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "奶量与热量需求", "content": "这一阶段宝宝每天需要约750～900千卡热量，其中400～500千卡来自母乳或配方奶，每天约喝720毫升奶。母乳和配方奶本身含有维生素、矿物质等促进大脑发育的物质。如果宝宝胃口比之前小了不用担心，因为他生长速度放缓，又被许多新鲜有趣的事吸引。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["奶量", "热量", "食欲"], "third_party": null}, {"id": "8-9月-feeding-002", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "添加更粗糙的食物", "content": "大约8个月时可以给宝宝吃比糊状稍粗糙、需要更多咀嚼的食物，比如酸奶、燕麦，或捣碎的香蕉、土豆，以及浓点的汤或煮烂的蔬菜块。鸡蛋是蛋白质的理想来源，白软干酪、希腊酸奶和牛油果也是优质蛋白质来源。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "食物性状", "蛋白质"], "third_party": null}, {"id": "8-9月-feeding-003", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "练习用勺自己吃", "content": "宝宝用手能力提高后，可以在用餐时给他一个勺子摆弄，等他会拿勺后让他试着自己吃。开始时很多食物会被弄到地上而非嘴里，家长要有耐心，不要把勺子从他手里夺走，他需要不断练习和你的鼓励。可在餐椅下垫一块塑料布方便饭后收拾。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["自主进食", "用勺", "手嘴协调"], "third_party": null}, {"id": "8-9月-feeding-004", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "手抓食物与防噎", "content": "可以给宝宝蒸熟的蔬菜块、香蕉等水果、煮熟的面条、小片全麦面包、鸡肉块、炒鸡蛋等手抓食物，提供不同味道、形状和质地的食物，但吃的时候要时刻看着防止呛噎。千万不要给大勺花生酱、大块生蔬菜、整颗坚果或葡萄、爆米花、硬糖等坚硬或圆形食物；火腿肠、奶酪、肉块要切成小块。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["手抓食物", "防噎", "安全进食"], "third_party": null}, {"id": "8-9月-feeding-005", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "feeding", "title": "应对辅食偏食", "content": "宝宝出现偏食挑食时，家长可先考虑是不是食物性状问题（如太硬、太黏），尽早尝试不同烹调方式让食物变软变烂，更易于进食，而不必立即担心营养是否不足。也可以把不爱吃的食材搭配到宝宝喜欢的食物（如胡萝卜）里慢慢适应，同时家长要留意自身饮食喜好对宝宝的影响。", "source": [{"book": "崔", "loc": "印刷页278"}, {"book": "崔", "loc": "印刷页279"}], "divergence": false, "divergence_note": null, "tags": ["偏食", "挑食", "食物性状"], "third_party": null}, {"id": "8-9月-feeding-006", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "feeding", "title": "尝试用杯子喝水", "content": "两本书都建议这一阶段让宝宝学用杯子，为日后戒断奶瓶打基础。AAP指出6个月后即可使用吸管杯或鸭嘴杯，母乳喂养的宝宝更容易学会，提高手嘴协调能力，完全学会大约需要6个月。崔玉涛建议用鸭嘴杯或吸管杯当过渡，先在杯里放少量水示范，练习时不必强求喝完，宝宝成功使用时及时表扬；月龄不是开始用杯子的衡量标准，若宝宝抵触可适当延后。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}, {"book": "崔", "loc": "印刷页279"}, {"book": "崔", "loc": "印刷页280"}], "divergence": false, "divergence_note": null, "tags": ["用杯子", "鸭嘴杯", "戒奶瓶"], "third_party": null}, {"id": "8-9月-feeding-007", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "不要含奶瓶入睡", "content": "千万不要让宝宝含着装奶的奶瓶入睡，因为喝奶时睡着，奶会浸没刚长出的乳牙造成奶瓶龋齿，躺着喝奶睡着还可能引发中耳炎。也不要让奶瓶变成安抚物，只允许宝宝坐着或被抱着时用奶瓶喝东西，其他时候用杯子，一旦定下原则就要坚持。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶", "奶瓶龋齿", "断奶瓶"], "third_party": null}], "development": [{"id": "8-9月-development-001", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "development", "title": "8个月里程碑清单", "content": "8个月时宝宝应该会独自坐、被叫名字有反应、能抓起不止一块积木、想办法够取够不到的玩具、拒绝别人拿走玩具。很可能会扶站、把积木从一只手换到另一只手、玩躲猫猫、见陌生人时格外注意看护人。也许会咿呀学语、用拇指和其他手指拾物。", "source": [{"book": "崔", "loc": "印刷页275"}, {"book": "崔", "loc": "印刷页276"}], "divergence": false, "divergence_note": null, "tags": ["里程碑", "8个月", "发育评估"], "third_party": null}, {"id": "8-9月-development-002", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "会移动带来独立感", "content": "孩子的活动能力进一步增强，能够移动让他第一次获得力量感和控制感，体会到真正的身体独立。他既渴望四处探索领地，又会因与你分开而恐惧，一旦离开你的视线就会大哭。四处移动也带来危险，所以必须时刻有人看护，不能松懈。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 第9章 8～12月龄"}], "divergence": false, "divergence_note": null, "tags": ["大运动", "独立性", "看护"], "third_party": null}, {"id": "8-9月-development-003", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "development", "title": "开始学爬锻炼全身", "content": "8个月的宝宝大都开始尝试爬行，有手膝式、匍匐式或向后爬，不管哪种方式都能扩大活动范围，是探索世界的新起点。爬行的基础是能稳稳独坐，需要颈部、躯干、四肢等全身肌肉协调配合，既锻炼全身肌肉、加强协调能力，也极大促进神经系统发育。", "source": [{"book": "崔", "loc": "印刷页276"}, {"book": "崔", "loc": "印刷页277"}], "divergence": false, "divergence_note": null, "tags": ["爬行", "大运动", "神经发育"], "third_party": null}, {"id": "8-9月-development-004", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "爬行的发展过程", "content": "宝宝通常在7～10个月掌握爬行。因为手臂肌肉比腿部更强壮，最初可能用手和膝盖前后摆动，甚至推着自己倒退而非向前。经过练习后，他会发现能朝想去的地方前进。少数宝宝一直不会爬，而用屁股蹭或肚皮挪动等方式移动，只要能协调身体两侧、同时用手和腿，就无须过度担心。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["爬行", "大运动", "发育差异"], "third_party": null}, {"id": "8-9月-development-005", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "怎样鼓励宝宝学爬", "content": "可以把有趣的物品放在宝宝差一点就够得到的地方吸引他爬。等他更灵活后，用枕头、箱子或靠垫做障碍，让他从上面或旁边爬过去，也可以躲在障碍物后玩躲猫猫给他惊喜。但绝不能把宝宝单独留在这些东西旁，以免他跌落卡住、感到恐惧甚至窒息。地上、沙发下不要有小物件，他会捡起来放进嘴里。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["爬行", "早教游戏", "安全"], "third_party": null}, {"id": "8-9月-development-006", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "扶站到学步", "content": "宝宝站稳后会扶着家具试探着走几步，即所谓扶着家具巡回。要确保家具没有尖锐边角且有重量或固定牢。随着平衡提高他会偶尔放手，刚开始脚步不稳容易摔倒，但很快能连续走几步。很多孩子在1岁前后迈出第一步，早一些或晚一些都正常。如果走了一阵又选择爬行也别惊讶，孩子总选最省力的方式。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["站立", "走路", "大运动"], "third_party": null}, {"id": "8-9月-development-007", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "不要用学步车", "content": "学步车并不能帮孩子学走路，反而会打消他走路的积极性，还有很大安全隐患：碰到玩具或地毯易翻倒，孩子更容易摔下楼梯或进入危险地带。美国儿科学会强烈建议不要让孩子使用学步车。固定的弹跳椅、游戏架或结实带把手、有重量的四轮小车是更好的选择。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步车", "安全", "AAP建议"], "third_party": null}, {"id": "8-9月-development-008", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "手部精细动作进步", "content": "宝宝会用拇指和食指或拇指和中指捏起小东西，利用身边一切小物练习捏的动作。学会张开手指后会兴致勃勃地扔东西，再尖叫着要人捡回来重扔。他喜欢有轮子、把手、合页等活动部件的玩具，也着迷于能伸进手指的小洞，技能熟练后还会把东西塞进洞里。积木也是这个阶段很喜欢的玩具。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 手部发育"}], "divergence": false, "divergence_note": null, "tags": ["精细动作", "捏取", "玩具"], "third_party": null}, {"id": "8-9月-development-009", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "development", "title": "惯用左右手不必纠正", "content": "宝宝出生后用左右手次数大体相同，几个月后会出现惯用手倾向，但这一习惯仍在发展中，日后可能改变。没必要在幼小时强行纠正惯用右手，否则可能给日后学习活动造成障碍。建议家长顺应个体差异，以宝宝的喜好和舒适度决定惯用哪只手，只要同等使用，不要强行纠正。", "source": [{"book": "崔", "loc": "印刷页277"}, {"book": "崔", "loc": "印刷页278"}], "divergence": false, "divergence_note": null, "tags": ["惯用手", "个体差异", "不纠正"], "third_party": null}, {"id": "8-9月-development-010", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "用非语言方式表达需求", "content": "快1岁时宝宝开始传达自己的需求，比如用手指着目标、向目标爬过去或打手势，还会模仿大人交谈时的很多手势。这种非语言交流是他学习用语言表达信息过程中暂时的替代方式。要注意语言发育迟缓可能是听力障碍的表现，重视他人的提醒很重要。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "手势", "听力"], "third_party": null}, {"id": "8-9月-development-011", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "咿呀发音与对话练习", "content": "宝宝的咿呀声逐渐被ba、da、ga、ma等清晰音节取代，有时会吐出ma ma、ba ba，从你的兴奋表情中意识到说了有意思的东西。要尽可能多和他说话，告诉他周围发生的事，话语简单明确，对熟悉的物品保持说法一致（今天叫猫就别明天叫咪咪）。多向他提问、等他回答，让他知道交流是双向的。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["语言发育", "发音", "亲子对话"], "third_party": null}, {"id": "8-9月-development-012", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "development", "title": "多向宝宝描述见闻", "content": "这个阶段宝宝已能发出一些简单音节，家长要多与他互动、多描述见闻，促进语言能力发展。带宝宝外出时告诉他这是苹果、那是香蕉，帮他建立词汇与物品的对应。宝宝看图画书发出嗯嗯声时，家长可以接他的话拉近语言和事物的联系。但注意不要让宝宝长时间盯着看，以免烦闷打击积极性。", "source": [{"book": "崔", "loc": "印刷页282"}, {"book": "崔", "loc": "印刷页283"}], "divergence": false, "divergence_note": null, "tags": ["语言早教", "描述见闻", "词汇"], "third_party": null}, {"id": "8-9月-development-013", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "用图画书强化语言", "content": "图画书有助于强化孩子对每个东西都有名称的理解。选大的纸板书、布书或塑料书让他自己翻，找色彩鲜艳的图片，指着物体一遍遍说出名称。可以自问自答，比如你看到了什么、这是球、这是蓝色的球。坚持每天读书会大有帮助，他也喜欢简单的歌曲。一定要关掉电视，开着电视会阻碍孩子的语言发育。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 语言发育"}], "divergence": false, "divergence_note": null, "tags": ["图画书", "语言发育", "关电视"], "third_party": null}, {"id": "8-9月-development-014", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "好奇但注意力短暂", "content": "8个月的宝宝对什么都充满好奇，但注意力集中时间很短，玩一个玩具顶多2～3分钟就会转去摆弄别的。快12个月时为玩玩具也许能坐15分钟，但大多数时候仍会动个不停，不该期望他一动不动。这个阶段最喜欢的往往是木勺、鸡蛋盒、塑料容器等家里常见用品，以及与熟悉物品略有差异的东西。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知发育", "注意力", "玩具"], "third_party": null}, {"id": "8-9月-development-015", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "像小科学家般探索", "content": "宝宝学会爬后会不断寻找新事物，搜查抽屉、翻废纸篓、洗劫柜子并仔细研究（一定要用儿童安全锁锁好危险抽屉柜子）。他反复把东西摔到地上、滚来滚去、扔到一边，以此研究物体的特点。看似随便玩，其实他像优秀的科学家一样在观察并理解物体的形状、质地和大小概念。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["认知发育", "探索", "安全锁"], "third_party": null}, {"id": "8-9月-development-016", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "理解物体恒存", "content": "这几个月的观察让宝宝理解到物体即使离开视线也仍然存在，即物体恒存。8个月时若把玩具放在围巾下，他会掀开围巾去找（这在3个月前还不会）；快10个月时他会很肯定玩具还在并继续寻找。为帮他理解物体恒存，可以和他玩躲猫猫，不断变换形式他几乎永不厌倦。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 认知发育"}], "divergence": false, "divergence_note": null, "tags": ["物体恒存", "认知发育", "躲猫猫"], "third_party": null}, {"id": "8-9月-development-017", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "日常互动促进大脑发育", "content": "孩子早期岁月对大脑发育至关重要，接触的环境与体验影响巨大。你每天都有机会锻炼他的大脑：多跟他讲话、鼓励他把学到的词说出来能刺激智力；提供舒适安全的环境让他探索、提供简单玩具刺激大脑；每天跟他玩游戏、唱歌、读书能促进记忆力提高。这些既有即时效果，也为未来几年的大脑发育打基础。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 大脑发育"}], "divergence": false, "divergence_note": null, "tags": ["大脑发育", "亲子互动", "早教"], "third_party": null}, {"id": "8-9月-development-018", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "陌生人焦虑很正常", "content": "这几个月孩子有时像两个人：在你面前开朗外向，在陌生人或物体旁却紧张缠人、易受惊。这不是被宠坏，而是他第一次区分熟悉和陌生。陌生人焦虑是情感发育最初的里程碑之一，即使曾经不怕的亲戚和保姆现在也可能让他想躲或被吓哭，尤其在他们突然接近时，这是正常的，无须担心。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["陌生人焦虑", "情感发育", "社交"], "third_party": null}, {"id": "8-9月-development-019", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "分离焦虑及应对", "content": "孩子开始认识到世上只有一个你，你离开视线时他会非常不安，因为时间感很差，不知道你何时回来。分离焦虑通常在10～18个月达到顶峰、18～24个月逐渐消失。应对建议：在他吃饱睡足后再外出；离开时动静别太大，让其他看护者转移他注意力后迅速道别；可在家做短时间分离练习；送去看护时别放下就走，花点时间陪玩并保证会回来。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["分离焦虑", "情感发育", "应对方法"], "third_party": null}, {"id": "8-9月-development-020", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "自我意识与照镜子", "content": "孩子的自我意识正在成熟，最明显的标志是照镜子方式的变化。大约8个月时他只把镜子当有趣的东西，可能以为镜中是另一个婴儿；现在他明白影像是自己，会摸自己的鼻子或扯头发。可以玩镜子游戏增强自我意识：一起照镜子时摸彼此身体部位并说这是宝宝的鼻子、这是妈妈的鼻子，还可做各种表情并告诉他情绪的名字。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 情感和社交能力发育"}], "divergence": false, "divergence_note": null, "tags": ["自我意识", "镜子游戏", "情感发育"], "third_party": null}, {"id": "8-9月-development-021", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "development", "title": "用转移注意力定规矩", "content": "孩子的探索欲永远满足不了，一定会触碰红线、进入禁区。你处理这些事的方法会为将来定规矩打基础。由于他记忆短暂，转移注意力通常能有效制止不良行为：与其严厉说不可以，不如把他抱起来给他能玩的东西。过多说不可以会削弱效果。只有当行为真正危险时才用严厉管教，比如玩电线时坚决说不可以并抱到一边，但需一次次重复他才记得住。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 规矩"}], "divergence": false, "divergence_note": null, "tags": ["规矩", "转移注意力", "管教"], "third_party": null}, {"id": "8-9月-development-022", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "development", "title": "做宝宝的引导者", "content": "成长过程中家长对宝宝不当行为进行适度管教和引导是必要的，能帮他合理使用规则、远离危险、更好地与他人和社会相处。针对不同情况要用不同方法：这个年龄段宝宝的行为多是无心之失，对危险动作要明确禁止，对其他行为视而不见地处理效果往往更好。回应和鼓励、奖惩与表扬是引导宝宝的有效方式。", "source": [{"book": "崔", "loc": "印刷页283"}, {"book": "崔", "loc": "印刷页284"}], "divergence": false, "divergence_note": null, "tags": ["管教", "引导", "规则"], "third_party": null}], "care": [{"id": "8-9月-care-001", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "白天小睡与夜间睡眠", "content": "8个月大的宝宝白天通常仍会在上午和下午各小睡一次，晚上可睡10～12小时，不需要半夜喝奶。接下来几个月分离焦虑变强时，宝宝可能抗拒上床、夜里醒来找你的次数也会增多。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["小睡", "夜间睡眠", "分离焦虑"], "third_party": null}, {"id": "8-9月-care-002", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "帮宝宝顺利入睡", "content": "这段困难期可尝试多种助眠方法：有的宝宝在门开着能听到妈妈声音时更易入睡，有的靠吮手指或被轻摇形成习惯。播放白噪声尤其有效，但音量要调小，以免伤害宝宝敏感的听觉。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["入睡", "白噪声", "睡眠习惯"], "third_party": null}, {"id": "8-9月-care-003", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜醒了怎么处理", "content": "宝宝深夜叫你时，只需确认他安好并告诉他你就在不远处，但不要开灯、哄他或抱起他。可以给点水，但不要喂奶，更不要抱到你的床上。若正经历分离焦虑，把他带到大人床上只会让他更不愿回自己的小床。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["夜醒", "哭闹", "分离焦虑"], "third_party": null}, {"id": "8-9月-care-004", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "夜里查看与一致的入睡流程", "content": "查看时确认宝宝舒适没生病（中耳炎、哮吼等可能夜间突发），并检查尿布、必要时在微弱灯光下迅速更换，再以仰卧姿势放回婴儿床，离开前说几句安慰的话。若仍哭，可过一会儿再进房安慰。坚持每天用相同方法入睡，宝宝最终会习惯。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 睡觉"}], "divergence": false, "divergence_note": null, "tags": ["夜间查看", "换尿布", "一致性"], "third_party": null}, {"id": "8-9月-care-005", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "开始给宝宝刷牙", "content": "到这个阶段宝宝至少已长出1～2颗牙，没长牙也不必担心（12个月还没长牙是正常的）。一旦长牙，就用软毛牙刷和一粒大米大小的含氟牙膏给他刷，每天一次、牙齿前后都刷到。最好在晚上睡前刷，刷后除水外不要再吃喝任何东西。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["刷牙", "含氟牙膏", "口腔护理"], "third_party": null}, {"id": "8-9月-care-006", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "安排第一次牙医门诊", "content": "宝宝第一次看牙医应在长出第一颗牙后的6个月内，但不要晚于1岁，以先到的时间点为准。牙医可能会给牙齿涂氟保护漆。儿科医生在健康检查时检查牙齿、涂氟，但这不算作牙医门诊。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 牙齿"}], "divergence": false, "divergence_note": null, "tags": ["牙医", "涂氟", "口腔护理"], "third_party": null}, {"id": "8-9月-care-007", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "care", "title": "宝宝为什么踢被子", "content": "宝宝睡觉踢被子不一定是睡得不踏实。常见原因有：床太大让宝宝缺乏安全感、被子太小翻身时盖不住、盖得太厚觉得热，或睡得不踏实时频繁翻身把被子蹬开。家长应从护理方式和宝宝自身找原因，再对应调整。", "source": [{"book": "崔", "loc": "印刷页280"}, {"book": "崔", "loc": "印刷页281"}], "divergence": false, "divergence_note": null, "tags": ["踢被子", "睡眠", "护理"], "third_party": null}, {"id": "8-9月-care-008", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "care", "title": "防止踢被子的办法", "content": "若因和父母同床而踢被，建议给宝宝准备单独的小床增强安全感；若被子太小，选尺寸合适、盖上后仍有余量的被子；保持房间温度适宜。对宝宝睡眠中的小动作不必太紧张，偶尔踢被是很常见的。", "source": [{"book": "崔", "loc": "印刷页281"}], "divergence": false, "divergence_note": null, "tags": ["踢被子", "小床", "睡眠环境"], "third_party": null}, {"id": "8-9月-care-009", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "为会爬的宝宝做好居家防护", "content": "随着活动能力增强，宝宝探索范围越来越大，安全隐患也随之增加，应及早把家布置成完全安全的地方。这个阶段的宝宝没有危险意识、记忆力有限，很快会忘记警告，唯一可靠的办法是对橱柜抽屉做足安全措施、把危险和贵重物品放到他够不到的地方，并任何时候都有人看护。崔玉涛同样强调要排除潜在危险，给宝宝打造安全的活动场地。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 第9章 8～12月龄"}, {"book": "崔", "loc": "印刷页281"}], "divergence": false, "divergence_note": null, "tags": ["居家安全", "爬行", "防护"], "third_party": null}, {"id": "8-9月-care-010", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "care", "title": "收好小物件与危险品", "content": "把宝宝能够到的小物件、易碎物、玩具零件都收好，以免他放进嘴里；药物、消毒用品等收纳到宝宝碰不到的地方以防误食；桌面不放台布等宝宝一拉就会带下重物的东西，并给家具尖角装上防撞角。", "source": [{"book": "崔", "loc": "印刷页281"}, {"book": "崔", "loc": "印刷页282"}], "divergence": false, "divergence_note": null, "tags": ["误食", "小物件", "防撞角"], "third_party": null}, {"id": "8-9月-care-011", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "care", "title": "插座、风扇与电源线防护", "content": "给宝宝能够到的插座装上安全套，较低的插孔加保护插头，确保宝宝打不开、避免接触危险的电源线；使用电风扇时加装安全防护罩或挡板，防止宝宝把手指伸进去受伤。", "source": [{"book": "崔", "loc": "印刷页281"}, {"book": "崔", "loc": "印刷页282"}], "divergence": false, "divergence_note": null, "tags": ["插座", "风扇", "用电安全"], "third_party": null}, {"id": "8-9月-care-012", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "care", "title": "远离水和高温区域", "content": "把通向危险区域的门关好、禁止宝宝进入；宝宝的活动区内不要放任何存水的浴缸、水桶等容器；用餐时时刻看好高温液体的位置，避免宝宝靠近桌边被烫伤。", "source": [{"book": "崔", "loc": "印刷页282"}], "divergence": false, "divergence_note": null, "tags": ["防溺水", "防烫伤", "居家安全"], "third_party": null}, {"id": "8-9月-care-013", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "换尿布要防摔落", "content": "宝宝现在一眨眼就能翻身，换尿布时很危险，最好不再用尿布更换台，改在地板上或不易摔落的大床上换。任何时候都不要让宝宝独处，哪怕很短时间；换尿布时可以用一个他能握住的玩具转移注意力。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}, {"book": "AAP", "loc": "第9章 8～12月龄 · （外）祖父母"}], "divergence": false, "divergence_note": null, "tags": ["换尿布", "防摔落", "看护"], "third_party": null}, {"id": "8-9月-care-014", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "care", "title": "楼梯与防护门", "content": "楼梯是危险的练习场地，这个阶段绝对不能让宝宝自己在台阶上玩。家里有楼梯应在上下两端都安装儿童安全防护门，防止他独自爬上爬下；即使他学会倒退着爬下楼梯，也要随时把防护门关上。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}, {"book": "AAP", "loc": "第9章 8～12月龄 · 预防摔落"}], "divergence": false, "divergence_note": null, "tags": ["楼梯", "防护门", "防摔落"], "third_party": null}], "health": [{"id": "8-9月-health-001", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "会移动了要重做居家防护", "content": "孩子会爬会扶站后活动范围大增，却没有危险意识、记性又短，很快忘掉警告。唯一可靠的办法是提前把家布置安全：橱柜抽屉上锁、危险和贵重物品放高处、卫生间等危险房间不让他独自进入。崔玉涛也提醒，随运动能力提升，要为爬行的宝宝逐一排查潜在隐患。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 第9章 8～12月龄"}, {"book": "崔", "loc": "印刷页281"}], "divergence": false, "divergence_note": null, "tags": ["居家安全", "防护", "爬行"], "third_party": null}, {"id": "8-9月-health-002", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防摔：楼梯装门别爬高椅", "content": "在楼梯上下两端都装儿童安全防护门，没装防护的房间锁好，绝不让孩子独自在台阶上玩。不要让他爬成人坐的椅子，以免椅子翻倒砸伤头、腿或手臂。崔玉涛补充，宝宝学爬学扶站时要防坠落，可在地板铺一层垫子。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防摔落"}, {"book": "崔", "loc": "印刷页281"}], "divergence": false, "divergence_note": null, "tags": ["防摔", "楼梯", "防护门"], "third_party": null}, {"id": "8-9月-health-003", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "地上小物件是窒息大隐患", "content": "地板、沙发下等孩子够得到的地方不要留小物件，他会捡起来塞进嘴里。气球碎片、纽扣电池、硬币这类极其危险。崔玉涛也强调，易碎物和玩具零件都要收好，以免宝宝放进嘴里。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}, {"book": "崔", "loc": "印刷页281"}], "divergence": false, "divergence_note": null, "tags": ["窒息", "小物件", "误食"], "third_party": null}, {"id": "8-9月-health-004", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防烫：热液热食远离边缘", "content": "抱着孩子时不要吸烟、喝热饮或在炉边做饭；要处理热液或热食时先把孩子放到婴儿床、围栏或高脚餐椅等安全处。盛热液热食的容器不要放在桌子台面边缘或茶几等较矮的台面，也别让孩子在热炉灶、加热器旁爬来爬去。崔玉涛同样提醒用餐时要随时留意高温液体的位置。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防烧伤和烫伤"}, {"book": "崔", "loc": "印刷页282"}], "divergence": false, "divergence_note": null, "tags": ["防烫", "烧伤", "厨房安全"], "third_party": null}, {"id": "8-9月-health-005", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "防溺水：有水容器要清空", "content": "不要把孩子单独留在浴室或任何有水的地方，包括水桶、戏水池、游泳池、水槽和马桶；用完水立即清空容器。家有游泳池要用至少1.2米高的栅栏完全围住、与房子隔开。崔玉涛也提醒，宝宝活动区内不要放任何存水的浴缸、桶等容器。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 预防溺水"}, {"book": "崔", "loc": "印刷页282"}], "divergence": false, "divergence_note": null, "tags": ["防溺水", "有水容器", "游泳池"], "third_party": null}, {"id": "8-9月-health-006", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "用电安全：插座加保护盖", "content": "崔玉涛提醒，把宝宝够得到的插座装上安全套或保护盖，尤其是多孔插排，确保宝宝打不开；位置较低的插孔接上保护插头，避免触碰危险的电源线。", "source": [{"book": "崔", "loc": "印刷页282"}], "divergence": false, "divergence_note": null, "tags": ["用电安全", "插座", "电源线"], "third_party": null}, {"id": "8-9月-health-007", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "药物消毒品要收到够不到处", "content": "崔玉涛提醒，药物、消毒等物品应收纳在宝宝碰不到的地方，以免误食。", "source": [{"book": "崔", "loc": "印刷页282"}], "divergence": false, "divergence_note": null, "tags": ["误食", "药物", "收纳"], "third_party": null}, {"id": "8-9月-health-008", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "美国儿科学会反对用学步车", "content": "学步车并不能帮孩子学走路，反而打消他走路的积极性；碰到玩具或地毯易翻倒，还更容易摔下楼梯或冲进危险区域。美国儿科学会强烈建议不要使用学步车，可换成没有轮子的固定弹跳椅或游戏架。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}], "divergence": false, "divergence_note": null, "tags": ["学步车", "安全隐患", "防摔"], "third_party": null}, {"id": "8-9月-health-009", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "扶站的家具不能尖锐易翻", "content": "孩子会扶着家具走动，要确保被他扶的家具没有尖锐边角，并且有一定重量或牢牢固定在地板上。崔玉涛也建议给家具装防撞角，保护宝宝的头。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 运动发育"}, {"book": "崔", "loc": "印刷页282"}], "divergence": false, "divergence_note": null, "tags": ["家具安全", "防撞角", "扶站"], "third_party": null}, {"id": "8-9月-health-010", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "始终用后向式汽车安全座椅", "content": "2岁以前甚至2岁以后，只要座椅尺寸合适，孩子都应坐后向式汽车安全座椅。离车时哪怕一会儿也绝不能把孩子单独留在车里。所有载他的车（含看护者、祖父母的车）都要正确安装安全座椅，开车前系好安全带。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 汽车安全座椅"}], "divergence": false, "divergence_note": null, "tags": ["汽车安全座椅", "后向式", "出行安全"], "third_party": null}, {"id": "8-9月-health-011", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "这阶段需接种第三针乙肝", "content": "第三针乙肝疫苗需在孩子6～8个月大时接种。第一针甲肝疫苗则要等到1岁时或1岁以后。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "乙肝", "甲肝"], "third_party": null}, {"id": "8-9月-health-012", "age_stage": "8-9月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "health", "title": "按时接种是最好的防病办法", "content": "孩子的免疫系统每天抵御的抗原远多于疫苗所含的抗原，能轻松应对疫苗里的抗原。全面、及时地接种疫苗，是保护孩子不受疾病困扰的最佳方法。MMR、水痘、第四针肺炎球菌等多在12个月前后接种。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 疫苗接种"}], "divergence": false, "divergence_note": null, "tags": ["疫苗", "按时接种", "免疫"], "third_party": null}, {"id": "8-9月-health-013", "age_stage": "8-9月", "applies_to": ["8-9月"], "applies_label": null, "board": "health", "title": "桌布和风扇等隐患要排查", "content": "崔玉涛提醒，桌面不要铺宝宝容易扯下的桌布，以防带下重物砸伤；电风扇要加安全防护罩或挡板；细小可触碰的危险物都要仔细检查清理，给爬行的宝宝一个安全场地。", "source": [{"book": "崔", "loc": "印刷页281"}], "divergence": false, "divergence_note": null, "tags": ["居家安全", "桌布", "风扇"], "third_party": null}]}, "9-10月": {"feeding": [{"id": "9-10月-feeding-001", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "开始尝试稍粗的食物", "content": "这个阶段宝宝大多已掌握咀嚼动作并萌出乳牙，可以从糊状食物过渡到稍粗、带软颗粒的食物，遵循由稀到稠、由薄到厚的原则。不必再用辅食机，改用碗筷把蔬菜、软肉等弄碎即可，借此锻炼咀嚼能力。还可给酸奶、燕麦、捣碎的香蕉土豆、煮烂的蔬菜块等扩展食谱。若大便里未消化的食物颗粒较多，说明咀嚼或消化还跟不上，应把辅食再做细一些。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}, {"book": "崔", "loc": "印刷页290"}], "divergence": false, "divergence_note": null, "tags": ["辅食", "咀嚼", "食物质地"], "third_party": null}, {"id": "9-10月-feeding-002", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "准备手指食物", "content": "当宝宝开始主动用手抓捏食物时，可以准备能直接抓着吃的手指食物，锻炼手部精细动作，为日后用勺子打基础。可选蒸熟的蔬菜块、香蕉等水果、煮熟的面条、小片全麦面包、鸡肉块、炒鸡蛋等软的、易咬下吞咽的食物。吃的时候一定要全程盯着，防止呛噎。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}, {"book": "崔", "loc": "印刷页291"}], "divergence": false, "divergence_note": null, "tags": ["手指食物", "精细动作", "防呛噎"], "third_party": null}, {"id": "9-10月-feeding-003", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "远离易噎的危险食物", "content": "宝宝可能不咀嚼就吞下，所以千万不要给整颗坚果、整颗葡萄、爆米花、大块生蔬菜、硬糖、口香糖等坚硬或圆形食物；火腿肠、奶酪、肉块要切成小块。崔玉涛也提醒，黄豆、葡萄等又轻又圆又不规则的食材不适合做手指食物，宝宝不易抓握且极易误吸整颗呛到。建议家庭成员都学习基本急救。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}, {"book": "崔", "loc": "印刷页291"}], "divergence": false, "divergence_note": null, "tags": ["防噎", "食物安全", "急救"], "third_party": null}, {"id": "9-10月-feeding-004", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "让宝宝学用勺子自己吃", "content": "随着手部能力提高，用餐时可以给宝宝一把勺子让他拿着摆弄，会用之后鼓励他自己舀着吃。刚开始很多食物会被弄到地上，可在餐椅下垫塑料布，要有耐心、别把勺子夺走。可以让他用自己的勺子和你的勺子轮流吃，等他能连续把勺子送进嘴里（往往要1岁后）再帮他往勺里加食物，但始终让他自己往嘴里送。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["自主进食", "勺子", "耐心"], "third_party": null}, {"id": "9-10月-feeding-005", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "每日热量与奶量", "content": "这个阶段宝宝每天约需750～900千卡热量，其中400～500千卡来自母乳或配方奶，每天约喝720毫升奶，奶里本身含有促进发育的维生素和矿物质。如果宝宝胃口比之前小了不用担心，因为生长速度放缓，而且喝奶之外还有许多新鲜事物吸引他。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 饮食"}], "divergence": false, "divergence_note": null, "tags": ["热量", "奶量", "母乳"], "third_party": null}, {"id": "9-10月-feeding-006", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "开始练习用杯子喝水", "content": "6个月后可以随时让宝宝用吸管杯或鸭嘴杯，母乳喂养的宝宝更容易学会用杯子。先在杯里装少量水，每天选一餐给他用，示范如何送到嘴边、倾斜喝水。即使他连续几周把杯子当玩具也别沮丧，多数宝宝都这样。用杯子能提高手嘴协调、为断奶做准备。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["学饮杯", "断奶", "手嘴协调"], "third_party": null}, {"id": "9-10月-feeding-007", "age_stage": "9-10月", "applies_to": ["7-8月", "8-9月", "9-10月", "10-11月", "11-12月"], "applies_label": "适用 8～12 月龄", "board": "feeding", "title": "别让宝宝含着奶瓶睡着", "content": "千万不要为了让宝宝快点入睡而给他含着奶瓶：喝奶时睡着，奶会浸泡刚长出的乳牙，造成奶瓶龋齿（儿童早期龋齿）；躺着喝奶睡着还可能引发中耳炎。也不要让奶瓶变成安抚物，只允许宝宝坐着或被抱着时用奶瓶，其他时候用杯子。", "source": [{"book": "AAP", "loc": "第9章 8～12月龄 · 杯子的使用"}], "divergence": false, "divergence_note": null, "tags": ["奶瓶龋齿", "睡前喂奶", "中耳炎"], "third_party": null}], "development": [{"id": "9-10月-development-001", "age_stage": "9-10月", "applies_to":
